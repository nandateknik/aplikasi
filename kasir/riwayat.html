<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Riwayat - POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* CSS nggo area render gambar (hidden) */
        #render-nota-image {
            width: 380px; /* Ukuran pas nggo 58mm */
            background: white;
            padding: 10px;
            color: black;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            position: absolute;
            left: -9999px; /* Ndhelik nang mburine layar */
        }
        @media print {
            body * { visibility: hidden; }
            #print-final-image, #print-final-image * { visibility: visible; }
            #print-final-image { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="lg:ml-64 p-8">
        <h2 class="text-3xl font-black mb-8">LOG TRANSAKSI</h2>
        <div id="riwayat-list" class="space-y-4"></div>
    </div>

    <div id="render-nota-image"></div>

    <div id="print-final-image"></div>

    <script src="js/config.js"></script>
    <script>
        async function renderRiwayat() {
            let transaksi = await db.transactions.toArray();
            transaksi.sort((a, b) => b.waktu - a.waktu);
            document.getElementById('riwayat-list').innerHTML = transaksi.map(t => `
                <div class="bg-white p-6 rounded-3xl border flex justify-between items-center">
                    <div>
                        <span class="font-black">TRX #${t.id}</span>
                        <div class="text-xl font-black text-blue-600">Rp ${t.total.toLocaleString()}</div>
                    </div>
                    <button onclick="reprintNota(${t.id})" class="bg-black text-white px-6 py-3 rounded-xl font-bold">🧾 CETAK RAW</button>
                </div>
            `).join('');
        }

        async function reprintNota(id) {
            const t = await db.transactions.get(id);
            const info = await db.settings.get("info_toko") || { nama: "NANDA TEKNIK", alamat: "BANYUWANGI", wa: "0" };
            
            const area = document.getElementById('render-nota-image');
            
            // Layout Nota (Digawe kontras Item Putih murni)
            area.innerHTML = `
                <div style="text-align:center; border-bottom: 2px dashed black; padding-bottom:10px; margin-bottom:10px;">
                    <b style="font-size: 24px;">${info.nama}</b><br>
                    <span style="font-size: 14px;">${info.alamat}</span><br>
                    <span style="font-size: 14px;">WA: ${info.wa}</span>
                </div>
                <div style="font-size: 14px;">
                    TGL: ${new Date(t.waktu).toLocaleString()}<br>
                    ID : #${t.id}<br>
                    KSR: ADMIN
                </div>
                <div style="border-bottom: 2px dashed black; margin: 10px 0;"></div>
                ${t.items.map(item => `
                    <div style="margin-bottom: 8px;">
                        <b style="font-size: 16px;">${item.nama}</b><br>
                        <div style="display:flex; justify-content:space-between; font-size: 14px;">
                            <span>${item.qty} X ${item.harga.toLocaleString()}</span>
                            <b>${(item.qty * item.harga).toLocaleString()}</b>
                        </div>
                    </div>
                `).join('')}
                <div style="border-bottom: 2px dashed black; margin: 10px 0;"></div>
                <div style="display:flex; justify-content:space-between; font-size: 20px; font-weight:bold;">
                    <span>TOTAL</span>
                    <span>${t.total.toLocaleString()}</span>
                </div>
                <div style="text-align:center; margin-top: 20px; font-size: 14px;">
                    *** TERIMA KASIH ***
                </div>
                <div style="height: 40px;"></div>
            `;

            // PROSES MERUBAH HTML DADI GAMBAR (Biar Gak Meler/Putus)
            html2canvas(area, {
                scale: 2, // Bikin gambar luwih tajam
                logging: false,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const printContainer = document.getElementById('print-final-image');
                printContainer.innerHTML = `<img src="${imgData}" style="width: 100%;">`;
                
                setTimeout(() => {
                    window.print();
                    printContainer.innerHTML = ""; // Resiki meneh
                }, 500);
            });
        }

        renderRiwayat();
    </script>
</body>
</html>
