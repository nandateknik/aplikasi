<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat - POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; color: #000 !important; }
            #print-area { 
                position: absolute; left: 0; top: 0; width: 44mm; 
                display: block !important; 
            }
            @page { margin: 0; size: auto; }
        }

        /* FONT CLEAN: ANTI MELUBER */
        #print-area { 
            display: none; 
            background: white; 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: 600; /* Tidak terlalu tebal biar gak meler */
            letter-spacing: 0.5px; /* Kasih napas antar huruf */
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="lg:ml-64 flex flex-col min-h-screen">
        <div id="layout-header"></div>
        <main class="p-4 lg:p-8 flex-1">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-slate-800">LOG TRANSAKSI</h2>
                <input type="date" id="filter-tanggal" onchange="renderRiwayat()" class="p-3 rounded-2xl border-slate-200 font-bold shadow-sm">
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
                <section class="xl:col-span-4">
                    <div class="bg-blue-600 rounded-[32px] p-8 text-white shadow-xl">
                        <p class="text-[10px] font-black uppercase opacity-80 mb-2">Total Omzet</p>
                        <h2 id="total-omzet" class="text-4xl font-black">Rp 0</h2>
                    </div>
                </section>
                <section class="xl:col-span-8">
                    <div id="riwayat-list" class="space-y-4"></div>
                </section>
            </div>
        </main>
    </div>

    <div id="print-area"></div>

    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>
    <script>
        async function renderRiwayat() {
            const list = document.getElementById('riwayat-list');
            const filterDate = document.getElementById('filter-tanggal').value;
            try {
                let transaksi = await db.transactions.toArray();
                transaksi.sort((a, b) => b.waktu - a.waktu);
                if(filterDate) {
                    transaksi = transaksi.filter(t => new Date(t.waktu).toISOString().split('T')[0] === filterDate);
                }
                document.getElementById('total-omzet').innerText = `Rp ${transaksi.reduce((a, b) => a + b.total, 0).toLocaleString()}`;
                
                list.innerHTML = transaksi.map(t => `
                    <div class="bg-white border border-slate-100 rounded-[28px] p-6 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex-1 w-full text-center md:text-left">
                            <span class="text-[10px] font-black bg-slate-800 text-white px-3 py-1 rounded-full uppercase">TRX #${t.id}</span>
                            <div class="mt-4 border-t pt-2 text-xl font-black text-blue-600">Rp ${t.total.toLocaleString()}</div>
                        </div>
                        <button onclick="reprintNota(${t.id})" class="w-full md:w-auto bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase">🧾 CETAK</button>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function reprintNota(id) {
            const t = await db.transactions.get(id);
            const info = await db.settings.get("info_toko") || { nama: "POS PRO", alamat: "BANYUWANGI", wa: "0" };
            const area = document.getElementById('print-area');
            
            // Layout Nota yang "Dijinakkan"
            area.innerHTML = `
                <div style="padding: 1mm; line-height: 1.2; width: 42mm; font-size: 10px;">
                    <div style="text-align:center; margin-bottom: 5px;">
                        <div style="font-size: 12px; font-weight: bold;">${info.nama.toUpperCase()}</div>
                        <div style="font-size: 8px; margin-top: 2px;">${info.alamat.toUpperCase()}</div>
                        <div style="font-size: 8px;">WA: ${info.wa}</div>
                    </div>
                    
                    <div style="text-align:center; margin: 3px 0;">--------------------------</div>
                    <div style="font-size: 8px; text-align:center; margin-bottom: 3px;">** REPRINT NOTA **</div>
                    <div style="text-align:center; margin: 3px 0;">--------------------------</div>

                    <div style="font-size: 8px;">
                        ID  : #${t.id}<br>
                        TGL : ${new Date(t.waktu).toLocaleString('id-ID')}<br>
                        KSR : ADMIN
                    </div>
                    <div style="text-align:center; margin: 3px 0;">--------------------------</div>

                    <div style="font-size: 8px;">
                        ${t.items.map(item => `
                            <div style="margin-bottom: 3px;">
                                <div style="word-wrap: break-word;">${item.nama.toUpperCase()}</div>
                                <div style="display:flex; justify-content:space-between;">
                                    <span>${item.qty} X ${item.harga.toLocaleString()}</span>
                                    <span>${(item.qty * item.harga).toLocaleString()}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div style="text-align:center; margin: 3px 0;">--------------------------</div>
                    <div style="display:flex; justify-content:space-between; font-weight: bold;">
                        <span>TOTAL</span>
                        <span>${t.total.toLocaleString()}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size: 8px;">
                        <span>BAYAR</span>
                        <span>${t.bayar.toLocaleString()}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size: 8px;">
                        <span>KEMBALI</span>
                        <span>${t.kembali.toLocaleString()}</span>
                    </div>
                    <div style="text-align:center; margin: 3px 0;">--------------------------</div>

                    <div style="text-align:center; font-size: 8px; margin-top: 5px;">
                        TERIMA KASIH
                    </div>
                    <div style="height: 40px;"></div> 
                </div>
            `;
            window.print();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('filter-tanggal').value = new Date().toISOString().split('T')[0];
            renderRiwayat();
        });
    </script>
</body>
</html>
