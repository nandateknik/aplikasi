<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat - POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* CSS KHUSUS PRINT AGAR IWARE TAJAM */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; color: #000 !important; }
            #print-area { 
                position: absolute; left: 0; top: 0; width: 54mm; 
                display: block !important;
            }
            @page { margin: 0; size: auto; }
        }
        #print-area { display: none; background: white; font-family: Arial, sans-serif; font-size: 11px; }
        .thermal-bold { font-weight: 900; -webkit-text-stroke: 0.3px black; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="lg:ml-64 flex flex-col min-h-screen">
        <div id="layout-header"></div>

        <main class="p-4 lg:p-8 flex-1">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight uppercase">Log Transaksi</h2>
                    <p class="text-sm text-slate-500 font-medium">Pantau semua aktivitas penjualan yang masuk.</p>
                </div>
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <div class="relative flex-1 md:flex-none">
                        <label class="absolute -top-2 left-3 bg-white px-1 text-[9px] font-bold text-slate-400 uppercase">Filter Tanggal</label>
                        <input type="date" id="filter-tanggal" onchange="renderRiwayat()" 
                               class="!py-3 !px-4 !rounded-2xl border-slate-200 text-sm font-bold text-slate-700 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
                
                <section class="xl:col-span-4 space-y-6">
                    <div class="bg-blue-600 rounded-[32px] p-8 text-white shadow-xl shadow-blue-100 relative overflow-hidden group">
                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-white/10 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-700"></div>
                        <p class="text-xs font-black uppercase opacity-80 tracking-[0.2em] mb-2">Total Omzet</p>
                        <h2 id="total-omzet" class="text-4xl font-black tracking-tighter">Rp 0</h2>
                        <div class="mt-6 flex items-center gap-2">
                            <span class="text-[10px] bg-white/20 px-2 py-1 rounded-lg font-bold uppercase">Terfilter</span>
                            <span id="trx-count" class="text-xs font-medium opacity-80">0 Transaksi</span>
                        </div>
                    </div>

                    <div class="bg-white rounded-[32px] p-6 border border-slate-100 shadow-sm">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Zona Bahaya</h4>
                        <button onclick="hapusSemuaRiwayat()" class="w-full py-4 border-2 border-dashed border-red-100 text-red-400 rounded-2xl text-xs font-black hover:bg-red-50 hover:border-red-200 transition-all flex items-center justify-center gap-2 group">
                            🗑️ KOSONGKAN SEMUA DATA RIWAYAT
                        </button>
                    </div>
                </section>

                <section class="xl:col-span-8">
                    <div class="bg-white rounded-[32px] shadow-sm border border-slate-100 p-2 md:p-6">
                        <div id="riwayat-list" class="space-y-4">
                            </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="print-area"></div>

    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>
    <script>
        // Pastikan Database Terkoneksi (Gunakan nama DB yang sama dengan halaman Kasir)
        // Jika config.js sudah ada db, baris di bawah bisa dihapus
        if (typeof db === 'undefined') {
            var db = new Dexie("POSPRO_DB"); 
            db.version(1).stores({
                transactions: '++id, waktu, total, bayar, kembali, kasir',
                settings: 'key',
                products: '++id, nama, harga, stock'
            });
        }

        // 1. RENDER RIWAYAT
        async function renderRiwayat() {
            const list = document.getElementById('riwayat-list');
            const filterDate = document.getElementById('filter-tanggal').value;
            
            try {
                let transaksi = await db.transactions.toArray();
                transaksi.sort((a, b) => b.waktu - a.waktu);

                if(filterDate) {
                    transaksi = transaksi.filter(t => {
                        const d = new Date(t.waktu);
                        const tDate = d.toISOString().split('T')[0];
                        return tDate === filterDate;
                    });
                }

                const totalOmzet = transaksi.reduce((a, b) => a + b.total, 0);
                document.getElementById('total-omzet').innerText = `Rp ${totalOmzet.toLocaleString()}`;
                document.getElementById('trx-count').innerText = `${transaksi.length} Transaksi Terdeteksi`;

                if(transaksi.length === 0) {
                    list.innerHTML = `<div class="text-center py-20 text-slate-300 font-black uppercase text-[10px] tracking-widest">Tidak ada transaksi</div>`;
                    return;
                }

                list.innerHTML = transaksi.map(t => `
                    <div class="group bg-white border border-slate-100 hover:border-blue-200 rounded-[28px] p-6 transition-all shadow-sm">
                        <div class="flex flex-col md:flex-row justify-between gap-6">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-4">
                                    <span class="text-[10px] font-black bg-slate-900 text-white px-3 py-1 rounded-full uppercase italic">TRX #${t.id}</span>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${new Date(t.waktu).toLocaleString('id-ID')}</span>
                                </div>
                                
                                <div class="space-y-1 mb-4">
                                    ${t.items.map(item => `
                                        <div class="flex justify-between text-xs text-slate-600 font-medium italic">
                                            <span>${item.nama} <span class="opacity-40 font-black">x${item.qty}</span></span>
                                            <span class="font-bold">Rp ${(item.harga * item.qty).toLocaleString()}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                
                                <div class="flex gap-4 border-t border-slate-50 pt-4">
                                    <div class="flex-1">
                                        <p class="text-[9px] font-black text-slate-300 uppercase">Kasir</p>
                                        <p class="text-[11px] font-bold text-slate-600 uppercase">${t.kasir || 'Admin'}</p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-[9px] font-black text-slate-300 uppercase">Total Akhir</p>
                                        <p class="text-xl font-black text-blue-600 italic">Rp ${t.total.toLocaleString()}</p>
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-row md:flex-col justify-end gap-2 md:w-32">
                                <button onclick="reprintNota(${t.id})" 
                                        class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase hover:bg-blue-600 transition-all tracking-widest shadow-lg shadow-slate-200">
                                    🧾 CETAK ULANG
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                list.innerHTML = "Gagal memuat data.";
            }
        }

        // 2. LOGIC REPRINT (TAJAM - ANTI PUTUS)
        async function reprintNota(id) {
            const t = await db.transactions.get(id);
            if (!t) return alert("Data transaksi tidak ditemukan!");

            const info = await db.settings.get("info_toko") || { nama: "POS PRO", alamat: "Indonesia", wa: "-" };
            
            const area = document.getElementById('print-area');
            area.innerHTML = `
                <div style="padding: 2mm; line-height: 1.2;">
                    <div style="text-align:center; margin-bottom: 5px;">
                        <div class="thermal-bold" style="font-size: 14px; text-transform: uppercase;">${info.nama}</div>
                        <div style="font-size: 9px;">${info.alamat}</div>
                        <div style="font-size: 9px;">WA: ${info.wa}</div>
                        <div class="thermal-bold" style="font-size: 10px; margin-top: 3px;">** REPRINT NOTA **</div>
                    </div>
                    
                    <div style="border-top: 1px dashed #000; margin: 5px 0;"></div>
                    <div style="font-size: 9px;">
                        ID  : #${t.id}<br>
                        TGL : ${new Date(t.waktu).toLocaleString('id-ID')}<br>
                        KSR : ${t.kasir || 'Admin'}
                    </div>
                    <div style="border-top: 1px dashed #000; margin: 5px 0;"></div>

                    ${t.items.map(item => `
                        <div style="margin-bottom: 3px;">
                            <div class="thermal-bold">${item.nama.substring(0, 25)}</div>
                            <div style="display:flex; justify-content:space-between; font-size: 10px;">
                                <span>${item.qty} x ${item.harga.toLocaleString()}</span>
                                <span class="thermal-bold">${(item.qty * item.harga).toLocaleString()}</span>
                            </div>
                        </div>
                    `).join('')}

                    <div style="border-top: 1px dashed #000; margin: 5px 0;"></div>
                    <div style="display:flex; justify-content:space-between; font-size: 13px;" class="thermal-bold">
                        <span>TOTAL</span>
                        <span>${t.total.toLocaleString()}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size: 10px;">
                        <span>BAYAR</span>
                        <span>${t.bayar.toLocaleString()}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size: 10px;">
                        <span>KEMBALI</span>
                        <span>${t.kembali.toLocaleString()}</span>
                    </div>

                    <div style="border-top: 1px dashed #000; margin: 5px 0;"></div>
                    <div style="text-align:center; font-size: 9px; margin-top: 5px;">
                        Terima Kasih Atas Kunjungannya
                    </div>
                    <div style="height: 50px;"></div>
                </div>
            `;
            
            window.print();
        }

        async function hapusSemuaRiwayat() {
            if(confirm("Hapus semua data transaksi? Tindakan ini tidak bisa dibatalkan!")) {
                await db.transactions.clear();
                renderRiwayat();
            }
        }

        // Init
        const dateInput = document.getElementById('filter-tanggal');
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
        
        // Kasih delay dikit biar Dexie siap
        setTimeout(renderRiwayat, 500);
    </script>
</body>
</html>
