<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat - POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* CSS KHUSUS PRINT AGAR HASILNYA BERSIH & TIDAK BERBAYANG */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { 
                visibility: visible; 
                color: #000 !important; 
            }
            #print-area { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 48mm; 
                display: block !important;
            }
            @page { margin: 0; size: auto; }
        }

        /* PAKAI FONT MONOSPACE BIAR PRINTER GAK KERJA KERAS */
        #print-area { 
            display: none; 
            background: white; 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="lg:ml-64 flex flex-col min-h-screen">
        <div id="layout-header"></div>
        <main class="p-4 lg:p-8 flex-1">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight">LOG TRANSAKSI</h2>
                    <p class="text-sm text-slate-500 font-medium">Data penjualan tersimpan aman.</p>
                </div>
                <input type="date" id="filter-tanggal" onchange="renderRiwayat()" 
                       class="p-3 rounded-2xl border-slate-200 text-sm font-bold shadow-sm outline-none">
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
                <section class="xl:col-span-4 space-y-6">
                    <div class="bg-blue-600 rounded-[32px] p-8 text-white shadow-xl shadow-blue-100">
                        <p class="text-[10px] font-black uppercase opacity-80 mb-2">Total Omzet</p>
                        <h2 id="total-omzet" class="text-4xl font-black">Rp 0</h2>
                    </div>
                </section>
                <section class="xl:col-span-8">
                    <div id="riwayat-list" class="space-y-4"></div>
                </section>
            </div>
        </main>
    </div>

    <div id="print-area"></div>

    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>
    <script>
        async function renderRiwayat() {
            const list = document.getElementById('riwayat-list');
            const filterDate = document.getElementById('filter-tanggal').value;
            try {
                let transaksi = await db.transactions.toArray();
                transaksi.sort((a, b) => b.waktu - a.waktu);
                if(filterDate) {
                    transaksi = transaksi.filter(t => new Date(t.waktu).toISOString().split('T')[0] === filterDate);
                }
                document.getElementById('total-omzet').innerText = `Rp ${transaksi.reduce((a, b) => a + b.total, 0).toLocaleString()}`;
                
                list.innerHTML = transaksi.map(t => `
                    <div class="bg-white border border-slate-100 rounded-[28px] p-6 shadow-sm flex flex-col md:flex-row justify-between gap-4">
                        <div class="flex-1">
                            <span class="text-[10px] font-black bg-slate-800 text-white px-3 py-1 rounded-full uppercase">TRX #${t.id}</span>
                            <div class="mt-4 space-y-1">
                                ${t.items.map(item => `<div class="flex justify-between text-xs font-bold uppercase"><span>${item.nama} x${item.qty}</span><span>Rp ${(item.harga * item.qty).toLocaleString()}</span></div>`).join('')}
                            </div>
                            <div class="mt-4 border-t pt-2 text-xl font-black text-blue-600">Rp ${t.total.toLocaleString()}</div>
                        </div>
                        <button onclick="reprintNota(${t.id})" class="bg-slate-900 text-white p-4 rounded-2xl font-black text-[10px] uppercase">🧾 CETAK NOTA</button>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function reprintNota(id) {
            const t = await db.transactions.get(id);
            const info = await db.settings.get("info_toko") || { nama: "POS PRO", alamat: "BANYUWANGI", wa: "0" };
            const area = document.getElementById('print-area');
            
            area.innerHTML = `
                <div style="padding: 1mm; line-height: 1.1; width: 44mm; margin-left: 2mm;">
                    <div style="text-align:center; margin-bottom: 4px;">
                        <div style="font-size: 14px; letter-spacing: 1px;">${info.nama}</div>
                        <div style="font-size: 9px; word-wrap: break-word;">${info.alamat}</div>
                        <div style="font-size: 9px;">WA: ${info.wa}</div>
                        <div style="margin-top: 3px;">-----------------------</div>
                        <div style="font-size: 9px;">** REPRINT NOTA **</div>
                        <div>-----------------------</div>
                    </div>
                    
                    <div style="font-size: 9px; margin-bottom: 4px;">
                        ID  : #${t.id}<br>
                        TGL : ${new Date(t.waktu).toLocaleString('id-ID')}<br>
                        KSR : ADMIN
                    </div>
                    <div>-----------------------</div>

                    <div style="font-size: 9px;">
                        ${t.items.map(item => `
                            <div style="margin-bottom: 2px;">
                                <div style="word-wrap: break-word;">${item.nama}</div>
                                <div style="display:flex; justify-content:space-between;">
                                    <span>${item.qty} X ${item.harga.toLocaleString()}</span>
                                    <span>${(item.qty * item.harga).toLocaleString()}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div>-----------------------</div>
                    <div style="display:flex; justify-content:space-between; font-size: 11px;">
                        <span>TOTAL</span>
                        <span>${t.total.toLocaleString()}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size: 9px;">
                        <span>BAYAR</span>
                        <span>${t.bayar.toLocaleString()}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size: 9px;">
                        <span>KEMBALI</span>
                        <span>${t.kembali.toLocaleString()}</span>
                    </div>
                    <div>-----------------------</div>

                    <div style="text-align:center; font-size: 9px; margin-top: 4px;">
                        TERIMA KASIH
                    </div>
                    <div style="height: 50px;"></div> 
                </div>
            `;
            window.print();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('filter-tanggal').value = new Date().toISOString().split('T')[0];
            renderRiwayat();
        });
    </script>
</body>
</html>
