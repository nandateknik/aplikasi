<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Riwayat - POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        /* MODE PRINT PALING RINGAN */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { 
                visibility: visible; 
                color: #000 !important;
            }
            #print-area { 
                position: absolute; 
                left: 0; top: 0; 
                width: 44mm; /* Diciutke meneh biar gak kepotong */
                display: block !important;
            }
            @page { margin: 0; }
        }

        /* FONT STANDAR PRINTER */
        #print-area { 
            display: none; 
            background: white; 
            font-family: 'Courier New', Courier, monospace; /* Font paling aman */
            font-size: 10px;
            line-height: 1.1;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="lg:ml-64 p-4 lg:p-8">
        <h2 class="text-2xl font-black mb-6 uppercase">Log Transaksi</h2>
        <div id="riwayat-list" class="space-y-3"></div>
    </div>

    <div id="print-area"></div>

    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>
    <script>
        async function renderRiwayat() {
            const list = document.getElementById('riwayat-list');
            try {
                let transaksi = await db.transactions.toArray();
                transaksi.sort((a, b) => b.waktu - a.waktu);
                
                list.innerHTML = transaksi.map(t => `
                    <div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400">#${t.id}</p>
                            <p class="font-black text-blue-600">Rp ${t.total.toLocaleString()}</p>
                        </div>
                        <button onclick="reprintNota(${t.id})" class="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase">Cetak</button>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function reprintNota(id) {
            const t = await db.transactions.get(id);
            const info = await db.settings.get("info_toko") || { nama: "NANDA TEKNIK", alamat: "BANYUWANGI", wa: "0" };
            const area = document.getElementById('print-area');
            
            // Layout Nota Paling Sederhana (Minimalis Pol)
            area.innerHTML = `
                <div style="text-align:center; padding-top: 5px;">
                    <b style="font-size: 14px;">${info.nama.toUpperCase()}</b><br>
                    <span style="font-size: 9px;">${info.alamat.toUpperCase()}</span><br>
                    <span style="font-size: 9px;">WA: ${info.wa}</span><br>
                    ---------------------------
                </div>
                
                <div style="font-size: 9px;">
                    TGL: ${new Date(t.waktu).toLocaleDateString()}<br>
                    ID : #${t.id}
                </div>
                ---------------------------

                <div style="font-size: 9px;">
                    ${t.items.map(item => `
                        <div style="margin-bottom: 2px;">
                            ${item.nama.toUpperCase()}<br>
                            <div style="display:flex; justify-content:space-between;">
                                <span>${item.qty} X ${item.harga.toLocaleString()}</span>
                                <span>${(item.qty * item.harga).toLocaleString()}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>

                ---------------------------
                <div style="display:flex; justify-content:space-between; font-weight: bold; font-size: 11px;">
                    <span>TOTAL</span>
                    <span>${t.total.toLocaleString()}</span>
                </div>
                ---------------------------
                
                <div style="text-align:center; font-size: 9px; margin-top: 5px;">
                    TERIMA KASIH
                </div>
                
                <div style="height: 30px;">.</div> 
            `;
            window.print();
        }

        document.addEventListener('DOMContentLoaded', renderRiwayat);
    </script>
</body>
</html>
