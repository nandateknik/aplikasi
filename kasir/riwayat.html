<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat - POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* SETUP KHUSUS PRINTER IWARE BIAR HITAM PEKAT */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { 
                visibility: visible; 
                color: #000 !important; 
            }
            #print-area { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 48mm; /* Ukuran pas untuk kertas 58mm */
                display: block !important;
            }
            @page { margin: 0; size: auto; }
        }

        /* STYLE NOTA SUPER TEBAL */
        #print-area { 
            display: none; 
            background: white; 
            font-family: 'Arial Black', 'Arial', sans-serif; 
            font-weight: 900;
            text-transform: uppercase;
            -webkit-text-stroke: 0.5px black; /* Bikin printer bakar kertas lebih tebal */
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="lg:ml-64 flex flex-col min-h-screen">
        <div id="layout-header"></div>

        <main class="p-4 lg:p-8 flex-1">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight uppercase">LOG TRANSAKSI</h2>
                    <p class="text-sm text-slate-500 font-medium">Pantau semua aktivitas penjualan.</p>
                </div>
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <div class="relative flex-1 md:flex-none">
                        <label class="absolute -top-2 left-3 bg-white px-1 text-[9px] font-bold text-slate-400 uppercase">Filter Tanggal</label>
                        <input type="date" id="filter-tanggal" onchange="renderRiwayat()" 
                               class="!py-3 !px-4 !rounded-2xl border-slate-200 text-sm font-bold text-slate-700 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
                <section class="xl:col-span-4 space-y-6">
                    <div class="bg-blue-600 rounded-[32px] p-8 text-white shadow-xl shadow-blue-100 relative overflow-hidden">
                        <p class="text-[10px] font-black uppercase opacity-80 tracking-widest mb-2">Total Omzet</p>
                        <h2 id="total-omzet" class="text-4xl font-black tracking-tighter">Rp 0</h2>
                        <div class="mt-6">
                            <span id="trx-count" class="text-xs font-bold bg-white/20 px-3 py-1 rounded-full uppercase">0 Transaksi</span>
                        </div>
                    </div>

                    <div class="bg-white rounded-[32px] p-6 border border-slate-100 shadow-sm">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-4">Zona Bahaya</h4>
                        <button onclick="hapusSemuaRiwayat()" class="w-full py-4 border-2 border-dashed border-red-100 text-red-500 rounded-2xl text-[10px] font-black hover:bg-red-50 transition-all">
                            🗑️ KOSONGKAN SEMUA RIWAYAT
                        </button>
                    </div>
                </section>

                <section class="xl:col-span-8">
                    <div id="riwayat-list" class="space-y-4">
                        </div>
                </section>
            </div>
        </main>
    </div>

    <div id="print-area"></div>

    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>
    <script>
        // 1. FUNGSI TAMPILKAN DATA
        async function renderRiwayat() {
            const list = document.getElementById('riwayat-list');
            const filterDate = document.getElementById('filter-tanggal').value;
            
            try {
                let transaksi = await db.transactions.toArray();
                transaksi.sort((a, b) => b.waktu - a.waktu);

                if(filterDate) {
                    transaksi = transaksi.filter(t => {
                        const d = new Date(t.waktu);
                        const offset = d.getTimezoneOffset() * 60000;
                        const tDate = (new Date(d.getTime() - offset)).toISOString().split('T')[0];
                        return tDate === filterDate;
                    });
                }

                document.getElementById('total-omzet').innerText = `Rp ${transaksi.reduce((a, b) => a + b.total, 0).toLocaleString()}`;
                document.getElementById('trx-count').innerText = `${transaksi.length} Transaksi Terdeteksi`;

                if(transaksi.length === 0) {
                    list.innerHTML = `<div class="bg-white p-20 rounded-[32px] text-center text-slate-300 font-black uppercase text-xs">Belum Ada Transaksi</div>`;
                    return;
                }

                list.innerHTML = transaksi.map(t => `
                    <div class="bg-white border border-slate-100 rounded-[28px] p-6 shadow-sm flex flex-col md:flex-row justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-3">
                                <span class="text-[10px] font-black bg-slate-800 text-white px-3 py-1 rounded-full uppercase">TRX #${t.id}</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase">${new Date(t.waktu).toLocaleString('id-ID')}</span>
                            </div>
                            <div class="space-y-1 mb-4">
                                ${t.items.map(item => `
                                    <div class="flex justify-between text-xs font-bold text-slate-700 uppercase">
                                        <span>${item.nama} x${item.qty}</span>
                                        <span>Rp ${(item.harga * item.qty).toLocaleString()}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="border-t pt-3 flex justify-between items-end">
                                <div>
                                    <p class="text-[8px] font-black text-slate-300 uppercase">Total Transaksi</p>
                                    <p class="text-xl font-black text-blue-600">Rp ${t.total.toLocaleString()}</p>
                                </div>
                            </div>
                        </div>
                        <div class="md:w-32 flex flex-row md:flex-col gap-2">
                            <button onclick="reprintNota(${t.id})" class="flex-1 bg-slate-900 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-slate-200 hover:bg-blue-600 transition-all">
                                🧾 CETAK NOTA
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                list.innerHTML = "Gagal memuat data.";
            }
        }

        // 2. FUNGSI CETAK ULANG (SUPER TEBAL & CAPSLOCK)
        async function reprintNota(id) {
            const t = await db.transactions.get(id);
            if (!t) return alert("Data tidak ditemukan!");

            const info = await db.settings.get("info_toko") || { nama: "POS PRO", alamat: "BANYUWANGI", wa: "0" };
            const area = document.getElementById('print-area');
            
            area.innerHTML = `
                <div style="padding: 2mm; line-height: 1.2; width: 48mm; font-size: 11px;">
                    <div style="text-align:center; margin-bottom: 5px;">
                        <div style="font-size: 16px; margin-bottom: 2px;">${info.nama}</div>
                        <div style="font-size: 10px; word-wrap: break-word; white-space: normal;">${info.alamat}</div>
                        <div style="font-size: 10px;">WA: ${info.wa}</div>
                        <div style="font-size: 11px; margin-top: 4px; border: 1.5px solid #000; display: inline-block; padding: 2px 5px;">** REPRINT **</div>
                    </div>
                    
                    <div style="border-top: 2px dashed #000; margin: 6px 0;"></div>
                    <div style="font-size: 10px;">
                        ID: #${t.id}<br>
                        TGL: ${new Date(t.waktu).toLocaleString('id-ID')}<br>
                        KASIR: ADMIN
                    </div>
                    <div style="border-top: 2px dashed #000; margin: 6px 0;"></div>

                    <div style="margin-bottom: 5px;">
                        ${t.items.map(item => `
                            <div style="margin-bottom: 5px;">
                                <div style="word-wrap: break-word; white-space: normal; font-size: 12px;">${item.nama}</div>
                                <div style="display:flex; justify-content:space-between; font-size: 11px;">
                                    <span>${item.qty} X ${item.harga.toLocaleString()}</span>
                                    <span>${(item.qty * item.harga).toLocaleString()}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div style="border-top: 2px dashed #000; margin: 6px 0;"></div>
                    <div style="display:flex; justify-content:space-between; font-size: 15px;">
                        <span>TOTAL</span>
                        <span>${t.total.toLocaleString()}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size: 11px; margin-top: 2px;">
                        <span>BAYAR</span>
                        <span>${t.bayar.toLocaleString()}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size: 11px;">
                        <span>KEMBALI</span>
                        <span>${t.kembali.toLocaleString()}</span>
                    </div>

                    <div style="border-top: 2px dashed #000; margin: 8px 0;"></div>
                    <div style="text-align:center; font-size: 10px;">
                        TERIMA KASIH<br>
                        ATAS KUNJUNGANNYA
                    </div>
                    <div style="height: 60px;"></div> 
                </div>
            `;
            
            window.print();
        }

        async function hapusSemuaRiwayat() {
            if(confirm("Hapus semua data transaksi?")) {
                await db.transactions.clear();
                renderRiwayat();
            }
        }

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('filter-tanggal');
            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(today.getTime() - offset)).toISOString().split('T')[0];
            dateInput.value = localISOTime;
            renderRiwayat();
        });
    </script>
</body>
</html>
