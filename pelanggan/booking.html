<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Pekerjaan - Nanda Teknik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0d6efd; --bg: #f8f9fc; --dark: #0046b8; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; padding-bottom: 120px; }
        
        /* HEADER STYLE */
        .header-brand { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%); 
            padding: 40px 20px; text-align: center; color: white; 
            border-radius: 0 0 35px 35px; margin-bottom: -50px; 
            position: relative; z-index: 10;
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.2);
        }
        .header-logo { 
            width: 70px; height: 70px; background: white; border-radius: 18px; 
            padding: 10px; margin-bottom: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
        }

        .main-card { 
            border: none; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            background: white; position: relative; z-index: 20;
        }

        /* MAP FIX: Pastikan Z-Index di bawah Card tapi di atas background */
        #map { 
            height: 250px; width: 100%; border-radius: 15px; 
            margin-bottom: 10px; border: 2px solid #eee; 
            z-index: 5 !important; position: relative;
        }
        
        .price-box { 
            background: #f0f7ff; padding: 18px; border-radius: 20px; 
            border: 1px dashed var(--primary); margin-top: 20px; 
        }
        
        .loader-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.85); z-index: 99999; 
            flex-direction: column; align-items: center; justify-content: center; 
        }

        .bottom-nav {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: white; display: flex; justify-content: space-around;
            padding: 12px 5px; border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 10000; border: 1px solid rgba(0,0,0,0.05);
        }
        .nav-item {
            text-decoration: none; color: #94a3b8; text-align: center; 
            font-size: 9px; font-weight: 700; width: 25%;
            display: flex; flex-direction: column; align-items: center;
        }
        .nav-item i { font-size: 1.2rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }

        .form-label-custom { font-size: 11px; font-weight: 800; color: #6c757d; letter-spacing: 0.5px; margin-bottom: 5px; }
        .list-group-item { border: none; background: #f8f9fc; margin-bottom: 5px; border-radius: 12px !important; }
    </style>
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="spinner-border text-primary"></div>
    <span class="mt-2 fw-bold" id="loaderText">Memproses Data Sam...</span>
</div>

<div class="header-brand">
    <img src="logo-none-text.png" class="header-logo" alt="Logo" onerror="this.src='https://via.placeholder.com/70'">
    <h4 class="fw-bold mb-0">BOOKING JASA</h4>
    <p class="small opacity-75 mb-0">Nanda Teknik Banyuwangi</p>
</div>

<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card main-card mb-4">
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label class="form-label-custom text-uppercase">Email Pelanggan</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                            <input type="email" id="email" class="form-control border-start-0" placeholder="nanda@gmail.com" oninput="checkEmailDelay()">
                        </div>
                        <div id="emailMsg" class="small fw-bold mt-2" style="display:none;"></div>
                        <button id="btnReg" class="btn btn-sm btn-outline-danger w-100 mt-2 rounded-pill" style="display:none;" onclick="location.href='register.html'">Email Belum Ada. Daftar Baru?</button>
                    </div>

                    <div class="mb-3">
                        <label class="form-label-custom text-uppercase">Jadwal Pengerjaan</label>
                        <input type="datetime-local" id="tglBooking" class="form-control rounded-3">
                    </div>

                    <div class="mb-3">
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" id="syncAddress" onchange="toggleSync()" disabled>
                            <label class="form-check-label small fw-bold" for="syncAddress">Gunakan alamat pendaftaran</label>
                        </div>
                        <div id="map"></div>
                        <textarea id="alamat" class="form-control small rounded-3" rows="2" placeholder="Tarik pin di peta atau tulis detail alamat..."></textarea>
                        <input type="hidden" id="lat"><input type="hidden" id="lang">
                    </div>

                    <hr class="my-4">

                    <div class="mb-3">
                        <label class="form-label-custom text-uppercase">Detail Pekerjaan / Kerusakan</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-tools text-muted"></i></span>
                            <input type="text" id="judulPekerjaan" class="form-control" placeholder="Contoh: Cuci AC / Pasang CCTV 2 Titik">
                        </div>
                    </div>

                    <ul class="list-group mb-3" id="itemList"></ul>

                    <div class="price-box shadow-sm">
                        <div class="d-flex justify-content-between fw-bold text-primary fs-5">
                            <span>BIAYA TRANSPORT:</span>
                            <span id="txtTotal">Rp 0</span>
                        </div>
                        <p class="small text-muted mb-0 mt-2">*Biaya ini adalah ongkir teknisi ke lokasi Anda dan belum termasuk jasa.</p>
                    </div>

                    <button class="btn btn-primary w-100 mt-4 py-3 fw-bold rounded-pill shadow" onclick="simpanDataNota()">
                        <i class="fas fa-save me-2"></i> SIMPAN BOOKING
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Portal</span></a>
    <a href="update.html" class="nav-item"><i class="fas fa-user-edit"></i><span>Update</span></a>
    <a href="register.html" class="nav-item"><i class="fas fa-user-plus"></i><span>Register</span></a>
    <a href="booking.html" class="nav-item active"><i class="fas fa-calendar-check"></i><span>Booking</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxWksoVFbuF-DHkkLtUcroQ5l20BI4Eom_ukfoYcNfkStscU0jSVmlyN-WChU5HMaqa/exec';
    const KANTOR_COORDS = { lat: -8.1910395, lng: 114.3697974 }; 
    
    let map, marker, timeoutCheck;
    let pelangganData = null;
    let selectedItems = []; 

    window.onload = () => {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('tglBooking').value = now.toISOString().slice(0,16);
        
        initMap();
        loadDaftarHarga();
    };

    function initMap() {
        // Fix for grey tiles: Ensure map container is sized
        setTimeout(() => {
            map = L.map('map').setView([KANTOR_COORDS.lat, KANTOR_COORDS.lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            
            marker = L.marker([KANTOR_COORDS.lat, KANTOR_COORDS.lng], {draggable: true}).addTo(map);
            marker.on('dragend', (e) => {
                const pos = e.target.getLatLng();
                updateLocationInfo(pos.lat, pos.lng);
            });
            
            map.invalidateSize(); // Force refresh map render
        }, 300);
    }

    function updateLocationInfo(lat, lng) {
        document.getElementById('lat').value = lat;
        document.getElementById('lang').value = lng;
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
            .then(res => res.json()).then(data => {
                document.getElementById('alamat').value = data.display_name;
                hitungBiaya();
            });
    }

    function checkEmailDelay() {
        clearTimeout(timeoutCheck);
        timeoutCheck = setTimeout(checkEmail, 800);
    }

    async function checkEmail() {
        const email = document.getElementById('email').value.trim();
        const msgDiv = document.getElementById('emailMsg');
        if(email.length < 5) return;

        msgDiv.style.display = 'block';
        msgDiv.className = "text-muted small mt-2";
        msgDiv.innerHTML = "Mengecek email...";

        try {
            // Gunakan query string untuk GET biar lebih stabil untuk pencarian
            const res = await fetch(`${WEB_APP_URL}?action=getPelangganByEmail&email=${encodeURIComponent(email)}`);
            const result = await res.json();
            
            if(result.success) {
                pelangganData = result.data;
                msgDiv.innerHTML = `<i class="fas fa-check-circle"></i> Pelanggan: ${result.data.nama}`;
                msgDiv.className = "text-success small fw-bold mt-2";
                document.getElementById('btnReg').style.display = 'none';
                document.getElementById('syncAddress').disabled = false;
            } else {
                pelangganData = null;
                msgDiv.style.display = 'none';
                document.getElementById('btnReg').style.display = 'block';
                document.getElementById('syncAddress').disabled = true;
                document.getElementById('syncAddress').checked = false;
            }
        } catch(e) {
            console.error(e);
            msgDiv.innerHTML = "Gagal koneksi server";
        }
    }

    function toggleSync() {
        if(document.getElementById('syncAddress').checked && pelangganData) {
            const lat = parseFloat(pelangganData.lat);
            const lng = parseFloat(pelangganData.lang);
            if(lat && lng) {
                map.setView([lat, lng], 16);
                marker.setLatLng([lat, lng]);
                document.getElementById('alamat').value = pelangganData.alamat;
                document.getElementById('lat').value = lat;
                document.getElementById('lang').value = lng;
                hitungBiaya();
                map.invalidateSize();
            }
        }
    }

    // Variable selectedItems dihapus saja karena sudah tidak pakai keranjang
let biayaTransport = 0;

function hitungBiaya() {
    const lat = document.getElementById('lat').value;
    const lng = document.getElementById('lang').value;
    
    if(lat && lng) {
        let jarak = map.distance([lat, lng], [KANTOR_COORDS.lat, KANTOR_COORDS.lng]) / 1000;
        // Logika bensin Mas Nanda: Jarak > 5km, per km 10rb
        biayaTransport = (jarak > 5) ? Math.ceil(jarak - 5) * 10000 : 0;
    } else {
        biayaTransport = 0;
    }
    
    document.getElementById('txtTotal').innerText = "Rp " + biayaTransport.toLocaleString();
    return biayaTransport;
}

async function simpanDataNota() {
    const email = document.getElementById('email').value.trim();
    const tgl = document.getElementById('tglBooking').value;
    const pekerjaan = document.getElementById('judulPekerjaan').value.trim();
    const lat = document.getElementById('lat').value;
    const lang = document.getElementById('lang').value;
    const alamat = document.getElementById('alamat').value;
    
    const totalNota = hitungBiaya(); // Ini sekarang isinya cuma biaya transport

    if(!email || !tgl || !pekerjaan || !lat) {
        return Swal.fire('Data Kurang Sam', 'Email, Jadwal, Detail Pekerjaan, lan Lokasi kudu lengkap!', 'warning');
    }

    document.getElementById('loader').style.display = 'flex';

    try {
        const payload = {
            action: 'createNota', 
            email: email,
            nama: pelangganData ? pelangganData.nama : "Pelanggan Umum",
            tglPengerjaan: tgl.replace('T', ' '),
            // Karena backend minta 'items' sebagai array, kita kirim biaya transport sebagai satu-satunya item
            items: [{ nama: "Biaya Transport / Bensin", harga: totalNota, qty: 1 }],
            total: totalNota,
            judulPekerjaan: pekerjaan, // Ini akan masuk ke Judul (Kolom C) di Sheet Booking
            lat: lat,
            lang: lang,
            alamat: alamat
        };

        const response = await fetch(WEB_APP_URL, { 
            method: 'POST', 
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload) 
        });

        const res = await response.json();
        document.getElementById('loader').style.display = 'none';

        if(res.success) {
            Swal.fire('Berhasil Sam!', `Booking & Nota Transport (${res.notaId}) wis kesimpen.`, 'success')
                .then(() => location.reload());
        }
    } catch(e) { 
        document.getElementById('loader').style.display = 'none';
        Swal.fire('Error', 'Gagal nyambung server!', 'error'); 
    }
}

    
    </script>
</body>
</html>
