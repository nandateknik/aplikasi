<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir Iware Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        body { font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* CSS KHUSUS IWARE BIAR GAK PUTUS */
        @media print {
            body * { visibility: hidden; }
            #receipt-print, #receipt-print * { visibility: visible; color: #000 !important; }
            #receipt-print { position: absolute; left: 0; top: 0; width: 58mm; display: block !important; }
            @page { margin: 0; }
        }

        #receipt-print { 
            width: 58mm; font-family: Arial, sans-serif; font-size: 11px;
            line-height: 1.1; padding: 2mm; display: none; background: white;
        }

        /* Trik Bold buat Iware */
        .iware-bold {
            font-weight: 900 !important;
            -webkit-text-stroke: 0.3px black;
            text-shadow: 0.1px 0.1px 0 black;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden">

<header id="header" class="bg-indigo-700 text-white p-4 shadow-lg flex justify-between items-center">
    <h1 class="font-bold text-lg">KASIR IWARE</h1>
    <div id="user-tag" class="text-xs opacity-75">Admin</div>
</header>

<main class="flex-1 overflow-y-auto p-4 pb-32">
    
    <div id="view-dashboard" class="view-content space-y-4">
        <div class="bg-white p-6 rounded-3xl shadow-sm border">
            <p class="text-gray-500 text-sm">Omzet Hari Ini</p>
            <h2 id="dash-total" class="text-2xl font-black text-indigo-700">Rp 0</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="switchView('kasir')" class="bg-white p-6 rounded-3xl border flex flex-col items-center gap-2">
                <i data-lucide="shopping-cart" class="text-indigo-600"></i><span class="font-bold">Kasir</span>
            </button>
            <button onclick="switchView('gudang')" class="bg-white p-6 rounded-3xl border flex flex-col items-center gap-2">
                <i data-lucide="box" class="text-orange-500"></i><span class="font-bold">Barang</span>
            </button>
        </div>
    </div>

    <div id="view-gudang" class="view-content hidden space-y-4">
        <div class="flex justify-between items-center">
            <h2 class="font-bold text-xl">Stok Barang</h2>
            <button onclick="openProductModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> Tambah
            </button>
        </div>
        <div id="inventory-list" class="space-y-2"></div>
    </div>

    <div id="view-kasir" class="view-content hidden space-y-4">
        <input type="text" placeholder="Cari barang..." class="w-full p-4 rounded-2xl border outline-none focus:ring-2 ring-indigo-500" onkeyup="searchProduct(this.value)">
        <div id="product-list" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="view-laporan" class="view-content hidden space-y-4">
        <h2 class="font-bold text-xl">Riwayat Transaksi</h2>
        <div id="history-list" class="space-y-3"></div>
    </div>

</main>

<nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-4">
    <button onclick="switchView('dashboard')" class="nav-btn text-indigo-600" id="nav-dashboard"><i data-lucide="layout-grid"></i></button>
    <button onclick="switchView('kasir')"
