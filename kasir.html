<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KasirPintar Bold Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }

        /* --- TRICK BOLD THERMAL PRINTER --- */
        @media print {
            body * { visibility: hidden; }
            #receipt-print, #receipt-print * { 
                visibility: visible; 
                color: #000 !important;
            }
            #receipt-print { 
                position: absolute; left: 0; top: 0; width: 58mm; 
                display: block !important; padding: 0; margin: 0;
            }
            @page { margin: 0; size: auto; }
        }

        #receipt-print { 
            width: 58mm; 
            /* Menggunakan Arial karena lebih "gemuk" pixelnya daripada Courier */
            font-family: Arial, Helvetica, sans-serif; 
            font-size: 11px;
            line-height: 1.1;
            background: white;
            padding: 5px;
        }

        /* TRICK: Membuat font ekstra hitam dengan text-shadow & stroke */
        .bold-text {
            font-weight: 900 !important;
            -webkit-text-stroke: 0.4px black; /* Menambah ketebalan garis huruf */
            text-shadow: 0.1px 0.1px 0 black; /* Trik agar printer membakar lebih lama */
        }

        .line-divider {
            border-top: 1.5px solid black !important;
            margin: 4px 0;
        }

        .view-content { animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">

<div id="login-screen" class="fixed inset-0 bg-indigo-700 z-[100] flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8">
        <h2 class="text-2xl font-bold mb-4">KasirPintar</h2>
        <form onsubmit="handleLogin(event)" class="space-y-4">
            <input type="text" id="login-username" placeholder="Admin" class="w-full p-4 bg-slate-100 rounded-2xl outline-none" required>
            <input type="password" id="login-password" placeholder="123" class="w-full p-4 bg-slate-100 rounded-2xl outline-none" required>
            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">Masuk</button>
        </form>
    </div>
</div>

<header id="main-header" class="bg-white border-b px-6 py-4 flex justify-between items-center hidden">
    <h1 id="page-title" class="text-xl font-bold text-indigo-700">Dashboard</h1>
    <button onclick="handleLogout()"><i data-lucide="log-out"></i></button>
</header>

<main id="main-content" class="flex-1 overflow-y-auto pb-32 hidden">
    <div id="view-dashboard" class="view-content p-6 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-3xl border shadow-sm">
                <p class="text-xs text-slate-400">Total Penjualan</p>
                <h3 class="font-bold text-lg" id="dash-sales">0</h3>
            </div>
            <button onclick="switchView('kasir')" class="bg-indigo-600 text-white rounded-3xl font-bold">Buka Kasir</button>
        </div>
    </div>

    <div id="view-kasir" class="view-content hidden p-4 space-y-4">
        <input type="text" placeholder="Cari barang..." class="w-full p-4 bg-white rounded-2xl shadow-sm" onkeyup="searchProduct(this.value)">
        <div id="product-list" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="view-laporan" class="view-content hidden p-4 space-y-4">
        <h2 class="font-bold text-lg">Riwayat & Cetak Ulang</h2>
        <div id="history-list" class="space-y-3"></div>
    </div>

    <div id="view-settings" class="view-content hidden p-4 space-y-4">
        <div class="bg-white p-6 rounded-3xl border space-y-3">
            <input type="text" id="set-name" placeholder="Nama Toko" class="w-full p-3 border rounded-xl">
            <input type="text" id="set-address" placeholder="Alamat" class="w-full p-3 border rounded-xl">
            <input type="text" id="set-phone" placeholder="No Telp" class="w-full p-3 border rounded-xl">
            <button onclick="saveShopSettings()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Simpan Info Toko</button>
        </div>
    </div>
</main>

<nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-4 hidden">
    <button onclick="switchView('dashboard')" id="nav-dashboard" class="text-indigo-600"><i data-lucide="home"></i></button>
    <button onclick="switchView('kasir')" id="nav-kasir" class="text-slate-400"><i data-lucide="shopping-cart"></i></button>
    <button onclick="switchView('laporan')" id="nav-laporan" class="text-slate-400"><i data-lucide="history"></i></button>
    <button onclick="switchView('settings')" id="nav-settings" class="text-slate-400"><i data-lucide="settings"></i></button>
</nav>

<div id="cart-bar" class="fixed bottom-24 left-4 right-4 bg-slate-900 text-white p-4 rounded-3xl flex justify-between items-center hidden">
    <h4 id="cart-total-text" class="font-bold">Rp 0</h4>
    <button onclick="processCheckout()" class="bg-emerald-500 px-6 py-2 rounded-xl font-bold">BAYAR</button>
</div>

<div id="receipt-print"></div>

<script>
    const db = new Dexie("KasirBoldDB");
    db.version(1).stores({
        products: '++id, name, buy_price, sell_price, stock',
        transactions: '++id, date, total, profit',
        settings: 'key, value',
        users: '++id, username, password'
    });

    let cart = [];

    async function init() {
        if (await db.users.count() === 0) await db.users.add({username:'admin', password:'123'});
        refreshData();
        lucide.createIcons();
    }

    async function handleLogin(e) {
        e.preventDefault();
        document.getElementById('login-screen').classList.add('hidden');
        ['main-header', 'main-content', 'bottom-nav'].forEach(id => document.getElementById(id).classList.remove('hidden'));
        switchView('dashboard');
    }

    function switchView(view) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
        document.getElementById(`view-${view}`).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-indigo-600', 'text-slate-400'));
        document.getElementById(`nav-${view}`).classList.replace('text-slate-400', 'text-indigo-600');
        refreshData();
    }

    async function refreshData() {
        const prods = await db.products.toArray();
        const trxs = await db.transactions.toArray();
        
        // Render Kasir
        searchProduct("");

        // Render Laporan & Reprint
        document.getElementById('history-list').innerHTML = trxs.reverse().map(t => `
            <div class="bg-white p-4 rounded-2xl border flex justify-between items-center">
                <div>
                    <p class="font-bold">#TRX-${t.id}</p>
                    <p class="text-[10px] text-slate-400">${new Date(t.date).toLocaleString()}</p>
                </div>
                <button onclick="reprint(${t.id})" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2">
                    <i data-lucide="printer" class="w-3 h-3"></i> RE-PRINT
                </button>
            </div>
        `).join('');

        // Settings
        const s = await db.settings.toArray();
        const conf = s.reduce((a,c) => ({...a, [c.key]: c.value}), {});
        if(conf.name) document.getElementById('set-name').value = conf.name;

        lucide.createIcons();
    }

    async function searchProduct(q) {
        const prods = await db.products.filter(p => p.name.toLowerCase().includes(q.toLowerCase())).toArray();
        document.getElementById('product-list').innerHTML = prods.map(p => `
            <div onclick="addToCart(${p.id})" class="bg-white p-4 rounded-2xl border shadow-sm active:scale-95 transition">
                <h4 class="font-bold text-xs truncate">${p.name}</h4>
                <p class="text-indigo-600 font-bold">Rp ${p.sell_price.toLocaleString()}</p>
            </div>
        `).join('');
    }

    function addToCart(id) {
        db.products.get(id).then(p => {
            const exists = cart.find(c => c.id === id);
            if (exists) exists.qty++; else cart.push({...p, qty: 1});
            updateCart();
        });
    }

    function updateCart() {
        const total = cart.reduce((s,i) => s + (i.sell_price * i.qty), 0);
        document.getElementById('cart-total-text').innerText = "Total: Rp " + total.toLocaleString();
        document.getElementById('cart-bar').classList.toggle('hidden', cart.length === 0);
    }

    async function processCheckout() {
        let total = 0, profit = 0;
        cart.forEach(i => {
            total += (i.sell_price * i.qty);
            profit += (i.sell_price - i.buy_price) * i.qty;
        });
        const trx = { date: new Date().toISOString(), total, profit, items: JSON.parse(JSON.stringify(cart)) };
        const id = await db.transactions.add(trx);
        trx.id = id;
        doPrint(trx);
        cart = []; updateCart(); refreshData();
    }

    async function reprint(id) {
        const trx = await db.transactions.get(id);
        doPrint(trx);
    }

    async function doPrint(trx) {
        const s = await db.settings.toArray();
        const conf = s.reduce((a,c) => ({...a, [c.key]: c.value}), {});
        const area = document.getElementById('receipt-print');
        
        area.innerHTML = `
            <div style="text-align:center; margin-bottom: 8px;">
                <div class="bold-text" style="font-size: 15px; margin-bottom: 2px;">${conf.name || 'TOKO SUKSES'}</div>
                <div style="font-size: 10px;">${conf.address || 'Jl. Raya No. 123'}</div>
                <div style="font-size: 10px;">Telp: ${conf.phone || '0812345678'}</div>
            </div>
            <div class="line-divider"></div>
            <div style="font-size: 10px; margin-bottom: 5px;">
                NO: #TRX-${trx.id}<br>
                TGL: ${new Date(trx.date).toLocaleString('id-ID')}
            </div>
            <div class="line-divider"></div>
            ${trx.items.map(i => `
                <div style="display:flex; justify-content:space-between; margin-bottom: 3px;">
                    <div style="flex: 1; font-size: 11px;" class="bold-text">${i.name}</div>
                    <div style="width: 30px; text-align: center; font-size: 11px;">${i.qty}</div>
                    <div style="width: 70px; text-align: right; font-size: 11px;" class="bold-text">${(i.price || i.sell_price * i.qty).toLocaleString()}</div>
                </div>
            `).join('')}
            <div class="line-divider"></div>
            <div style="display:flex; justify-content:space-between; font-size: 14px; margin-top: 5px;" class="bold-text">
                <span>TOTAL</span>
                <span>${trx.total.toLocaleString()}</span>
            </div>
            <div class="line-divider"></div>
            <div style="text-align:center; font-size: 10px; margin-top: 10px;">
                TERIMA KASIH ATAS KUNJUNGANNYA<br>
                BARANG TIDAK DAPAT DITUKAR
            </div>
            <div style="height: 50px;"></div> `;
        window.print();
    }

    async function saveShopSettings() {
        await db.settings.put({key:'name', value: document.getElementById('set-name').value});
        await db.settings.put({key:'address', value: document.getElementById('set-address').value});
        await db.settings.put({key:'phone', value: document.getElementById('set-phone').value});
        alert("Profil Toko Disimpan!");
    }

    function handleLogout() { location.reload(); }
    init();
</script>
</body>
</html>
