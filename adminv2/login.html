<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login CRM Jasa Servis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Login CRM</h3>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" id="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="btnLogin">Masuk</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            btn.disabled = true;
            btn.innerText = "Mengecek...";

            try {
                // Ambil data dari sheet Teknisi
                const dataTeknisi = await CONFIG.getData("Teknisi", "read");
                
                // Cari teknisi yang cocok dan is_active-nya TRUE
                const found = dataTeknisi.find(t => t.username === user && t.password === pass && t.is_active === "TRUE");

                if (found) {
                    Swal.fire('Berhasil!', `Selamat datang, ${found.nama}`, 'success').then(() => {
                        localStorage.setItem('userCRM', JSON.stringify(found));
                        window.location.href = "index.html"; // Ke Dashboard
                    });
                } else {
                    Swal.fire('Gagal!', 'Username/Password salah atau akun tidak aktif', 'error');
                }
            } catch (err) {
                Swal.fire('Error!', 'Terjadi kesalahan koneksi', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = "Masuk";
            }
        });
    </script>
</body>
</html>
