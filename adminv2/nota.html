<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nota Digital | Nanda Teknik</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        :root { --premium-blue: #007AFF; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        
        /* Layout Fixes */
        #app { min-height: 100vh; padding-bottom: 100px; } /* Biar ga ketutup Bottom Nav */
        
        .invoice-preview { background: #fff; padding: 25px; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); }
        .nav-pills .nav-link { border-radius: 12px; font-weight: 600; color: #666; font-size: 14px; border: 1px solid transparent; }
        .nav-pills .nav-link.active { background-color: var(--premium-blue); color: white; box-shadow: 0 4px 10px rgba(0,122,255,0.3); }
        
        .nota-card { border-radius: 18px; border: none; transition: 0.3s; background: white; margin-bottom: 12px; transition: 0.3s; }
        .nota-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important; }
        
        .badge-lunas { background-color: #34C759; color: #fff; padding: 6px 12px; }
        .badge-belum { background-color: #FF9500; color: #fff; padding: 6px 12px; }
        
        .qty-control { display: flex; align-items: center; gap: 10px; justify-content: center; }
        .qty-btn { cursor: pointer; font-size: 1.2rem; transition: 0.2s; color: var(--premium-blue); }
        .qty-btn:active { transform: scale(0.8); }

        /* Print Optimization */
        @media print {
            .d-print-none, .nav, .btn, .qty-control i, .input-group, .navbar, .bottom-nav { display: none !important; }
            .invoice-preview { box-shadow: none; padding: 0; border: none; }
            body { background: white; padding: 0; margin: 0; }
            #app { padding: 0; }
        }
    </style>
</head>
<body class="bg-light">

<div id="app">
    <div class="container pt-4 pb-2 d-print-none">
        <h4 class="fw-bold"><i class="bi bi-receipt-cutoff text-primary me-2"></i>Manajemen Nota</h4>
    </div>

    <div class="container py-2">
        <ul class="nav nav-pills nav-fill bg-white p-1 rounded-4 shadow-sm mb-4 d-print-none" id="notaTab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active py-2" id="tab-buat" data-bs-toggle="pill" data-bs-target="#content-buat">
                    <i class="bi bi-pencil-square me-1"></i> Detail Nota
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link py-2" id="tab-list" data-bs-toggle="pill" data-bs-target="#content-list" onclick="fetchNotaHistory()">
                    <i class="bi bi-clock-history me-1"></i> Riwayat Nota
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="content-buat">
                <div class="d-flex gap-2 mb-3 d-print-none">
                    <button class="btn btn-primary rounded-4 shadow flex-fill fw-bold py-3" onclick="saveNota()">
                        <i class="bi bi-cloud-arrow-up-fill me-1"></i> SIMPAN DATA
                    </button>
                    <button class="btn btn-dark rounded-4 shadow flex-fill fw-bold py-3" onclick="window.print()">
                        <i class="bi bi-printer-fill me-1"></i> CETAK
                    </button>
                </div>

                <div class="invoice-preview mb-5" id="printableArea">
                    <div class="row mb-4">
                        <div class="col-7">
                            <h4 class="fw-bold text-primary mb-0">NANDA TEKNIK</h4>
                            <p class="small text-muted mb-3" style="font-size: 11px; letter-spacing: 1px;">SERVICE & SPAREPART AC</p>
                            
                            <div class="mt-3">
                                <label class="small fw-bold text-muted d-print-none">Kepada Yth:</label>
                                <select id="selectPelangganNota" class="form-select border-0 bg-light fw-bold mb-1 rounded-3 shadow-none" onchange="updateInfoPelanggan()">
                                    <option value="">-- Pilih Pelanggan --</option>
                                </select>
                                <div id="penerimaAlamat" class="text-muted small" style="line-height: 1.4; max-width: 250px;">-</div>
                            </div>
                        </div>
                        <div class="col-5 text-end">
                            <div class="small text-muted text-uppercase" style="font-size: 10px;">No. Invoice</div>
                            <div id="noNota" class="fw-bold text-dark fs-5">#NEW</div>
                            <div class="mt-3">
                                <label class="small fw-bold text-muted d-print-none">Tgl Nota:</label>
                                <input type="date" id="tglNota" class="form-control form-control-sm border-0 bg-light text-end p-0 shadow-none fw-bold">
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table align-middle" style="font-size: 13px;">
                            <thead class="table-light">
                                <tr class="border-top border-bottom border-2">
                                    <th class="py-3 border-0">DESKRIPSI JASA / PART</th>
                                    <th class="text-center py-3 border-0" style="width: 100px;">QTY</th>
                                    <th class="text-end py-3 border-0" style="width: 120px;">TOTAL</th>
                                </tr>
                            </thead>
                            <tbody id="itemNotaBody"></tbody>
                            <tfoot>
                                <tr class="border-top border-2">
                                    <td colspan="2" class="text-end fw-bold py-4">TOTAL PEMBAYARAN</td>
                                    <td id="totalNota" class="text-end fw-bold text-primary py-4 fs-5">Rp 0</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>

                    <div class="mt-4 p-3 rounded-4 bg-light d-print-none border-dashed border-2">
                        <h6 class="fw-bold mb-3 small text-muted text-uppercase"><i class="bi bi-plus-circle me-1"></i>Tambah Jasa Manual</h6>
                        <div class="row g-2">
                            <div class="col-12 col-md-5">
                                <input type="text" id="addName" class="form-control border-0 rounded-3 shadow-sm" placeholder="Nama Jasa / Barang..." list="listHarga">
                                <datalist id="listHarga"></datalist>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="input-group shadow-sm rounded-3 overflow-hidden">
                                    <span class="input-group-text border-0 bg-white small text-muted">Rp</span>
                                    <input type="number" id="addPrice" class="form-control border-0" placeholder="Harga">
                                </div>
                            </div>
                            <div class="col-3 col-md-2">
                                <input type="number" id="addQty" class="form-control border-0 rounded-3 shadow-sm text-center" value="1">
                            </div>
                            <div class="col-3 col-md-2">
                                <button class="btn btn-primary w-100 rounded-3 shadow-sm" onclick="addItemManual()"><i class="bi bi-plus-lg"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="content-list">
                <div class="input-group bg-white rounded-4 shadow-sm mb-3 p-1">
                    <span class="input-group-text bg-white border-0"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" id="filterSearch" class="form-control border-0 shadow-none" placeholder="Cari Nota atau Pelanggan..." onkeyup="renderHistoryCards()">
                </div>
                <div id="loadingNota" class="text-center py-5" style="display:none;">
                    <div class="spinner-border text-primary spinner-border-sm"></div>
                    <p class="small text-muted mt-2">Sinkronisasi data...</p>
                </div>
                <div id="historyNotaBody"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/layout.js"></script> <script>
    let currentCart = [];
    let pelangganData = [];
    let hargaData = [];
    let notaHistory = [];

    document.addEventListener("DOMContentLoaded", async () => {
        document.getElementById('tglNota').valueAsDate = new Date();
        await Promise.all([fetchPelanggan(), fetchHarga()]);
        
        const urlParams = new URLSearchParams(window.location.search);
        const notaIdParam = urlParams.get('id');
        
        if (notaIdParam) {
            loadNotaById(notaIdParam);
        } else {
            document.getElementById('noNota').innerText = `INV-${Date.now().toString().slice(-6)}`;
        }
    });

    async function fetchPelanggan() {
        try {
            const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Pelanggan' }) });
            pelangganData = await res.json();
            let opt = '<option value="">-- Pilih Pelanggan --</option>';
            pelangganData.forEach(p => opt += `<option value="${p.email}">${p.nama}</option>`);
            document.getElementById('selectPelangganNota').innerHTML = opt;
        } catch(e) { console.error("Gagal load pelanggan"); }
    }

    async function fetchHarga() {
        try {
            const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Harga' }) });
            hargaData = await res.json();
            let listHtml = '';
            hargaData.forEach(h => {
                const n = h.nama || h.Nama || h.Jasa;
                const p = h.harga || h.Harga;
                listHtml += `<option value="${n}">Rp ${parseInt(p).toLocaleString()}</option>`;
            });
            document.getElementById('listHarga').innerHTML = listHtml;
        } catch(e) { console.error("Gagal load harga"); }
    }

    document.getElementById('addName').addEventListener('input', function(e) {
        const val = e.target.value;
        const item = hargaData.find(x => (x.nama || x.Nama || x.Jasa) === val);
        if (item) document.getElementById('addPrice').value = item.harga || item.Harga;
    });

    async function loadNotaById(id) {
        Swal.fire({ title: 'Memuat Nota...', didOpen: () => Swal.showLoading() });
        try {
            const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Nota' }) });
            const allNota = await res.json();
            const data = allNota.find(n => n.id === id);
            
            if (data) {
                document.getElementById('noNota').innerText = data.id;
                document.getElementById('tglNota').value = data.tanggal;
                document.getElementById('selectPelangganNota').value = data.email;
                updateInfoPelanggan();
                currentCart = JSON.parse(data.items_json || '[]');
                renderItems();
                Swal.close();
                // Switch tab ke detail
                bootstrap.Tab.getInstance(document.getElementById('tab-buat')).show();
            }
        } catch(e) { Swal.fire('Error', 'Gagal ambil data', 'error'); }
    }

    function addItemManual() {
        const n = document.getElementById('addName').value;
        const p = parseInt(document.getElementById('addPrice').value);
        const q = parseInt(document.getElementById('addQty').value);
        if(!n || isNaN(p)) return Swal.fire('Opps', 'Nama & Harga harus diisi', 'warning');
        currentCart.push({ item: n, price: p, qty: q, total: p * q });
        renderItems();
        document.getElementById('addName').value = '';
        document.getElementById('addPrice').value = '';
    }

    function renderItems() {
        let html = '';
        let total = 0;
        currentCart.forEach((item, i) => {
            total += item.total;
            html += `
                <tr class="border-bottom">
                    <td class="py-3">
                        <div class="fw-bold text-dark">${item.item}</div>
                        <div class="text-muted small" style="font-size: 11px">@ Rp ${parseInt(item.price).toLocaleString()}</div>
                    </td>
                    <td class="text-center">
                        <div class="qty-control d-print-none">
                            <i class="bi bi-dash-circle qty-btn" onclick="updateQty(${i}, -1)"></i>
                            <span class="fw-bold" style="min-width: 25px">${item.qty}</span>
                            <i class="bi bi-plus-circle qty-btn" onclick="updateQty(${i}, 1)"></i>
                        </div>
                        <span class="d-none d-print-block">${item.qty}</span>
                    </td>
                    <td class="text-end fw-bold">Rp ${parseInt(item.total).toLocaleString()}</td>
                </tr>`;
        });
        if(currentCart.length === 0) html = '<tr><td colspan="3" class="text-center py-5 text-muted">Belum ada item dalam nota ini.</td></tr>';
        document.getElementById('itemNotaBody').innerHTML = html;
        document.getElementById('totalNota').innerText = "Rp " + total.toLocaleString();
    }

    function updateQty(index, delta) {
        currentCart[index].qty += delta;
        if (currentCart[index].qty <= 0) currentCart.splice(index, 1);
        else currentCart[index].total = currentCart[index].qty * currentCart[index].price;
        renderItems();
    }

    async function saveNota() {
        const id = document.getElementById('noNota').innerText;
        const tgl = document.getElementById('tglNota').value;
        const email = document.getElementById('selectPelangganNota').value;
        const totalVal = currentCart.reduce((sum, item) => sum + item.total, 0);

        if(!email || currentCart.length === 0) return Swal.fire('Data Belum Lengkap', 'Pilih pelanggan dan masukkan item jasa.', 'warning');

        Swal.fire({ title: 'Menyimpan ke Database...', didOpen: () => Swal.showLoading() });
        try {
            await fetch(CONFIG.GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'insert', 
                    sheet: 'Nota',
                    data: { id: id, tanggal: tgl, email: email, items_json: JSON.stringify(currentCart), total: totalVal, status: 'Belum Lunas' }
                })
            });
            Swal.fire('Berhasil!', 'Nota telah disimpan.', 'success');
        } catch (e) { Swal.fire('Error', 'Gagal terhubung ke server', 'error'); }
    }

    async function fetchNotaHistory() {
        const container = document.getElementById('historyNotaBody');
        document.getElementById('loadingNota').style.display = 'block';
        try {
            const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Nota' }) });
            notaHistory = await res.json();
            renderHistoryCards();
        } catch (e) { container.innerHTML = '<p class="text-center py-5">Gagal muat riwayat.</p>'; }
        document.getElementById('loadingNota').style.display = 'none';
    }

    function renderHistoryCards() {
        const search = document.getElementById('filterSearch').value.toLowerCase();
        const container = document.getElementById('historyNotaBody');
        const filtered = notaHistory.filter(n => n.id.toLowerCase().includes(search) || n.email.toLowerCase().includes(search)).reverse();
        
        container.innerHTML = filtered.map(n => {
            const p = pelangganData.find(x => x.email === n.email);
            const badge = n.status === 'Lunas' ? 'badge-lunas' : 'badge-belum';
            return `
            <div class="nota-card shadow-sm p-3 mb-3 border-start border-5 ${n.status === 'Lunas' ? 'border-success' : 'border-warning'}">
                <div class="d-flex justify-content-between">
                    <div><span class="fw-bold text-primary">${n.id}</span><br><small class="text-muted">${n.tanggal}</small></div>
                    <span class="badge ${badge} rounded-pill align-self-center" onclick="updateStatusNota('${n.id}', '${n.status}')" style="cursor:pointer">
                        ${n.status} <i class="bi bi-arrow-repeat ms-1"></i>
                    </span>
                </div>
                <div class="d-flex justify-content-between align-items-end mt-3">
                    <div>
                        <div class="small text-muted" style="font-size:10px">PELANGGAN</div>
                        <div class="fw-bold">${p ? p.nama : n.email}</div>
                    </div>
                    <div class="text-end">
                        <div class="fw-bold text-dark fs-5">Rp ${parseInt(n.total || 0).toLocaleString()}</div>
                        <button class="btn btn-sm btn-outline-primary rounded-pill px-3 mt-1" onclick="loadNotaById('${n.id}')">Buka / Edit</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    async function updateStatusNota(id, oldStatus) {
        const newStatus = oldStatus === 'Lunas' ? 'Belum Lunas' : 'Lunas';
        Swal.fire({ title: 'Mengupdate Status...', didOpen: () => Swal.showLoading() });
        await fetch(CONFIG.GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'update', sheet: 'Nota', key: 'id', id: id, data: { status: newStatus } })
        });
        Swal.close();
        fetchNotaHistory();
    }

    function updateInfoPelanggan() {
        const email = document.getElementById('selectPelangganNota').value;
        const p = pelangganData.find(x => x.email === email);
        document.getElementById('penerimaAlamat').innerText = p ? p.alamat : '-';
    }
</script>
</body>
</html>
