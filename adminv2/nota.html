<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Manajemen Nota | Service App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div id="app">
    <div class="container-fluid py-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="fw-bold mb-0">Daftar Nota Pembayaran</h5>
                <div class="d-flex gap-2">
                    <input type="text" id="searchNota" class="form-control form-control-sm" placeholder="Cari No Nota..." onkeyup="loadNota()">
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>No. Nota</th>
                                <th>Tanggal</th>
                                <th>Pelanggan</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th class="text-end">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="notaTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/config.js"></script>
<script src="js/layout.js"></script>
<script src="js/template-dokumen.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", loadNota);

    async function loadNota() {
        const res = await fetch(CONFIG.GAS_URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'read', sheet: 'Nota' }) 
        });
        const data = await res.json();
        let html = '';
        data.reverse().forEach(n => {
            html += `
            <tr>
                <td class="fw-bold text-primary">#${n.id}</td>
                <td>${n.tanggal}</td>
                <td>${n.email}</td>
                <td>Rp ${parseInt(n.total).toLocaleString()}</td>
                <td><span class="badge ${n.status === 'Lunas' ? 'bg-success' : 'bg-warning'}">${n.status}</span></td>
                <td class="text-end">
                    <button class="btn btn-sm btn-danger" onclick="generatePDF('${n.id}')">
                        <i class="bi bi-file-earmark-pdf"></i> PDF
                    </button>
                    <button class="btn btn-sm btn-outline-primary" onclick="kirimEmail('${n.id}')">
                        <i class="bi bi-envelope"></i>
                    </button>
                </td>
            </tr>`;
        });
        document.getElementById('notaTableBody').innerHTML = html;
    }

    async function generatePDF(notaId) {
        Swal.fire({ title: 'Mempersiapkan PDF...', didOpen: () => Swal.showLoading() });

        // 1. Ambil detail nota dari GAS
        const res = await fetch(CONFIG.GAS_URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'read', sheet: 'Nota', search: notaId }) 
        });
        const allData = await res.json();
        const n = allData.find(x => x.id == notaId);

        if (!n) return Swal.fire("Error", "Data tidak ditemukan", "error");

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // 2. Gunakan Template Header
        window.docTemplate.header(doc, "NOTA PEMBAYARAN", n.id);

        // 3. Info Pelanggan
        doc.setFontSize(10);
        doc.text("Ditujukan Kepada:", 14, 55);
        doc.setFont("helvetica", "bold");
        doc.text(n.email, 14, 60); // Bisa di-lookup ke data pelanggan jika perlu nama lengkap
        doc.setFont("helvetica", "normal");
        doc.text("Tanggal Terbit: " + n.tanggal, 196, 60, { align: "right" });

        // 4. Tabel Item (Parsing items_json)
        const items = JSON.parse(n.items_json);
        const tableRows = items.map(it => [
            it.item,
            it.qty,
            "Rp " + parseInt(it.price).toLocaleString(),
            "Rp " + parseInt(it.total).toLocaleString()
        ]);

        // Tambahkan baris Akomodasi jika ada
        if (n.akomodasi && n.akomodasi > 0) {
            tableRows.push(["Biaya Akomodasi (Transport)", "1", "Rp " + parseInt(n.akomodasi).toLocaleString(), "Rp " + parseInt(n.akomodasi).toLocaleString()]);
        }

        doc.autoTable({
            startY: 70,
            head: [['Deskripsi Jasa/Part', 'Qty', 'Harga Satuan', 'Subtotal']],
            body: tableRows,
            theme: 'striped',
            headStyles: { fillGray: [40, 40, 40] }
        });

        // 5. Total Akhir
        const finalY = doc.lastAutoTable.finalY + 10;
        doc.setFontSize(12);
        doc.setFont("helvetica", "bold");
        doc.text("TOTAL PEMBAYARAN:", 130, finalY);
        doc.text("Rp " + parseInt(n.total).toLocaleString(), 196, finalY, { align: "right" });

        // 6. Footer & Save
        window.docTemplate.footer(doc);
        
        doc.save(`Nota_${n.id}.pdf`);
        Swal.close();
    }
</script>
</body>
</html>
