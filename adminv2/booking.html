<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Booking & Nota | Nanda Teknik</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        #map { height: 200px; border-radius: 15px; margin-bottom: 10px; z-index: 1; }
        .card-premium { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: none; padding: 20px; margin-bottom: 15px; }
        .item-row { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9rem; }
    </style>
</head>
<body class="bg-light pb-5">

    <div class="container py-4">
        <h4 class="fw-bold mb-4"><i class="bi bi-calendar-check me-2 text-primary"></i>Booking & Estimasi</h4>

        <form id="formBooking">
            <div class="card-premium">
                <h6 class="fw-bold mb-3 small text-muted text-uppercase">Informasi Pengerjaan</h6>
                <div class="mb-3">
                    <label class="small fw-bold">Pilih Pelanggan</label>
                    <select id="selectPelanggan" class="form-select border-0 bg-light" onchange="fillPelangganData()" required>
                        <option value="">-- Pilih Pelanggan --</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold">Perihal / Judul Pekerjaan</label>
                    <input type="text" name="judul" class="form-control border-0 bg-light" placeholder="Contoh: Service AC Ruang Tamu" required>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold">Tanggal & Waktu</label>
                    <input type="datetime-local" name="tanggal" id="tglInput" class="form-control border-0 bg-light" required>
                </div>
            </div>

            <div class="card-premium">
                <h6 class="fw-bold mb-3 small text-muted text-uppercase">Lokasi & Jarak</h6>
                <div id="map"></div>
                <div class="row g-2">
                    <div class="col-4"><input type="text" name="lat" id="latInput" class="form-control form-control-sm border-0 bg-light text-center" readonly placeholder="Lat"></div>
                    <div class="col-4"><input type="text" name="lang" id="lngInput" class="form-control form-control-sm border-0 bg-light text-center" readonly placeholder="Lng"></div>
                    <div class="col-4"><input type="text" id="jarakDisplay" class="form-control form-control-sm border-0 bg-primary text-white text-center" readonly value="0 KM"></div>
                </div>
                <input type="hidden" name="alamat" id="alamatInput">
            </div>

            <div class="card-premium">
                <h6 class="fw-bold mb-3 small text-muted text-uppercase">Estimasi Jasa (Masuk Ke Nota)</h6>
                <div class="row g-2 mb-2">
                    <div class="col-12">
                        <input type="text" id="inputJasa" class="form-control border-0 bg-light" placeholder="Jasa / Sparepart" list="listJasa">
                        <datalist id="listJasa"></datalist>
                    </div>
                    <div class="col-5">
                        <input type="number" id="inputHarga" class="form-control border-0 bg-light" placeholder="Harga">
                    </div>
                    <div class="col-3">
                        <input type="number" id="inputQty" class="form-control border-0 bg-light" value="1" placeholder="Qty">
                    </div>
                    <div class="col-4">
                        <button type="button" class="btn btn-primary w-100 fw-bold" onclick="addItem()">ADD</button>
                    </div>
                </div>

                <div id="selectedItemsArea" class="mt-3"></div>
                
                <div class="mt-3 pt-3 border-top">
                    <div class="d-flex justify-content-between mb-1">
                        <span class="small">Subtotal</span>
                        <span id="subtotalDisplay">Rp 0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-1 text-danger">
                        <span class="small">Biaya Akomodasi</span>
                        <span id="akomodasiDisplay">Rp 0</span>
                    </div>
                    <div class="d-flex justify-content-between fw-bold text-primary fs-5">
                        <span>TOTAL NOTA</span>
                        <span id="totalDisplay">Rp 0</span>
                    </div>
                </div>
            </div>

            <div class="card-premium">
                <h6 class="fw-bold mb-3 small text-muted text-uppercase">Status Pembayaran</h6>
                <select id="statusNota" class="form-select border-0 bg-light fw-bold">
                    <option value="Piutang">BELUM LUNAS (Piutang)</option>
                    <option value="Lunas">LUNAS</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 rounded-4 fw-bold shadow">SIMPAN BOOKING & NOTA</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js"></script>

    <script>
        let map, marker;
        let pelangganData = [];
        let listBelanja = [];
        const BASECAMP = [-8.21, 114.36]; // Lokasi Toko Lo
        const BIAYA_PER_KM = 2500; // Contoh biaya akomodasi per km

        document.addEventListener("DOMContentLoaded", () => {
            initMap();
            fetchPelanggan();
            fetchMasterHarga();
            document.getElementById('tglInput').value = new Date().toISOString().slice(0, 16);
        });

        function initMap() {
            map = L.map('map').setView(BASECAMP, 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker(BASECAMP, { draggable: true }).addTo(map);

            marker.on('dragend', () => {
                const pos = marker.getLatLng();
                updateLocation(pos.lat, pos.lng);
            });
        }

        function updateLocation(lat, lng) {
            document.getElementById('latInput').value = lat.toFixed(6);
            document.getElementById('lngInput').value = lng.toFixed(6);
            
            // Itung jarak dari basecamp
            const dist = map.distance(BASECAMP, [lat, lng]) / 1000;
            document.getElementById('jarakDisplay').value = dist.toFixed(1) + " KM";
            renderItems(); // Re-render buat update biaya akomodasi
        }

        async function fetchPelanggan() {
            const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Pelanggan' }) });
            pelangganData = await res.json();
            let opt = '<option value="">-- Pilih Pelanggan --</option>';
            pelangganData.forEach(p => opt += `<option value="${p.email}">${p.nama}</option>`);
            document.getElementById('selectPelanggan').innerHTML = opt;
        }

        async function fetchMasterHarga() {
            const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Harga' }) });
            window.masterHarga = await res.json();
            let opt = '';
            window.masterHarga.forEach(h => opt += `<option value="${h.nama || h.Jasa}" data-price="${h.harga || h.Harga}">`);
            document.getElementById('listJasa').innerHTML = opt;
        }

        document.getElementById('inputJasa').addEventListener('input', (e) => {
            const selected = window.masterHarga.find(h => (h.nama || h.Jasa) === e.target.value);
            if(selected) document.getElementById('inputHarga').value = selected.harga || selected.Harga;
        });

        function fillPelangganData() {
            const p = pelangganData.find(x => x.email === document.getElementById('selectPelanggan').value);
            if(p) {
                document.getElementById('alamatInput').value = p.alamat;
                if(p.lat && p.lang) {
                    const pos = [p.lat, p.lang];
                    marker.setLatLng(pos);
                    map.setView(pos, 15);
                    updateLocation(parseFloat(p.lat), parseFloat(p.lang));
                }
            }
        }

        function addItem() {
            const nama = document.getElementById('inputJasa').value;
            const harga = parseInt(document.getElementById('inputHarga').value);
            const qty = parseInt(document.getElementById('inputQty').value);
            if(!nama || isNaN(harga) || isNaN(qty)) return Swal.fire('Error', 'Lengkapi Nama, Harga & Qty', 'error');

            listBelanja.push({ nama, harga, qty, total: harga * qty });
            renderItems();
            document.getElementById('inputJasa').value = '';
            document.getElementById('inputHarga').value = '';
            document.getElementById('inputQty').value = 1;
        }

        function renderItems() {
            const area = document.getElementById('selectedItemsArea');
            let subtotal = 0;
            let html = '';
            
            listBelanja.forEach((it, i) => {
                subtotal += it.total;
                html += `<div class="item-row d-flex justify-content-between align-items-center">
                    <div><b>${it.nama}</b><br><small>${it.qty} x Rp ${it.harga.toLocaleString()}</small></div>
                    <div class="d-flex align-items-center"><b>Rp ${it.total.toLocaleString()}</b>
                    <i class="bi bi-x-circle text-danger ms-2" style="cursor:pointer" onclick="removeItem(${i})"></i></div>
                </div>`;
            });
            area.innerHTML = html;

            // Hitung Akomodasi
            const jarak = parseFloat(document.getElementById('jarakDisplay').value) || 0;
            const akomodasi = jarak > 5 ? Math.round(jarak * BIAYA_PER_KM) : 0; // Free ongkir dibawah 5km
            
            const grandTotal = subtotal + akomodasi;
            document.getElementById('subtotalDisplay').innerText = "Rp " + subtotal.toLocaleString();
            document.getElementById('akomodasiDisplay').innerText = "Rp " + akomodasi.toLocaleString();
            document.getElementById('totalDisplay').innerText = "Rp " + grandTotal.toLocaleString();
        }

        function removeItem(i) { listBelanja.splice(i, 1); renderItems(); }

        document.getElementById('formBooking').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(listBelanja.length === 0) return Swal.fire('Error', 'Tambahkan jasa estimasi!', 'warning');

            const fd = new FormData(e.target);
            const bookingId = "BOOK-" + Date.now().toString().slice(-6);
            const notaId = "NOTA-" + Date.now().toString().slice(-6);
            const email = document.getElementById('selectPelanggan').value;

            // Final List dengan Akomodasi
            let finalItems = [...listBelanja];
            const akomodasiVal = parseInt(document.getElementById('akomodasiDisplay').innerText.replace(/\D/g,''));
            if(akomodasiVal > 0) finalItems.push({ nama: "Biaya Akomodasi (Jarak)", harga: akomodasiVal, qty: 1, total: akomodasiVal });

            const totalNota = finalItems.reduce((s, i) => s + i.total, 0);

            Swal.fire({ title: 'Menyimpan Data...', didOpen: () => Swal.showLoading() });

            try {
                // 1. Simpan Ke Sheet Booking
                await fetch(CONFIG.GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'insert', sheet: 'Booking',
                        data: {
                            id: bookingId, email: email, judul: fd.get('judul'), tanggal: fd.get('tanggal'),
                            status: 'Pending', progress_json: '[]', lat: fd.get('lat'), lang: fd.get('lng'),
                            alamat: fd.get('alamat'), id_nota: notaId
                        }
                    })
                });

                // 2. Simpan Ke Sheet Nota
                await fetch(CONFIG.GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'insert', sheet: 'Nota',
                        data: {
                            id: notaId, tanggal: fd.get('tanggal').split('T')[0], email: email,
                            items_json: JSON.stringify(finalItems), total: totalNota, 
                            status: document.getElementById('statusNota').value
                        }
                    })
                });

                Swal.fire('Sukses!', 'Booking & Nota berhasil dibuat.', 'success').then(() => location.reload());
            } catch (err) { Swal.fire('Gagal', err.message, 'error'); }
        });
    </script>
</body>
</html>
