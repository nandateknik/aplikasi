<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Booking Service | Nanda Teknik</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        #mapBooking { height: 250px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #ddd; z-index: 1; }
        .cart-item { 
            background: #fff; 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 8px; 
            border-left: 5px solid var(--premium-blue);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .price-summary { 
            background: #fff; 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        .section-title { font-size: 0.8rem; font-weight: 800; color: #8e8e93; text-transform: uppercase; margin-bottom: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="app">
    <div class="px-3 pb-5">
        <div class="section-title">Informasi Dasar</div>
        <div class="card border-0 shadow-sm rounded-4 p-3 mb-3">
            <div class="mb-3">
                <label class="form-label small fw-bold">Pilih Pelanggan</label>
                <select id="selectPelanggan" class="form-select border-0 bg-light rounded-3" onchange="handlePelangganChange()">
                    <option value="">-- Pilih Pelanggan --</option>
                </select>
            </div>
            <div class="mb-0">
                <label class="form-label small fw-bold">Judul Pekerjaan</label>
                <input type="text" id="judulBooking" class="form-control border-0 bg-light rounded-3" placeholder="Misal: Cuci AC Lantai 2">
            </div>
        </div>

        <div class="section-title">Lokasi Pengerjaan</div>
        <div class="card border-0 shadow-sm rounded-4 p-3 mb-3">
            <div id="mapBooking"></div>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="small text-muted"><i class="bi bi-geo-alt"></i> Jarak: <b id="txtJarak" class="text-dark">0 Km</b></span>
                <button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="getCurrentLocation()" style="font-size: 11px;">
                    <i class="bi bi-crosshair"></i> GPS Saya
                </button>
            </div>
            <div class="row g-2">
                <div class="col-6"><input type="text" id="latB" class="form-control form-control-sm border-0 bg-light" readonly placeholder="Lat"></div>
                <div class="col-6"><input type="text" id="lngB" class="form-control form-control-sm border-0 bg-light" readonly placeholder="Long"></div>
            </div>
        </div>

        <div class="section-title">Item Jasa & Sparepart</div>
        <div class="card border-0 shadow-sm rounded-4 p-3 mb-3">
            <div class="row g-2 mb-3">
                <div class="col-8">
                    <select id="selectHarga" class="form-select border-0 bg-light rounded-3"></select>
                </div>
                <div class="col-4">
                    <input type="number" id="qtyItem" class="form-control border-0 bg-light rounded-3 text-center" value="1" min="1">
                </div>
                <div class="col-12">
                    <button class="btn btn-dark w-100 rounded-3 py-2" onclick="addToCart()">
                        <i class="bi bi-plus-circle me-1"></i> Tambah Jasa
                    </button>
                </div>
            </div>

            <hr class="my-3 opacity-50">

            <label class="form-label small fw-bold">Input Manual (Item Baru)</label>
            <div class="row g-2">
                <div class="col-12">
                    <input type="text" id="manualName" class="form-control border-0 bg-light rounded-3" placeholder="Nama Item / Part">
                </div>
                <div class="col-5">
                    <input type="number" id="manualPrice" class="form-control border-0 bg-light rounded-3" placeholder="Harga Satuan">
                </div>
                <div class="col-3">
                    <input type="number" id="manualQty" class="form-control border-0 bg-light rounded-3 text-center" value="1" placeholder="Qty">
                </div>
                <div class="col-4">
                    <button class="btn btn-outline-secondary w-100 rounded-3" onclick="addManualToCart()">Add</button>
                </div>
            </div>
        </div>

        <div id="cartList" class="mb-4">
            </div>

        <div class="price-summary">
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Subtotal Jasa:</span>
                <span id="txtSubtotal" class="fw-bold">Rp 0</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted text-danger">Akomodasi:</span>
                <span id="txtAkomodasi" class="fw-bold text-danger">Rp 0</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-800 mb-0">TOTAL ESTIMASI</h5>
                <h4 class="fw-800 text-primary mb-0" id="txtTotal">Rp 0</h4>
            </div>

            <button class="btn btn-primary w-100 py-3 rounded-4 fw-bold shadow" onclick="submitBooking()">
                <i class="bi bi-send-check-fill me-2"></i> KONFIRMASI BOOKING
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/config.js"></script>
<script src="js/layout.js"></script>

<script>
    let mapB, markerB, pelangganData = [], hargaData = [], cart = [];
    const TOKO_LAT = -8.206274, TOKO_LNG = 114.3797957;

    document.addEventListener("DOMContentLoaded", async () => {
        initMapBooking();
        Swal.fire({ title: 'Loading Data...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
        await Promise.all([fetchPelanggan(), fetchHarga()]);
        Swal.close();
    });

    function initMapBooking() {
        mapB = L.map('mapBooking').setView([TOKO_LAT, TOKO_LNG], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapB);
        markerB = L.marker([TOKO_LAT, TOKO_LNG], { draggable: true }).addTo(mapB);
        
        markerB.on('dragend', function() {
            let pos = markerB.getLatLng();
            updateBookingCoords(pos.lat, pos.lng);
        });
    }

    async function fetchPelanggan() {
        const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Pelanggan' }) });
        pelangganData = await res.json();
        let opt = '<option value="">-- Pilih Pelanggan --</option>';
        pelangganData.forEach(p => opt += `<option value="${p.email}">${p.nama}</option>`);
        document.getElementById('selectPelanggan').innerHTML = opt;
    }

    async function fetchHarga() {
        const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Harga' }) });
        hargaData = await res.json();
        let opt = '<option value="">-- Pilih Jasa/Part --</option>';
        hargaData.forEach(h => opt += `<option value="${h.Jasa}" data-price="${h.Harga}">${h.Jasa} (Rp ${parseInt(h.Harga).toLocaleString()})</option>`);
        document.getElementById('selectHarga').innerHTML = opt;
    }

    function handlePelangganChange() {
        const email = document.getElementById('selectPelanggan').value;
        const p = pelangganData.find(x => x.email === email);
        if (p && p.lat && p.lang) {
            const lat = parseFloat(p.lat), lng = parseFloat(p.lang);
            markerB.setLatLng([lat, lng]);
            mapB.setView([lat, lng], 15);
            updateBookingCoords(lat, lng);
        }
    }

    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                markerB.setLatLng([lat, lng]);
                mapB.setView([lat, lng], 15);
                updateBookingCoords(lat, lng);
            });
        }
    }

    function updateBookingCoords(lat, lng) {
        document.getElementById('latB').value = lat.toFixed(6);
        document.getElementById('lngB').value = lng.toFixed(6);
        calculateDistance(lat, lng);
    }

    function calculateDistance(lat, lng) {
        const R = 6371; 
        const dLat = (lat - TOKO_LAT) * Math.PI / 180;
        const dLon = (lng - TOKO_LNG) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(TOKO_LAT * Math.PI / 180) * Math.cos(lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        const distance = R * c;

        document.getElementById('txtJarak').innerText = distance.toFixed(1) + " Km";
        
        let akomodasi = 0;
        if (distance > 7) {
            akomodasi = Math.ceil(distance - 7) * 10000;
        }
        document.getElementById('txtAkomodasi').innerText = "Rp " + akomodasi.toLocaleString();
        renderSummary();
    }

    function addToCart() {
        const sel = document.getElementById('selectHarga');
        const itemName = sel.value;
        const itemPrice = parseInt(sel.options[sel.selectedIndex].dataset.price);
        const qty = parseInt(document.getElementById('qtyItem').value);
        if (!itemName) return;
        
        cart.push({ item: itemName, price: itemPrice, qty: qty, total: itemPrice * qty });
        renderCart();
    }

    function addManualToCart() {
        const name = document.getElementById('manualName').value;
        const price = parseInt(document.getElementById('manualPrice').value);
        const qty = parseInt(document.getElementById('manualQty').value) || 1;
        if (!name || !price) return;

        cart.push({ item: name, price: price, qty: qty, total: price * qty });
        renderCart();
        
        // Reset manual input
        document.getElementById('manualName').value = '';
        document.getElementById('manualPrice').value = '';
        document.getElementById('manualQty').value = 1;
    }

    function renderCart() {
        let html = '';
        cart.forEach((c, i) => {
            html += `
            <div class="cart-item d-flex justify-content-between align-items-center shadow-sm">
                <div style="flex: 1;">
                    <div class="fw-bold text-dark" style="font-size: 14px;">${c.item}</div>
                    <small class="text-muted">${c.qty} x Rp ${c.price.toLocaleString()}</small>
                </div>
                <div class="text-end">
                    <div class="fw-bold text-primary">Rp ${c.total.toLocaleString()}</div>
                    <i class="bi bi-trash3 text-danger ms-2" style="cursor:pointer" onclick="cart.splice(${i},1);renderCart();"></i>
                </div>
            </div>`;
        });
        document.getElementById('cartList').innerHTML = html;
        renderSummary();
    }

    function renderSummary() {
        const subtotal = cart.reduce((sum, item) => sum + item.total, 0);
        const akomodasi = parseInt(document.getElementById('txtAkomodasi').innerText.replace(/\D/g,'')) || 0;
        document.getElementById('txtSubtotal').innerText = "Rp " + subtotal.toLocaleString();
        document.getElementById('txtTotal').innerText = "Rp " + (subtotal + akomodasi).toLocaleString();
    }

    async function submitBooking() {
        const email = document.getElementById('selectPelanggan').value;
        const judul = document.getElementById('judulBooking').value;
        if(!email || cart.length === 0 || !judul) return Swal.fire('Oops!', 'Lengkapi Nama, Judul, dan Item Jasa!', 'warning');

        const bookingData = {
            id: "BK-" + Date.now(),
            email: email,
            judul: judul,
            tanggal: new Date().toISOString().split('T')[0],
            status: 'Pending',
            lat: document.getElementById('latB').value,
            lang: document.getElementById('lngB').value,
            items_json: JSON.stringify(cart),
            akomodasi: document.getElementById('txtAkomodasi').innerText.replace(/\D/g,''),
            total_bayar: (cart.reduce((sum, item) => sum + item.total, 0) + (parseInt(document.getElementById('txtAkomodasi').innerText.replace(/\D/g,'')) || 0))
        };

        Swal.fire({ title: 'Mengirim Jadwal...', didOpen: () => Swal.showLoading() });
        
        try {
            await fetch(CONFIG.GAS_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'insert', sheet: 'Booking', data: bookingData }) 
            });
            Swal.fire('Berhasil!', 'Booking telah terdaftar.', 'success').then(() => location.reload());
        } catch (e) {
            Swal.fire('Gagal!', 'Terjadi kesalahan sistem.', 'error');
        }
    }
</script>

</body>
</html>
