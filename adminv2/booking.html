<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Booking | Nanda Teknik</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css"> <style>
        :root { --premium-blue: #0056b3; }
        #mapBooking { height: 200px; border-radius: 15px; margin-bottom: 10px; z-index: 1; border: 2px solid #eee; }
        .history-card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; background: #fff; }
        .step-item { border-left: 2px solid var(--premium-blue); padding-left: 20px; position: relative; padding-bottom: 15px; margin-left: 10px; }
        .step-item::before { content: ''; position: absolute; left: -7px; top: 0; width: 12px; height: 12px; background: var(--premium-blue); border-radius: 50%; border: 2px solid #fff; }
        .step-item:last-child { border-left: 2px solid transparent; }
        .cart-item { background: #f8f9fa; border-radius: 12px; padding: 12px; margin-bottom: 8px; border-left: 5px solid var(--premium-blue); }
        .section-title { font-weight: 800; color: #333; margin: 20px 0 10px 5px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="bg-light">

<div id="header-container"></div> 

<div id="app" class="container py-3">
    <ul class="nav nav-pills nav-fill bg-white p-1 rounded-4 shadow-sm mb-4" id="pills-tab">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#content-input">
                <i class="bi bi-plus-circle me-1"></i> Input Baru
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#content-riwayat" onclick="fetchHistory()">
                <i class="bi bi-clock-history me-1"></i> Riwayat Progress
            </button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="content-input">
            <div class="section-title">Informasi Pelanggan</div>
            <div class="card border-0 shadow-sm rounded-4 p-3 mb-3">
                <select id="selectPelanggan" class="form-select border-0 bg-light mb-2" onchange="handlePelangganChange()">
                    <option value="">-- Pilih Pelanggan --</option>
                </select>
                <input type="text" id="judulBooking" class="form-control border-0 bg-light mb-2" placeholder="Judul Pekerjaan">
                <input type="date" id="tglPekerjaan" class="form-control border-0 bg-light">
            </div>

            <div class="section-title">Lokasi Pengerjaan</div>
            <div class="card border-0 shadow-sm rounded-4 p-3 mb-3">
                <div id="mapBooking"></div>
                <button class="btn btn-sm btn-dark w-100 rounded-pill mb-2" onclick="getCurrentLocation()">GPS Sesuaikan Lokasi</button>
                <textarea id="alamatManual" class="form-control border-0 bg-light mb-2" rows="2" placeholder="Alamat Detail..."></textarea>
                <div class="row g-2">
                    <div class="col-6"><input type="text" id="latB" class="form-control form-control-sm border-0 bg-light text-center" readonly placeholder="Lat"></div>
                    <div class="col-6"><input type="text" id="lngB" class="form-control form-control-sm border-0 bg-light text-center" readonly placeholder="Lng"></div>
                </div>
            </div>

            <div class="section-title">Jasa & Part</div>
            <div class="card border-0 shadow-sm rounded-4 p-3 mb-4">
                <select id="selectHarga" class="form-select border-0 bg-light mb-3"></select>
                
                <div class="row g-2 mb-3">
                    <div class="col-12"><input type="text" id="manualName" class="form-control border-0 bg-light" placeholder="Ketik Manual Nama Jasa/Part..."></div>
                    <div class="col-5"><input type="number" id="manualPrice" class="form-control border-0 bg-light" placeholder="Harga"></div>
                    <div class="col-4"><input type="number" id="qtyItem" class="form-control border-0 bg-light text-center" value="1"></div>
                    <div class="col-3"><button class="btn btn-primary w-100" onclick="addToCart()"><i class="bi bi-plus-lg"></i></button></div>
                </div>

                <div id="cartList"></div>
                
                <div class="bg-light p-3 rounded-4 mt-2">
                    <div class="d-flex justify-content-between small"><span>Subtotal</span><span id="txtSubtotal">Rp 0</span></div>
                    <div class="d-flex justify-content-between small text-danger"><span>Jarak (<b id="txtJarak">0 Km</b>)</span><span id="txtAkomodasi">Rp 0</span></div>
                    <hr>
                    <div class="d-flex justify-content-between fw-bold text-primary fs-5"><span>TOTAL</span><span id="txtTotal">Rp 0</span></div>
                </div>
                
                <button class="btn btn-primary w-100 py-3 rounded-4 fw-bold mt-4" onclick="submitBooking()">SIMPAN BOOKING</button>
            </div>
        </div>

        <div class="tab-pane fade" id="content-riwayat">
            <div id="historyList"></div>
        </div>
    </div>
</div>

<div id="nav-container"></div> <div class="modal fade" id="modalProgress" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-5 p-3">
            <h5 class="fw-bold mb-3 text-center">Update Progress</h5>
            <input type="hidden" id="updateId"><input type="hidden" id="updateIdNota">
            <select id="updateStatus" class="form-select border-0 bg-light p-3 rounded-4 mb-3">
                <option value="Menunggu Teknisi">Menunggu Teknisi</option>
                <option value="Proses Pengerjaan">Proses Pengerjaan</option>
                <option value="Selesai (Lunas)">Selesai (Lunas)</option>
                <option value="Cancel">Cancel</option>
            </select>
            <textarea id="updateKeterangan" class="form-control border-0 bg-light p-3 rounded-4 mb-3" placeholder="Catatan..."></textarea>
            <input type="text" id="updateTeknisi" class="form-control border-0 bg-light p-3 rounded-4 mb-3" placeholder="Nama Teknisi">
            <button class="btn btn-primary w-100 py-3 rounded-4 fw-bold" onclick="saveProgress()">SIMPAN UPDATE</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="js/config.js"></script>
<script src="js/layout.js"></script> <script>
    let mapB, markerB, pelangganData = [], hargaData = [], cart = [], historyData = [], notaData = [];
    const TOKO_LAT = -8.206274, TOKO_LNG = 114.3797957;

    document.addEventListener("DOMContentLoaded", async () => {
        // Inisialisasi map & data
        initMapBooking();
        await Promise.all([fetchPelanggan(), fetchHarga()]);
        
        // Cek apakah layout.js perlu dipicu manual (tergantung isi layout.js lo)
        if(typeof renderLayout === "function") renderLayout(); 
    });

    function initMapBooking() {
        mapB = L.map('mapBooking').setView([TOKO_LAT, TOKO_LNG], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapB);
        markerB = L.marker([TOKO_LAT, TOKO_LNG], { draggable: true }).addTo(mapB);
        markerB.on('dragend', async () => {
            const pos = markerB.getLatLng();
            updateBookingCoords(pos.lat, pos.lng);
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.lat}&lon=${pos.lng}`);
            const d = await res.json();
            if (d.display_name) document.getElementById('alamatManual').value = d.display_name;
        });
    }

    async function fetchPelanggan() {
        const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Pelanggan' }) });
        pelangganData = await res.json();
        let opt = '<option value="">-- Pilih Pelanggan --</option>';
        pelangganData.forEach(p => opt += `<option value="${p.email}">${p.nama}</option>`);
        document.getElementById('selectPelanggan').innerHTML = opt;
    }

    async function fetchHarga() {
        const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Harga' }) });
        hargaData = await res.json();
        let opt = '<option value="">-- Pilih Dari Daftar --</option>';
        hargaData.forEach(h => opt += `<option value="${h.nama || h.Jasa}" data-price="${h.harga || h.Harga}">${h.nama || h.Jasa}</option>`);
        document.getElementById('selectHarga').innerHTML = opt;
    }

    document.getElementById('selectHarga').addEventListener('change', function() {
        const opt = this.options[this.selectedIndex];
        if(this.value) {
            document.getElementById('manualName').value = this.value;
            document.getElementById('manualPrice').value = opt.dataset.price;
        }
    });

    function handlePelangganChange() {
        const p = pelangganData.find(x => x.email === document.getElementById('selectPelanggan').value);
        if (p) {
            const lat = p.lat || p.latitude || TOKO_LAT;
            const lng = p.lang || p.longitude || TOKO_LNG;
            markerB.setLatLng([lat, lng]);
            mapB.setView([lat, lng], 15);
            updateBookingCoords(lat, lng);
            document.getElementById('alamatManual').value = p.alamat || "";
        }
    }

    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                markerB.setLatLng([lat, lng]);
                mapB.setView([lat, lng], 16);
                updateBookingCoords(lat, lng);
            });
        }
    }

    function updateBookingCoords(lat, lng) {
        document.getElementById('latB').value = lat;
        document.getElementById('lngB').value = lng;
        calculateDistance(lat, lng);
    }

    function calculateDistance(lat, lng) {
        const R = 6371;
        const dLat = (lat - TOKO_LAT) * Math.PI / 180;
        const dLon = (lng - TOKO_LNG) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(TOKO_LAT * Math.PI/180) * Math.cos(lat * Math.PI/180) * Math.sin(dLon/2)**2;
        const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        document.getElementById('txtJarak').innerText = dist.toFixed(1) + " Km";
        let akomodasi = dist > 7 ? Math.ceil(dist - 7) * 10000 : 0;
        document.getElementById('txtAkomodasi').innerText = "Rp " + akomodasi.toLocaleString();
        renderSummary();
    }

    function addToCart() {
        const name = document.getElementById('manualName').value;
        const price = parseInt(document.getElementById('manualPrice').value);
        const qty = parseInt(document.getElementById('qtyItem').value) || 1;
        if(!name || isNaN(price)) return;
        cart.push({ item: name, price: price, qty: qty, total: price * qty });
        renderCart();
        document.getElementById('manualName').value = '';
        document.getElementById('manualPrice').value = '';
        document.getElementById('qtyItem').value = 1;
    }

    function renderCart() {
        document.getElementById('cartList').innerHTML = cart.map((c, i) => `
            <div class="cart-item d-flex justify-content-between">
                <div><b>${c.item}</b><br><small>${c.qty} x Rp ${c.price.toLocaleString()}</small></div>
                <div class="text-end"><b>Rp ${c.total.toLocaleString()}</b><br><i class="bi bi-trash text-danger" onclick="cart.splice(${i},1);renderCart()"></i></div>
            </div>`).join('');
        renderSummary();
    }

    function renderSummary() {
        const sub = cart.reduce((s, i) => s + i.total, 0);
        const ako = parseInt(document.getElementById('txtAkomodasi').innerText.replace(/\D/g,'')) || 0;
        document.getElementById('txtSubtotal').innerText = "Rp " + sub.toLocaleString();
        document.getElementById('txtTotal').innerText = "Rp " + (sub + ako).toLocaleString();
    }

    async function submitBooking() {
        const email = document.getElementById('selectPelanggan').value;
        const judul = document.getElementById('judulBooking').value;
        const tglKerja = document.getElementById('tglPekerjaan').value;
        if(!email || !judul || !tglKerja || cart.length === 0) return Swal.fire('Error', 'Data belum lengkap!', 'error');

        const now = new Date();
        const idB = "BK-" + now.getTime();
        const idN = "NT-" + now.getTime();
        const akoVal = parseInt(document.getElementById('txtAkomodasi').innerText.replace(/\D/g,'')) || 0;
        let itemsNota = [...cart];
        if(akoVal > 0) itemsNota.push({ item: "Akomodasi", price: akoVal, qty: 1, total: akoVal });

        const dataBooking = {
            id: idB, email: email, judul: judul, tanggal: tglKerja, status: 'Pending',
            progress_json: JSON.stringify([{ status: 'Booking Dibuat', keterangan: 'Pesanan masuk', tanggal: now.toLocaleDateString(), jam: now.toLocaleTimeString(), teknisi: '-' }]),
            lat: document.getElementById('latB').value, lang: document.getElementById('lngB').value,
            alamat: document.getElementById('alamatManual').value, id_nota: idN
        };

        const dataNota = {
            id: idN, tanggal: now.toISOString().split('T')[0], email: email,
            items_json: JSON.stringify(itemsNota), total: itemsNota.reduce((s, i) => s + i.total, 0), status: 'Belum Lunas'
        };

        Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });
        await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'insert', sheet: 'Booking', data: dataBooking }) });
        await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'insert', sheet: 'Nota', data: dataNota }) });
        Swal.fire('Berhasil!', 'Booking tersimpan!', 'success').then(() => location.reload());
    }

    async function fetchHistory() {
        const container = document.getElementById('historyList');
        container.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';
        const [resB, resN] = await Promise.all([
            fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Booking' }) }),
            fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Nota' }) })
        ]);
        historyData = await resB.json();
        notaData = await resN.json();
        renderHistory();
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        container.innerHTML = historyData.slice().reverse().map(h => {
            const nota = notaData.find(n => n.id === h.id_nota);
            let prog = JSON.parse(h.progress_json || '[]');
            return `
            <div class="card history-card p-3">
                <div class="d-flex justify-content-between mb-2">
                    <span class="badge bg-primary">${h.status}</span>
                    <button class="btn btn-sm btn-outline-primary" onclick="openUpdateModal('${h.id}', '${h.id_nota}')">Update</button>
                </div>
                <h6 class="fw-bold mb-1">${h.judul}</h6>
                <div class="small text-muted mb-3">${h.tanggal}</div>
                <div class="bg-light p-2 rounded-3 mb-2" style="max-height: 100px; overflow-y: auto;">
                    ${prog.slice().reverse().map(p => `<div class="step-item"><div class="fw-bold small" style="font-size:10px">${p.status}</div><div class="text-muted" style="font-size:9px">${p.tanggal}</div></div>`).join('')}
                </div>
                <div class="d-flex justify-content-between border-top pt-2">
                    <span class="fw-bold text-primary">Rp ${parseInt(nota ? nota.total : 0).toLocaleString()}</span>
                    <a href="nota.html?id=${h.id_nota}" class="btn btn-sm btn-dark px-3 rounded-pill">Nota</a>
                </div>
            </div>`;
        }).join('');
    }

    function openUpdateModal(id, idNota) {
        document.getElementById('updateId').value = id;
        document.getElementById('updateIdNota').value = idNota;
        new bootstrap.Modal(document.getElementById('modalProgress')).show();
    }

    async function saveProgress() {
        const id = document.getElementById('updateId').value;
        const status = document.getElementById('updateStatus').value;
        const item = historyData.find(x => x.id === id);
        let prog = JSON.parse(item.progress_json || '[]');
        prog.push({ status: status, keterangan: document.getElementById('updateKeterangan').value, tanggal: new Date().toLocaleDateString(), jam: new Date().toLocaleTimeString(), teknisi: document.getElementById('updateTeknisi').value || '-' });
        Swal.fire({ title: 'Updating...' });
        await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'update', sheet: 'Booking', key: 'id', id: id, data: { status: status, progress_json: JSON.stringify(prog) } }) });
        location.reload();
    }
</script>
</body>
</html>
