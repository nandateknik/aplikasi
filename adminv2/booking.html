<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Service | Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-color: #0d6efd; }
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        #mapBooking { height: 350px; border-radius: 15px; border: 2px solid #fff; shadow: 0 4px 12px rgba(0,0,0,0.1); }
        .cart-item { background: #fff; border-radius: 10px; padding: 10px; margin-bottom: 8px; border-left: 4px solid var(--primary-color); }
        .stepper-item { border-left: 2px dashed #dee2e6; padding-left: 20px; position: relative; padding-bottom: 20px; }
        .stepper-item::before { content: ''; position: absolute; left: -9px; top: 0; width: 16px; height: 16px; border-radius: 50%; background: var(--primary-color); }
        .price-summary { background: #e9ecef; border-radius: 12px; padding: 20px; }
    </style>
</head>
<body>

<div id="app">
    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body">
                        <h4 class="fw-bold mb-4">Buat Booking Baru</h4>
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Pilih Pelanggan</label>
                                <select id="selectPelanggan" class="form-select" onchange="handlePelangganChange()">
                                    <option value="">-- Pilih Pelanggan Terdaftar --</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Judul Pekerjaan</label>
                                <input type="text" id="judulBooking" class="form-control" placeholder="Contoh: Servis AC Kamar">
                            </div>
                            
                            <div class="col-12">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="form-label fw-semibold">Lokasi Pengerjaan</label>
                                    <button class="btn btn-sm btn-outline-primary" onclick="getCurrentLocation()">
                                        <i class="bi bi-geo-alt"></i> Gunakan Lokasi Saya
                                    </button>
                                </div>
                                <div id="mapBooking"></div>
                                <div class="row mt-2 g-2">
                                    <div class="col-6"><input type="text" id="latB" class="form-control form-control-sm" readonly placeholder="Lat"></div>
                                    <div class="col-6"><input type="text" id="lngB" class="form-control form-control-sm" readonly placeholder="Long"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Item Jasa & Sparepart</h5>
                        <div class="row g-2 mb-3">
                            <div class="col-md-6">
                                <select id="selectHarga" class="form-select"></select>
                            </div>
                            <div class="col-md-2">
                                <input type="number" id="qtyItem" class="form-control" value="1" min="1">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-dark w-100" onclick="addToCart()">
                                    <i class="bi bi-plus-circle"></i> Tambah Ke Nota
                                </button>
                            </div>
                        </div>
                        
                        <div id="cartList" class="mb-3">
                            </div>

                        <div class="input-group mb-3">
                            <span class="input-group-text">Input Manual</span>
                            <input type="text" id="manualName" class="form-control" placeholder="Nama Item">
                            <input type="number" id="manualPrice" class="form-control" placeholder="Harga">
                            <button class="btn btn-outline-secondary" onclick="addManualToCart()">Add</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm border-0 sticky-top" style="top: 20px;">
                    <div class="card-body price-summary">
                        <h5 class="fw-bold border-bottom pb-2">Ringkasan Estimasi</h5>
                        
                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal Jasa:</span>
                            <span id="txtSubtotal">Rp 0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Jarak (Km):</span>
                            <span id="txtJarak">0 Km</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2 text-danger">
                            <span>Akomodasi:</span>
                            <span id="txtAkomodasi">Rp 0</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <h4 class="fw-bold">Total:</h4>
                            <h4 class="fw-bold text-primary" id="txtTotal">Rp 0</h4>
                        </div>

                        <button class="btn btn-primary w-100 btn-lg shadow" onclick="submitBooking()">
                            <i class="bi bi-send-check"></i> Konfirmasi Booking
                        </button>
                    </div>
                </div>
                
                <div class="card shadow-sm border-0 mt-4">
                    <div class="card-body">
                        <h6 class="fw-bold mb-3">Detail Progress</h6>
                        <div id="progressContainer">
                            <div class="stepper-item">
                                <div class="fw-bold small">Drafting</div>
                                <div class="text-muted" style="font-size: 0.7rem;">Menunggu konfirmasi admin</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/config.js"></script>
<script src="js/layout.js"></script>

<script>
    let mapB, markerB, pelangganData = [], hargaData = [], cart = [];
    const TOKO_LAT = -8.206274, TOKO_LNG = 114.3797957; // KOORDINAT TOKO ANDA

    document.addEventListener("DOMContentLoaded", async () => {
        initMapBooking();
        await Promise.all([fetchPelanggan(), fetchHarga()]);
    });

    function initMapBooking() {
        mapB = L.map('mapBooking').setView([TOKO_LAT, TOKO_LNG], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapB);
        markerB = L.marker([TOKO_LAT, TOKO_LNG], { draggable: true }).addTo(mapB);
        
        markerB.on('dragend', function() {
            let pos = markerB.getLatLng();
            updateBookingCoords(pos.lat, pos.lng);
        });
    }

    async function fetchPelanggan() {
        const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Pelanggan' }) });
        pelangganData = await res.json();
        let opt = '<option value="">-- Pilih Pelanggan --</option>';
        pelangganData.forEach(p => opt += `<option value="${p.email}">${p.nama} (${p.email})</option>`);
        document.getElementById('selectPelanggan').innerHTML = opt;
    }

    async function fetchHarga() {
        const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read', sheet: 'Harga' }) });
        hargaData = await res.json();
        let opt = '<option value="">-- Pilih Jasa/Part --</option>';
        hargaData.forEach(h => opt += `<option value="${h.Jasa}" data-price="${h.Harga}">${h.Jasa} - Rp ${parseInt(h.Harga).toLocaleString()}</option>`);
        document.getElementById('selectHarga').innerHTML = opt;
    }

    function handlePelangganChange() {
        const email = document.getElementById('selectPelanggan').value;
        const p = pelangganData.find(x => x.email === email);
        if (p && p.lat && p.lang) {
            const lat = parseFloat(p.lat), lng = parseFloat(p.lang);
            markerB.setLatLng([lat, lng]);
            mapB.setView([lat, lng], 15);
            updateBookingCoords(lat, lng);
        }
    }

    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                markerB.setLatLng([lat, lng]);
                mapB.setView([lat, lng], 15);
                updateBookingCoords(lat, lng);
            });
        }
    }

    function updateBookingCoords(lat, lng) {
        document.getElementById('latB').value = lat.toFixed(6);
        document.getElementById('lngB').value = lng.toFixed(6);
        calculateDistance(lat, lng);
    }

    function calculateDistance(lat, lng) {
        // Rumus sederhana jarak koordinat (Haversine)
        const R = 6371; // Radius bumi km
        const dLat = (lat - TOKO_LAT) * Math.PI / 180;
        const dLon = (lng - TOKO_LNG) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(TOKO_LAT * Math.PI / 180) * Math.cos(lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        const distance = R * c;

        document.getElementById('txtJarak').innerText = distance.toFixed(1) + " Km";
        
        // Logika Biaya: > 7km, per km sisanya * 10.000
        let akomodasi = 0;
        if (distance > 7) {
            akomodasi = Math.ceil(distance - 7) * 10000;
        }
        document.getElementById('txtAkomodasi').innerText = "Rp " + akomodasi.toLocaleString();
        renderSummary();
    }

    function addToCart() {
        const sel = document.getElementById('selectHarga');
        const itemName = sel.value;
        const itemPrice = parseInt(sel.options[sel.selectedIndex].dataset.price);
        const qty = parseInt(document.getElementById('qtyItem').value);
        if (!itemName) return;
        
        cart.push({ item: itemName, price: itemPrice, qty: qty, total: itemPrice * qty });
        renderCart();
    }

    function addManualToCart() {
        const name = document.getElementById('manualName').value;
        const price = parseInt(document.getElementById('manualPrice').value);
        if (!name || !price) return;
        cart.push({ item: name, price: price, qty: 1, total: price });
        renderCart();
    }

    function renderCart() {
        let html = '';
        cart.forEach((c, i) => {
            html += `
            <div class="cart-item d-flex justify-content-between align-items-center shadow-sm">
                <div>
                    <div class="fw-bold">${c.item}</div>
                    <small class="text-muted">${c.qty} x Rp ${c.price.toLocaleString()}</small>
                </div>
                <div class="text-end">
                    <div class="fw-bold text-primary">Rp ${c.total.toLocaleString()}</div>
                    <i class="bi bi-x-circle text-danger pointer" onclick="cart.splice(${i},1);renderCart();"></i>
                </div>
            </div>`;
        });
        document.getElementById('cartList').innerHTML = html;
        renderSummary();
    }

    function renderSummary() {
        const subtotal = cart.reduce((sum, item) => sum + item.total, 0);
        const akomodasi = parseInt(document.getElementById('txtAkomodasi').innerText.replace(/\D/g,'')) || 0;
        document.getElementById('txtSubtotal').innerText = "Rp " + subtotal.toLocaleString();
        document.getElementById('txtTotal').innerText = "Rp " + (subtotal + akomodasi).toLocaleString();
    }

    async function submitBooking() {
        const email = document.getElementById('selectPelanggan').value;
        if(!email || cart.length === 0) return Swal.fire('Error', 'Pelanggan dan Item Jasa harus diisi!', 'error');

        const bookingData = {
            email: email,
            judul: document.getElementById('judulBooking').value,
            tanggal: new Date().toISOString().split('T')[0],
            status: 'Pending',
            lat: document.getElementById('latB').value,
            lang: document.getElementById('lngB').value,
            progress_json: JSON.stringify([{ step: "Order Dibuat", time: new Date().toLocaleString(), status: "Done" }]),
            items_json: JSON.stringify(cart),
            akomodasi: document.getElementById('txtAkomodasi').innerText.replace(/\D/g,'')
        };

        Swal.fire({ title: 'Memproses Booking...', didOpen: () => Swal.showLoading() });
        
        // Simpan ke Sheet Booking & Create Draft Nota
        await fetch(CONFIG.GAS_URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'insert', sheet: 'Booking', data: bookingData }) 
        });

        Swal.fire('Berhasil!', 'Booking telah terdaftar. Teknisi akan segera dikonfirmasi.', 'success').then(() => location.reload());
    }
</script>

</body>
</html>
