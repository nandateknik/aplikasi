<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pelanggan | Service App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        #map { height: 300px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #dee2e6; }
        .card { border-radius: 15px; border: none; }
        .badge-personal { background-color: #e0f2fe; color: #0369a1; }
        .badge-instansi { background-color: #fef3c7; color: #92400e; }
        .search-box { border-radius: 10px; padding-left: 40px; }
        .search-icon { position: absolute; left: 15px; top: 10px; color: #adb5bd; }
    </style>
</head>
<body>

    <div id="app">
        <div class="container-fluid">
            <div class="row mb-4 align-items-center">
                <div class="col">
                    <h3 class="fw-bold mb-0">Manajemen Pelanggan</h3>
                    <p class="text-muted">Pisahkan data Personal & Instansi dengan presisi lokasi.</p>
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary px-4 shadow-sm" onclick="showAddModal()">
                        <i class="bi bi-person-plus-fill me-2"></i>Tambah Pelanggan
                    </button>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="p-3 border-bottom position-relative">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" id="searchInput" class="form-control search-box w-25" placeholder="Cari..." onkeyup="loadData()">
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4">Kategori</th>
                                    <th>Nama & Email</th>
                                    <th>WhatsApp</th>
                                    <th>Alamat</th>
                                    <th class="text-end pe-4">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPelanggan" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content shadow-lg" style="border-radius: 20px;">
                <form id="formPelanggan">
                    <div class="modal-header border-0 pt-4 px-4">
                        <h5 class="fw-bold" id="modalTitle">Data Pelanggan</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body px-4">
                        <input type="hidden" id="oldEmail">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Kategori</label>
                                    <select name="kategori" class="form-select" id="kategori">
                                        <option value="Personal">Personal</option>
                                        <option value="Instansi">Instansi / Perusahaan</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Nama Lengkap / Instansi</label>
                                    <input type="text" name="nama" class="form-control" placeholder="Nama..." required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="email" name="email" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">WhatsApp</label>
                                    <input type="number" name="wa" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Alamat Lengkap</label>
                                    <textarea name="alamat" id="alamatInput" class="form-control" rows="3"></textarea>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Pilih Lokasi di Maps</label>
                                <div id="map"></div>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <input type="text" name="lat" id="latInput" class="form-control form-control-sm" placeholder="Lat" readonly>
                                    </div>
                                    <div class="col-6">
                                        <input type="text" name="lang" id="langInput" class="form-control form-control-sm" placeholder="Long" readonly>
                                    </div>
                                </div>
                                <p class="text-muted small mt-2"><i class="bi bi-info-circle"></i> Gunakan kotak pencarian di dalam maps atau geser pin.</p>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0 pb-4 px-4">
                        <button type="submit" class="btn btn-primary w-100 py-2 shadow">Simpan Data Pelanggan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>

    <script>
        let map, marker, geocoder;
        let pelangganModal;

        document.addEventListener("DOMContentLoaded", () => {
            pelangganModal = new bootstrap.Modal(document.getElementById('modalPelanggan'));
            initMap();
            loadData();
        });

        // FUNGSI INIT MAPS
        function initMap() {
            map = L.map('map').setView([-6.2000, 106.8166], 13); // Default Jakarta
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            marker = L.marker([-6.2000, 106.8166], { draggable: true }).addTo(map);

            // Update Lat/Long saat marker digeser
            marker.on('dragend', function (e) {
                let pos = marker.getLatLng();
                updateCoords(pos.lat, pos.lng);
            });

            // Klik pada map pindahkan marker
            map.on('click', function (e) {
                marker.setLatLng(e.latlng);
                updateCoords(e.latlng.lat, e.latlng.lng);
            });

            // Tambahkan Pencarian di Maps
            geocoder = L.Control.geocoder({
                defaultMarkGeocode: false,
                placeholder: "Cari Nama Jalan/Gedung...",
                position: "topleft"
            })
            .on('markgeocode', function(e) {
                let bbox = e.geocode.bbox;
                let center = e.geocode.center;
                map.fitBounds(bbox);
                marker.setLatLng(center);
                updateCoords(center.lat, center.lng);
                document.getElementById('alamatInput').value = e.geocode.name; // Isi alamat otomatis
            })
            .addTo(map);
        }

        function updateCoords(lat, lng) {
            document.getElementById('latInput').value = lat.toFixed(6);
            document.getElementById('langInput').value = lng.toFixed(6);
        }

        // --- CRUD LOGIC (Sama seperti sebelumnya dengan sedikit penyesuaian kolom) ---

        async function loadData() {
            const search = document.getElementById('searchInput').value;
            const res = await fetch(CONFIG.GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'read', sheet: 'Pelanggan', search: search })
            });
            const data = await res.json();
            let html = '';
            data.forEach(p => {
                const katBadge = p.kategori === 'Instansi' ? 'badge-instansi' : 'badge-personal';
                html += `
                <tr>
                    <td class="ps-4"><span class="badge ${katBadge}">${p.kategori || 'Personal'}</span></td>
                    <td>
                        <div class="fw-bold text-dark">${p.nama}</div>
                        <div class="small text-muted">${p.email}</div>
                    </td>
                    <td><a href="https://wa.me/${p.wa}" target="_blank" class="text-success text-decoration-none"><i class="bi bi-whatsapp me-1"></i>${p.wa}</a></td>
                    <td><small class="text-muted d-block text-truncate" style="max-width:200px">${p.alamat}</small></td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-light border" onclick="editData('${p.email}')"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-light border text-danger" onclick="deleteData('${p.email}')"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
            });
            document.getElementById('tableBody').innerHTML = html;
        }

        function showAddModal() {
            document.getElementById('formPelanggan').reset();
            document.getElementById('oldEmail').value = '';
            pelangganModal.show();
            // Refresh Map agar tidak abu-abu (Leaflet butuh refresh jika ditaruh di modal)
            setTimeout(() => map.invalidateSize(), 500);
        }

        document.getElementById('formPelanggan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const dataObj = Object.fromEntries(formData.entries());
            dataObj.is_active = "TRUE";
            dataObj.tanggal = new Date().toISOString().split('T')[0];

            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });

            await fetch(CONFIG.GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: document.getElementById('oldEmail').value ? 'update' : 'insert',
                    sheet: 'Pelanggan',
                    key: 'email',
                    id: document.getElementById('oldEmail').value || dataObj.email,
                    data: dataObj
                })
            });
            
            pelangganModal.hide();
            Swal.fire('Berhasil', 'Data pelanggan telah diperbarui', 'success');
            loadData();
        });

        // Edit Data
        async function editData(email) {
            Swal.fire({ title: 'Mengambil data...', didOpen: () => Swal.showLoading() });
            const res = await fetch(CONFIG.GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'read', sheet: 'Pelanggan', search: email })
            });
            const data = await res.json();
            const p = data.find(item => item.email === email);
            if (p) {
                const form = document.getElementById('formPelanggan');
                form.kategori.value = p.kategori;
                form.nama.value = p.nama;
                form.email.value = p.email;
                form.wa.value = p.wa;
                form.alamat.value = p.alamat;
                form.lat.value = p.lat;
                form.lang.value = p.lang;
                document.getElementById('oldEmail').value = p.email;

                // Update Map
                const lat = parseFloat(p.lat) || -6.2000;
                const lng = parseFloat(p.lang) || 106.8166;
                marker.setLatLng([lat, lng]);
                map.setView([lat, lng], 15);

                Swal.close();
                pelangganModal.show();
                setTimeout(() => map.invalidateSize(), 500);
            }
        }
    </script>
</body>
</html>
