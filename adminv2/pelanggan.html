<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pelanggan | Nanda Teknik</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="css/styles.css"> 
    
    <style>
        #map { 
            height: 250px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            border: 1px solid #dee2e6; 
            z-index: 1;
        }
        .leaflet-control-geocoder { z-index: 1001 !important; }
        .badge-personal { background-color: #007AFF; color: #fff; }
        .badge-instansi { background-color: #5856D6; color: #fff; }
        
        .fab-add {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: var(--premium-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0,122,255,0.4);
            border: none;
            z-index: 999;
        }
        .customer-card { transition: 0.3s; border: 1px solid rgba(0,0,0,0.05) !important; }
        .customer-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important; }
    </style>
</head>
<body class="bg-light">

    <div id="app">
        <div class="p-3">
            <div class="input-group bg-white rounded-4 shadow-sm p-1">
                <span class="input-group-text bg-white border-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" id="searchInput" class="form-control border-0 ps-0 shadow-none" placeholder="Cari pelanggan..." onkeyup="loadData()">
            </div>
        </div>

        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-primary spinner-border-sm"></div>
            <p class="small text-muted mt-2">Menarik data...</p>
        </div>
        
        <div id="renderArea" class="px-3 pb-5"></div>

        <button class="fab-add shadow" onclick="showAddModal()">
            <i class="bi bi-plus-lg fs-4"></i>
        </button>
    </div>

    <div class="modal fade" id="modalPelanggan" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-fullscreen-sm-down modal-lg modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 25px;">
                <form id="formPelanggan">
                    <div class="modal-header border-0 pt-4 px-4">
                        <h5 class="fw-bold" id="modalTitle">Data Pelanggan</h5>
                        <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body px-4 pb-4">
                        <input type="hidden" id="oldEmail">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Kategori</label>
                                    <select name="kategori" id="kategoriInput" class="form-select border-0 bg-light rounded-3">
                                        <option value="Personal">Personal</option>
                                        <option value="Instansi">Instansi / Perusahaan</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Nama Lengkap</label>
                                    <input type="text" name="nama" id="namaInput" class="form-control border-0 bg-light rounded-3" placeholder="Masukkan nama..." required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Email (ID)</label>
                                    <input type="email" name="email" id="emailInput" class="form-control border-0 bg-light rounded-3" placeholder="email@contoh.com" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted text-uppercase">WhatsApp</label>
                                    <input type="number" name="wa" id="waInput" class="form-control border-0 bg-light rounded-3" placeholder="62812..." required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Alamat Lengkap</label>
                                    <textarea name="alamat" id="alamatInput" class="form-control border-0 bg-light rounded-3" rows="3" placeholder="Alamat terisi otomatis saat pilih map..."></textarea>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Lokasi Map (Geser Pin)</label>
                                <div id="map"></div>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <input type="text" name="lat" id="latInput" class="form-control form-control-sm border-0 bg-light text-center" placeholder="Lat" readonly>
                                    </div>
                                    <div class="col-6">
                                        <input type="text" name="lang" id="langInput" class="form-control form-control-sm border-0 bg-light text-center" placeholder="Long" readonly>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0 p-4">
                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-4 fw-bold shadow">Simpan Data Pelanggan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>

    <script>
        let map, marker, geocoder;
        let pelangganModal;

        document.addEventListener("DOMContentLoaded", () => {
            pelangganModal = new bootstrap.Modal(document.getElementById('modalPelanggan'));
            initMap();
            loadData();
        });

        function initMap() {
            // Koordinat Default Banyuwangi
            const defaultPos = [-8.206274, 114.3797957];
            map = L.map('map').setView(defaultPos, 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker(defaultPos, { draggable: true }).addTo(map);

            // Fungsi Ambil Alamat Otomatis
            async function fetchAddress(lat, lng) {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
                    const data = await res.json();
                    if (data.display_name) {
                        document.getElementById('alamatInput').value = data.display_name;
                    }
                } catch (e) { console.error("Geocode error", e); }
            }

            marker.on('dragend', function () {
                let pos = marker.getLatLng();
                updateCoords(pos.lat, pos.lng);
                fetchAddress(pos.lat, pos.lng);
            });

            map.on('click', function (e) {
                marker.setLatLng(e.latlng);
                updateCoords(e.latlng.lat, e.latlng.lng);
                fetchAddress(e.latlng.lat, e.latlng.lng);
            });

            geocoder = L.Control.geocoder({ defaultMarkGeocode: false, position: "topleft" })
                .on('markgeocode', function(e) {
                    let center = e.geocode.center;
                    map.setView(center, 16);
                    marker.setLatLng(center);
                    updateCoords(center.lat, center.lng);
                    document.getElementById('alamatInput').value = e.geocode.name;
                }).addTo(map);
        }

        function updateCoords(lat, lng) {
            document.getElementById('latInput').value = lat.toFixed(6);
            document.getElementById('langInput').value = lng.toFixed(6);
        }

        async function loadData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const area = document.getElementById('renderArea');
            document.getElementById('loading').style.display = 'block';

            try {
                const res = await fetch(CONFIG.GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'read', sheet: 'Pelanggan' })
                });
                const data = await res.json();
                
                let filtered = data;
                if(search) {
                    filtered = data.filter(p => 
                        p.nama.toLowerCase().includes(search) || 
                        p.email.toLowerCase().includes(search)
                    );
                }

                let html = '';
                if(filtered.length === 0) {
                    html = '<div class="text-center py-5 text-muted small">Tidak ada data pelanggan.</div>';
                } else {
                    filtered.reverse().forEach(p => {
                        const isInstansi = p.kategori === 'Instansi';
                        const badgeClass = isInstansi ? 'badge-instansi' : 'badge-personal';
                        html += `
                        <div class="customer-card shadow-sm p-3 mb-3 bg-white border-0 rounded-4">
                            <div class="d-flex justify-content-between">
                                <div onclick="editData('${p.email}')" style="cursor:pointer; flex:1;">
                                    <div class="fw-bold text-dark">${p.nama}</div>
                                    <div class="text-muted small mb-2" style="font-size:11px;">${p.email}</div>
                                    <span class="badge ${badgeClass} rounded-pill px-3" style="font-size:9px;">${(p.kategori || 'Personal').toUpperCase()}</span>
                                    <div class="mt-2 small text-muted text-truncate" style="max-width:220px;">
                                        <i class="bi bi-geo-alt-fill text-danger me-1"></i>${p.alamat || '-'}
                                    </div>
                                </div>
                                <div class="d-flex flex-column gap-2">
                                    <a href="https://wa.me/${p.wa}" target="_blank" class="btn btn-light rounded-circle text-success btn-sm shadow-sm"><i class="bi bi-whatsapp"></i></a>
                                    <button onclick="deleteData('${p.email}')" class="btn btn-light rounded-circle text-danger btn-sm shadow-sm"><i class="bi bi-trash"></i></button>
                                </div>
                            </div>
                        </div>`;
                    });
                }
                area.innerHTML = html;
            } catch (err) {
                area.innerHTML = `<div class="alert alert-danger small">Gagal: ${err.message}</div>`;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function showAddModal() {
            document.getElementById('modalTitle').innerText = "Tambah Pelanggan Baru";
            document.getElementById('formPelanggan').reset();
            document.getElementById('oldEmail').value = '';
            pelangganModal.show();
            setTimeout(() => { map.invalidateSize(); }, 400);
        }

        document.getElementById('formPelanggan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const dataObj = Object.fromEntries(formData.entries());
            const oldEmail = document.getElementById('oldEmail').value;

            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });

            try {
                await fetch(CONFIG.GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: oldEmail ? 'update' : 'insert',
                        sheet: 'Pelanggan',
                        key: 'email',
                        id: oldEmail || dataObj.email,
                        data: dataObj
                    })
                });
                pelangganModal.hide();
                Swal.fire('Berhasil!', 'Data pelanggan telah diperbarui.', 'success');
                loadData();
            } catch (err) {
                Swal.fire('Gagal!', err.message, 'error');
            }
        });

        async function editData(email) {
            document.getElementById('modalTitle').innerText = "Edit Detail Pelanggan";
            Swal.fire({ title: 'Mengambil data...', didOpen: () => Swal.showLoading() });
            
            try {
                const res = await fetch(CONFIG.GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'read', sheet: 'Pelanggan' })
                });
                const data = await res.json();
                const p = data.find(item => item.email === email);
                
                if (p) {
                    const form = document.getElementById('formPelanggan');
                    form.kategori.value = p.kategori || 'Personal';
                    form.nama.value = p.nama || '';
                    form.email.value = p.email || '';
                    form.wa.value = p.wa || '';
                    form.alamat.value = p.alamat || '';
                    form.lat.value = p.lat || '';
                    form.lang.value = p.lang || '';
                    document.getElementById('oldEmail').value = p.email;

                    const lat = parseFloat(p.lat) || -8.206274;
                    const lng = parseFloat(p.lang) || 114.3797957;
                    marker.setLatLng([lat, lng]);
                    map.setView([lat, lng], 15);

                    Swal.close();
                    pelangganModal.show();
                    setTimeout(() => { map.invalidateSize(); }, 400);
                }
            } catch (err) {
                Swal.fire('Error', 'Gagal ambil data', 'error');
            }
        }

        async function deleteData(email) {
            const result = await Swal.fire({
                title: 'Hapus Pelanggan?',
                text: "Data yang dihapus tidak bisa dikembalikan.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#FF3B30',
                confirmButtonText: 'Ya, Hapus!'
            });

            if (result.isConfirmed) {
                Swal.fire({ title: 'Menghapus...', didOpen: () => Swal.showLoading() });
                try {
                    await fetch(CONFIG.GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'delete', sheet: 'Pelanggan', key: 'email', id: email })
                    });
                    Swal.fire('Terhapus!', 'Pelanggan telah dihapus.', 'success');
                    loadData();
                } catch (err) {
                    Swal.fire('Gagal!', err.message, 'error');
                }
            }
        }
    </script>
</body>
</html>
