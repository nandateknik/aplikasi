<div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-center">
            <div class="col-12 col-md-4">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchPelanggan" class="form-control border-start-0" placeholder="Cari nama atau alamat..." onkeyup="filterDataPelanggan()">
                </div>
            </div>
            <div class="col-6 col-md-3">
                <select id="filterKategori" class="form-select" onchange="filterDataPelanggan()">
                    <option value="Semua">Semua Kategori</option>
                    <option value="Rumahan">🏠 Rumahan</option>
                    <option value="Instansi">🏢 Instansi</option>
                </select>
            </div>
            <div class="col-6 col-md-5 text-end">
                <button class="btn btn-primary px-4 w-100 w-md-auto" onclick="formPelanggan()">
                    <i class="bi bi-person-plus-fill me-2"></i>Tambah Pelanggan
                </button>
            </div>
        </div>
    </div>
</div>

<div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
        <div class="bg-white p-3 rounded shadow-sm border-start border-primary border-4">
            <small class="text-muted d-block text-uppercase fw-bold">Total</small>
            <span id="statTotal" class="h4 fw-bold">-</span>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="bg-white p-3 rounded shadow-sm border-start border-success border-4">
            <small class="text-muted d-block text-uppercase fw-bold">Rumahan</small>
            <span id="statRumahan" class="h4 fw-bold">-</span>
        </div>
    </div>
    <div class="col-12 col-md-3">
        <div class="bg-white p-3 rounded shadow-sm border-start border-info border-4">
            <small class="text-muted d-block text-uppercase fw-bold">Instansi</small>
            <span id="statInstansi" class="h4 fw-bold">-</span>
        </div>
    </div>
</div>

<div class="row" id="listPelanggan">
    <div class="text-center p-5">
        <div class="spinner-border text-primary"></div>
        <p class="mt-2">Mengambil data pelanggan...</p>
    </div>
</div>

<template id="tpl-form-pelanggan">
    <div class="text-start">
        <div class="mb-3">
            <label class="form-label small fw-bold">Kategori Pelanggan</label>
            <div class="d-flex gap-2">
                <input type="radio" class="btn-check" name="kat" id="k1" value="Rumahan" checked>
                <label class="btn btn-outline-success flex-fill" for="k1">🏠 Rumahan</label>
                <input type="radio" class="btn-check" name="kat" id="k2" value="Instansi">
                <label class="btn btn-outline-primary flex-fill" for="k2">🏢 Instansi</label>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Nama Lengkap / Nama Perusahaan</label>
            <input type="text" id="f-nama" class="form-control" placeholder="Masukkan nama...">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Email (Untuk Promo)</label>
            <input type="email" id="f-email" class="form-control" placeholder="email@contoh.com">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">No. WhatsApp (Gunakan 62)</label>
            <input type="number" id="f-wa" class="form-control" placeholder="62812345678">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Alamat Lengkap</label>
            <textarea id="f-alamat" class="form-control" rows="2" placeholder="Alamat jalan, nomor, dsb..."></textarea>
        </div>
        <div class="row">
            <div class="col-6">
                <label class="form-label small fw-bold">Latitude</label>
                <input type="text" id="f-lat" class="form-control" placeholder="-6.xxx">
            </div>
            <div class="col-6">
                <label class="form-label small fw-bold">Longitude</label>
                <input type="text" id="f-lang" class="form-control" placeholder="106.xxx">
            </div>
        </div>
    </div>
</template>
