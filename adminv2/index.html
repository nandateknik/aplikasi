<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="main-wrapper">
        <nav class="sidebar p-3">
            <h4 class="fw-bold text-primary mb-4"><i class="bi bi-cpu"></i> CRM Servis</h4>
            <div class="list-group list-group-flush" id="menuDesktop">
                </div>
        </nav>

        <div class="flex-grow-1">
            <header class="header-glass p-3 d-flex justify-content-between align-items-center">
                <h5 class="m-0 fw-bold" id="pageTitle">Pelanggan</h5>
                <div id="userProfile" class="small text-muted"></div>
            </header>

            <div class="container-fluid py-4">
                <div id="mainContent">
                    </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav" id="menuMobile">
        </nav>

    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog modal-fullscreen-sm-down">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Form Data</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="app.js"></script>
</body>
</html>
