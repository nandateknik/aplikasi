<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Pro - Nanda Teknik</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="main-wrapper">
        <nav class="sidebar p-3 shadow-sm">
            <div class="p-2 mb-4 text-center">
                <h4 class="fw-bold text-primary"><i class="bi bi-cpu"></i> CRM Servis</h4>
                <small class="text-muted">v3.0 Dashboard</small>
            </div>
            <div class="list-group list-group-flush" id="menuDesktop">
                </div>
        </nav>

        <div class="flex-grow-1">
            <header class="header-glass p-3 d-flex justify-content-between align-items-center shadow-sm">
                <div class="d-flex align-items-center">
                    <h5 class="m-0 fw-bold" id="pageTitle">Dashboard</h5>
                </div>
                <div id="userProfile" class="fw-semibold text-primary">
                    </div>
            </header>

            <div class="container-fluid py-4">
                <div id="mainContent">
                    <div class="text-center mt-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2">Menginisialisasi Sistem...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav shadow-lg" id="menuMobile">
        </nav>

    <div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-fullscreen-sm-down">
            <div class="modal-content border-0">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold" id="modalTitle">Form Data</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
