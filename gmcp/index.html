<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Penilaian MUT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-8 border-blue-600">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-full mb-4">
                <i class="fas fa-shield-alt text-blue-600 text-3xl"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">MUT Assessment</h1>
            <p class="text-slate-500 text-sm">Masuk untuk memulai penilaian kinerja</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-black text-slate-400 uppercase mb-1 tracking-widest">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fas fa-user text-sm"></i>
                    </span>
                    <input type="text" id="username" required
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white focus:outline-none transition-all duration-300"
                        placeholder="Masukkan username">
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-slate-400 uppercase mb-1 tracking-widest">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fas fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="password" required
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white focus:outline-none transition-all duration-300"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-200 transition duration-300 transform active:scale-95 uppercase tracking-widest text-sm">
                Masuk ke Sistem
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <p class="text-xs text-slate-400 font-bold uppercase tracking-tighter">
                &copy; 2026 Mandiri Usaha Teknik <br>
                <span class="font-normal normal-case">Banyuwangi, East Java</span>
            </p>
        </div>
    </div>

    <script>
        // Pastikan URL ini sesuai dengan URL Web App Apps Script terbaru kamu
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJk8vGRcfyCVPkCVCCY_9xKaiAzRaYuA-gPI7UshOAy0u241UtmHufPb3O6l27bP31/exec";

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            Swal.fire({
                title: 'Otentikasi...',
                html: 'Menghubungkan ke server aman',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            const payload = {
                action: "login",
                username: user,
                password: pass
            };

            // Menggunakan fetch dengan mode no-cors jika perlu, tapi biasanya Google Apps Script 
            // sudah handle CORS dengan baik jika return ContentService.MimeType.JSON
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    // 1. Simpan ke sessionStorage (Hanya bertahan selama tab dibuka)
                    // 2. Simpan ke localStorage (Tetap ada meskipun browser ditutup)
                    const userData = {
                        id: res.data.id,
                        username: res.data.username,
                        jabatan: res.data.jabatan,
                        divisi: res.data.divisi
                    };
                    
                    localStorage.setItem('user_login', JSON.stringify(userData));
                    sessionStorage.setItem('isLoggedIn', 'true');

                    Swal.fire({
                        icon: 'success',
                        title: 'Akses Diterima',
                        text: 'Selamat datang kembali, ' + res.data.username,
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        // LOGIKA REDIRECT BERDASARKAN JABATAN
                        // Jika jabatan mengandung kata 'Admin', masuk ke panel admin
                        if(res.data.jabatan.toLowerCase().includes('admin')) {
                            window.location.href = 'admin/';
                        } else {
                            // Jika user biasa, langsung ke halaman penilaian
                            window.location.href = 'dashboard.html';
                        }
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Akses Ditolak',
                        text: res.message || 'Username atau Password salah!',
                        confirmButtonColor: '#3b82f6'
                    });
                }
            })
            .catch(err => {
                console.error(err);
                Swal.fire('Koneksi Gagal', 'Pastikan internet stabil atau URL Script benar.', 'error');
            });
        });

        // Cek jika sudah login, langsung lempar ke halaman yang sesuai
        window.onload = () => {
            const savedUser = localStorage.getItem('user_login');
            if(savedUser) {
                const user = JSON.parse(savedUser);
                if(user.jabatan.toLowerCase().includes('admin')) {
                    window.location.href = 'karyawan.html';
                } else {
                    window.location.href = 'penilaian.html';
                }
            }
        };
    </script>
</body>
</html>
