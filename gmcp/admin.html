<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Pengaturan Sistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl flex items-center gap-2">
                <i class="fas fa-shield-alt"></i> Control Panel Admin
            </h1>
            <a href="index.html" class="bg-red-500 hover:bg-red-600 px-4 py-1 rounded text-sm transition">Logout</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 mt-6">
        <div class="flex flex-wrap gap-2 mb-6 bg-white p-2 rounded-lg shadow-sm border">
            <button onclick="switchTab('tab-users')" id="btn-users" class="tab-btn flex-1 py-2 px-4 rounded-md bg-blue-600 text-white transition font-medium">
                <i class="fas fa-user-friends mr-2"></i> Aktivasi User
            </button>
            <button onclick="switchTab('tab-divisi')" id="btn-divisi" class="tab-btn flex-1 py-2 px-4 rounded-md text-gray-600 hover:bg-gray-100 transition font-medium">
                <i class="fas fa-layer-group mr-2"></i> Kelola Divisi
            </button>
            <button onclick="switchTab('tab-jabatan')" id="btn-jabatan" class="tab-btn flex-1 py-2 px-4 rounded-md text-gray-600 hover:bg-gray-100 transition font-medium">
                <i class="fas fa-briefcase mr-2"></i> Kelola Jabatan
            </button>
        </div>

        <div id="tab-users" class="tab-content">
            <div class="bg-white rounded-xl shadow-md border overflow-hidden">
                <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                    <h2 class="font-bold text-gray-700">Daftar Pengguna & Aktivasi</h2>
                    <button onclick="loadUsers()" class="text-blue-600 hover:rotate-180 transition-all duration-500">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-xs uppercase text-gray-600">
                                <th class="p-4">Username</th>
                                <th class="p-4">Divisi / Jabatan</th>
                                <th class="p-4">Status</th>
                                <th class="p-4 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody" class="text-sm divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-divisi" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-md border overflow-hidden">
                <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                    <h2 class="font-bold text-gray-700">Master Data Divisi</h2>
                    <button onclick="openModal('divisi')" class="bg-green-600 text-white px-4 py-1 rounded-lg text-sm hover:bg-green-700">
                        <i class="fas fa-plus mr-1"></i> Tambah Divisi
                    </button>
                </div>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-xs uppercase text-gray-600">
                            <th class="p-4">ID</th>
                            <th class="p-4">Nama Divisi</th>
                            <th class="p-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="divisiTableBody" class="text-sm divide-y"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-jabatan" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-md border overflow-hidden">
                <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                    <h2 class="font-bold text-gray-700">Master Data Jabatan</h2>
                    <button onclick="openModal('jabatan')" class="bg-green-600 text-white px-4 py-1 rounded-lg text-sm hover:bg-green-700">
                        <i class="fas fa-plus mr-1"></i> Tambah Jabatan
                    </button>
                </div>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-xs uppercase text-gray-600">
                            <th class="p-4">ID</th>
                            <th class="p-4">Nama Jabatan</th>
                            <th class="p-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="jabatanTableBody" class="text-sm divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyv21UAuEtUlAcIIfKbboPfXIak9F7kD350dGOi4LC_1lb8nfNMiu0N1P44KsS1ffZz/exec"; // GANTI DENGAN URL GAS ANDA

        window.onload = () => {
            loadUsers();
            loadMetadata();
        };

        // --- TAB LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white');
                b.classList.add('text-gray-600', 'hover:bg-gray-100');
            });
            const activeBtn = 'btn-' + tabId.split('-')[1];
            document.getElementById(activeBtn).classList.add('bg-blue-600', 'text-white');
            document.getElementById(activeBtn).classList.remove('text-gray-600', 'hover:bg-gray-100');
        }

        // --- LOAD DATA ---
        function loadUsers() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-gray-400 italic">Memuat data user...</td></tr>';
            
            fetch(`${SCRIPT_URL}?action=get_users`)
                .then(res => res.json())
                .then(data => {
                    tbody.innerHTML = '';
                    data.forEach(u => {
                        const active = u.is_active === "Yes";
                        tbody.innerHTML += `
                            <tr>
                                <td class="p-4 font-medium text-gray-800">${u.username}</td>
                                <td class="p-4 text-xs text-gray-500 uppercase">${u.divisi} / ${u.jabatan}</td>
                                <td class="p-4">
                                    <span class="px-2 py-1 rounded-full text-[10px] font-bold ${active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} uppercase">
                                        ${u.is_active}
                                    </span>
                                </td>
                                <td class="p-4 text-center">
                                    <button onclick="updateUserStatus(${u.id}, '${active ? 'No' : 'Yes'}')" 
                                        class="px-3 py-1 rounded text-white text-xs ${active ? 'bg-orange-500 hover:bg-orange-600' : 'bg-blue-600 hover:bg-blue-700'}">
                                        ${active ? 'Nonaktifkan' : 'Aktifkan'}
                                    </button>
                                </td>
                            </tr>`;
                    });
                });
        }

        function loadMetadata() {
            fetch(`${SCRIPT_URL}?action=get_metadata`)
                .then(res => res.json())
                .then(data => {
                    renderMetaTable('divisi', data.divisi);
                    renderMetaTable('jabatan', data.jabatan);
                });
        }

        function renderMetaTable(type, items) {
            const tbody = document.getElementById(`${type}TableBody`);
            tbody.innerHTML = '';
            items.forEach(item => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 text-gray-400 font-mono text-xs">#${item.id}</td>
                        <td class="p-4 font-medium">${item.nama}</td>
                        <td class="p-4 text-center">
                            <button onclick="editMeta('${type}', ${item.id}, '${item.nama}')" class="text-blue-600 hover:text-blue-800 p-2">
                                <i class="fas fa-edit"></i>
                            </button>
                        </td>
                    </tr>`;
            });
        }

        // --- ACTIONS ---
        function updateUserStatus(id, newStatus) {
            Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading() });
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "update_status", id: id, status: newStatus })
            }).then(() => {
                Swal.fire('Berhasil!', 'Status user diperbarui.', 'success');
                loadUsers();
            });
        }

        function openModal(type) {
            Swal.fire({
                title: `Tambah ${type}`,
                input: 'text',
                inputLabel: `Nama ${type} baru`,
                showCancelButton: true,
                confirmButtonText: 'Simpan',
                confirmButtonColor: '#2563eb'
            }).then((result) => {
                if (result.isConfirmed && result.value) {
                    saveMetadata(type, result.value);
                }
            });
        }

        function saveMetadata(type, name) {
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "add_metadata", type: type, name: name })
            }).then(res => res.json()).then(res => {
                Swal.fire('Sukses', res.message, 'success');
                loadMetadata();
            });
        }

        // Fitur Edit Metadata (Update)
        function editMeta(type, id, oldName) {
            Swal.fire({
                title: `Edit ${type}`,
                input: 'text',
                inputValue: oldName,
                showCancelButton: true,
                confirmButtonText: 'Update'
            }).then((result) => {
                if (result.isConfirmed && result.value) {
                    // Di sini kita gunakan action update_metadata (Pastikan di GAS sudah ada)
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "update_metadata", type: type, id: id, name: result.value })
                    }).then(() => {
                        Swal.fire('Updated!', `${type} berhasil diubah.`, 'success');
                        loadMetadata();
                    });
                }
            });
        }
    </script>
</body>
</html>
