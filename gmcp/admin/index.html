<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUT Admin - Settings</title>
    
    <script src="components/config.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
        .nav-link.active { 
            background: #2563eb; 
            color: white; 
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        .nav-link.active i { color: white !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex text-slate-800">

    <aside id="sidebar-container" class="sidebar fixed md:relative z-50 w-64 h-screen bg-slate-900 text-white p-6 flex flex-col shadow-2xl shrink-0">
        <div class="flex items-center justify-center h-full opacity-20">
            <i class="fas fa-circle-notch fa-spin text-2xl"></i>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 p-4 sticky top-0 z-40 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition md:hidden">
                    <i class="fas fa-bars"></i>
                </button>
                <h2 class="font-extrabold text-slate-800 uppercase tracking-tight">Pengaturan <span class="text-blue-600 italic">Sistem</span></h2>
            </div>
            <div id="admin-info" class="text-right hidden md:block">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Administrator</p>
                <p id="admin-name" class="text-sm font-black text-slate-700 italic">Admin MUT</p>
            </div>
        </header>

        <main class="p-4 md:p-10 overflow-y-auto">
            <div class="flex gap-6 border-b border-slate-200 mb-8 overflow-x-auto no-scrollbar">
                <button onclick="showTab('users')" id="btn-users" class="tab-link border-b-4 border-blue-600 pb-3 px-2 text-blue-600 font-extrabold text-sm uppercase tracking-tighter transition-all">Manajemen User</button>
                <button onclick="showTab('divisi')" id="btn-divisi" class="tab-link border-b-4 border-transparent pb-3 px-2 text-slate-400 font-extrabold text-sm uppercase tracking-tighter transition-all hover:text-blue-500">Master Divisi</button>
                <button onclick="showTab('jabatan')" id="btn-jabatan" class="tab-link border-b-4 border-transparent pb-3 px-2 text-slate-400 font-extrabold text-sm uppercase tracking-tighter transition-all hover:text-blue-500">Master Jabatan</button>
            </div>

            <div id="content-users" class="tab-pane animate-in fade-in duration-500">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <h3 class="font-black text-slate-700 uppercase text-xs tracking-widest">Database Pengguna</h3>
                        <button onclick="loadData()" class="w-8 h-8 rounded-full flex items-center justify-center text-blue-500 hover:bg-blue-50 transition active:rotate-180">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-black tracking-[0.15em]">
                                <tr>
                                    <th class="p-5">Informasi User</th>
                                    <th class="p-5">Penugasan</th>
                                    <th class="p-5">Status Akses</th>
                                    <th class="p-5 text-center">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody id="userTable" class="text-sm divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <section id="content-divisi" class="tab-pane hidden animate-in fade-in duration-300">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-slate-800 uppercase italic">List Divisi</h3>
                    <button onclick="addEntry('divisi')" class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-lg shadow-blue-200 hover:bg-blue-700 transition uppercase tracking-widest">
                        + Tambah Divisi
                    </button>
                </div>
                <div id="list-divisi" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </section>

            <section id="content-jabatan" class="tab-pane hidden animate-in fade-in duration-300">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-slate-800 uppercase italic">List Jabatan</h3>
                    <button onclick="addEntry('jabatan')" class="bg-slate-900 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-lg shadow-slate-200 hover:bg-slate-800 transition uppercase tracking-widest">
                        + Tambah Jabatan
                    </button>
                </div>
                <div id="list-jabatan" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </section>
        </main>
    </div>

    <script>
        // 1. Logic Fetch Layout & Active Link
        async function fetchLayout() {
            try {
                const response = await fetch('components/head.html');
                const html = await response.text();
                document.getElementById('sidebar-container').innerHTML = html;
                
                // Set active link
                const currentPage = window.location.pathname.split("/").pop().split(".")[0] || 'index';
                const links = document.querySelectorAll('.nav-link');
                links.forEach(l => {
                    if(l.dataset.page === currentPage) l.classList.add('active');
                });
            } catch (e) { console.error("Sidebar Error:", e); }
        }

        // 2. Logic Tabs & Sidebar Toggle
        function toggleSidebar() { document.getElementById('sidebar-container').classList.toggle('active'); }

        function showTab(tabName) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-link').forEach(el => {
                el.classList.remove('border-blue-600', 'text-blue-600');
                el.classList.add('border-transparent', 'text-slate-400');
            });
            document.getElementById(`content-${tabName}`).classList.remove('hidden');
            document.getElementById(`btn-${tabName}`).classList.add('border-blue-600', 'text-blue-600');
            document.getElementById(`btn-${tabName}`).classList.remove('border-transparent', 'text-slate-400');
        }

        // 3. Logic Fetch Data dari Apps Script (Pakai CONFIG.SCRIPT_URL)
        async function loadData() {
            Swal.fire({ title: 'Menyinkronkan...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
            try {
                const [userRes, metaRes] = await Promise.all([
                    fetch(`${CONFIG.SCRIPT_URL}?action=get_users`),
                    fetch(`${CONFIG.SCRIPT_URL}?action=get_metadata`)
                ]);
                renderUsers(await userRes.json());
                const meta = await metaRes.json();
                renderMeta('divisi', meta.divisi);
                renderMeta('jabatan', meta.jabatan);
                Swal.close();
            } catch (err) { Swal.fire('Error', 'Gagal koneksi ke server.', 'error'); }
        }

        function renderUsers(users) {
            const table = document.getElementById('userTable');
            table.innerHTML = users.map(u => {
                const isActive = u.is_active === "Yes";
                return `
                    <tr class="hover:bg-blue-50/30 transition border-b border-slate-50">
                        <td class="p-5">
                            <div class="font-extrabold text-slate-700 uppercase tracking-tighter">${u.username}</div>
                            <div class="text-[9px] font-bold text-slate-300">ID: USER-${u.id}</div>
                        </td>
                        <td class="p-5">
                            <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-[10px] font-black uppercase">${u.divisi}</span>
                            <div class="text-[11px] font-bold text-slate-500 mt-1 italic">${u.jabatan}</div>
                        </td>
                        <td class="p-5 text-center">
                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}">
                                ${isActive ? 'Authorized' : 'Disabled'}
                            </span>
                        </td>
                        <td class="p-5">
                            <div class="flex justify-center gap-2">
                                <button onclick="editUser(${u.id}, '${u.username}', '${u.divisi}', '${u.jabatan}')" class="w-8 h-8 rounded-lg text-blue-500 hover:bg-blue-100 transition"><i class="fas fa-user-edit"></i></button>
                                <button onclick="updateStatus(${u.id}, '${isActive ? 'No' : 'Yes'}')" class="w-8 h-8 rounded-lg ${isActive ? 'text-orange-400 hover:bg-orange-50' : 'text-green-500 hover:bg-green-50'} transition">
                                    <i class="fas ${isActive ? 'fa-user-lock' : 'fa-user-check'}"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            }).join('');
        }

        function renderMeta(type, data) {
            const container = document.getElementById(`list-${type}`);
            container.innerHTML = data.map(item => `
                <div class="flex justify-between items-center p-4 bg-white rounded-2xl border border-slate-100 hover:border-blue-500 hover:shadow-xl hover:shadow-blue-500/5 transition-all group">
                    <span class="font-extrabold text-slate-700 uppercase text-xs tracking-wide">${item.nama}</span>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editEntry('${type}', ${item.id}, '${item.nama}')" class="text-blue-500 hover:bg-blue-50 p-2 rounded-lg"><i class="fas fa-edit text-xs"></i></button>
                    </div>
                </div>`).join('');
        }

        // Tambah fungsi update status yang diringkas
        async function updateStatus(id, status) {
            Swal.fire({ title: 'Updating...', showConfirmButton: false, didOpen: () => Swal.showLoading() });
            await fetch(CONFIG.SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "update_status", id: id, status: status }) });
            loadData();
        }

        // Inisialisasi
        window.onload = () => {
            fetchLayout();
            const user = JSON.parse(localStorage.getItem('user_login'));
            if(user) document.getElementById('admin-name').innerText = user.username;
            loadData();
        };
    </script>
</body>
</html>
