<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - Sistem Penilaian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Animasi loading sederhana */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #059669;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-lg border-t-4 border-green-600 my-10">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Daftar Akun Baru</h1>
            <p class="text-gray-500 text-sm">Lengkapi data diri untuk penilaian</p>
        </div>

        <div id="loadingData" class="text-center py-4 text-emerald-600 font-medium">
            <div class="loader"></div> Memuat data divisi & jabatan...
        </div>

        <form id="registerForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <div class="relative mt-1">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" id="regUsername" required
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none"
                        placeholder="Masukkan username">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <div class="relative mt-1">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="regPassword" required
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none"
                        placeholder="••••••••">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Divisi</label>
                <select id="regDivisi" required
                    class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none bg-white">
                    <option value="">Pilih Divisi</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700">Jabatan</label>
                <select id="regJabatan" required
                    class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none bg-white">
                    <option value="">Pilih Jabatan</option>
                </select>
            </div>

            <div class="md:col-span-2 mt-4">
                <button type="submit" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg shadow-md transition duration-300 transform hover:scale-105 uppercase tracking-wider">
                    Daftar Sekarang
                </button>
            </div>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">Sudah punya akun? 
                <a href="index.html" class="text-green-600 font-semibold hover:underline">Login di sini</a>
            </p>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP GOOGLE SCRIPT ANDA DI SINI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGojTrOTKT-gX2jJRutp6NlonDSyug-bNSr_26OawnvKT5M_BGtjA6rfYGqYdKxjS-/exec";

        // 1. Ambil data Divisi dan Jabatan saat halaman dimuat
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registerForm');
            const loader = document.getElementById('loadingData');

            fetch(`${SCRIPT_URL}?action=get_metadata`)
                .then(response => response.json())
                .then(data => {
                    const selectDivisi = document.getElementById('regDivisi');
                    const selectJabatan = document.getElementById('regJabatan');

                    // Isi dropdown Divisi
                    data.divisi.forEach(item => {
                        let opt = document.createElement('option');
                        opt.value = item.nama;
                        opt.innerHTML = item.nama;
                        selectDivisi.appendChild(opt);
                    });

                    // Isi dropdown Jabatan
                    data.jabatan.forEach(item => {
                        let opt = document.createElement('option');
                        opt.value = item.nama;
                        opt.innerHTML = item.nama;
                        selectJabatan.appendChild(opt);
                    });

                    // Sembunyikan loader, tampilkan form
                    loader.classList.add('hidden');
                    form.classList.remove('hidden');
                })
                .catch(error => {
                    console.error('Error:', error);
                    loader.innerHTML = '<span class="text-red-500">Gagal memuat data. Periksa koneksi atau URL Script.</span>';
                });
        });

        // 2. Kirim data Registrasi
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = {
                action: "register",
                username: document.getElementById('regUsername').value,
                password: document.getElementById('regPassword').value,
                divisi: document.getElementById('regDivisi').value,
                jabatan: document.getElementById('regJabatan').value
            };

            Swal.fire({
                title: 'Mohon Tunggu',
                text: 'Sedang mendaftarkan akun Anda...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(res => {
                if (res.status === "success") {
                    Swal.fire({
                        title: 'Berhasil!',
                        text: res.message,
                        icon: 'success',
                        confirmButtonColor: '#059669'
                    }).then(() => {
                        window.location.href = 'index.html';
                    });
                } else {
                    Swal.fire('Gagal', res.message, 'error');
                }
            })
            .catch(error => {
                Swal.fire('Error', 'Terjadi kesalahan sistem. Coba lagi nanti.', 'error');
                console.error('Error!', error.message);
            });
        });
    </script>
</body>
</html>
