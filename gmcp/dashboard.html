<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penilaian - Mandiri Usaha Teknik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b p-4 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-slate-800 tracking-tighter text-xl italic">MUT <span class="text-blue-600">ASSESS</span></h1>
            <div class="flex items-center gap-3">
                <span id="display-user" class="text-xs font-bold text-slate-500 uppercase">User</span>
                <button onclick="logout()" class="text-red-500 text-sm"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8">
        <div id="welcome-msg" class="mb-8">
            <h2 class="text-2xl font-bold text-slate-800">Halo, Selamat Bekerja! 👋</h2>
            <p class="text-slate-500 text-sm">Berikut adalah daftar rekan kerja yang perlu Anda berikan penilaian periode ini.</p>
        </div>

        <div id="target-container" class="grid grid-cols-1 gap-4">
            </div>

        <div id="modalPenilaian" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
                <div class="p-6 bg-blue-600 text-white">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-blue-100 text-[10px] font-bold uppercase tracking-widest">Penilaian Kinerja</p>
                            <h3 id="target-nama" class="text-xl font-black">NAMA KARYAWAN</h3>
                            <p id="target-meta" class="text-xs text-blue-200 uppercase">DIVISI - JABATAN</p>
                        </div>
                        <button onclick="closeModal()" class="bg-white/10 p-2 rounded-full hover:bg-white/20 transition"><i class="fas fa-times"></i></button>
                    </div>
                </div>

                <div class="p-6 overflow-y-auto space-y-8 flex-1">
                    <form id="formNilai">
                        <input type="hidden" id="target-id">
                        
                        <div id="aspek-container" class="space-y-10">
                            </div>

                        <div class="mt-10">
                            <button type="submit" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black hover:bg-blue-600 transition shadow-xl shadow-blue-200">
                                KIRIM PENILAIAN SEKARANG
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJk8vGRcfyCVPkCVCCY_9xKaiAzRaYuA-gPI7UshOAy0u241UtmHufPb3O6l27bP31/exec";
        const currentUser = JSON.parse(localStorage.getItem('user_login')); // Asumsi data login disimpan di localStorage
        
        const ASPEK = [
            "Kejujuran", "Semangat Kerja", "Ketaatan dan Kepatuhan", 
            "Ketelitian", "Hasil Kerja", "Tanggung Jawab", "Kerja Sama"
        ];

        const SKALA = [
            {v: 1, t: "Sangat Tidak Baik"},
            {v: 2, t: "Kurang Baik"},
            {v: 3, t: "Cukup Baik"},
            {v: 4, t: "Baik"},
            {v: 5, t: "Sangat Baik"}
        ];

        if(!currentUser) window.location.href = "index.html";

        async function init() {
            document.getElementById('display-user').innerText = currentUser.username;
            loadTargets();
        }

        async function loadTargets() {
            Swal.fire({title: 'Memuat data...', didOpen: () => Swal.showLoading()});
            const res = await fetch(`${SCRIPT_URL}?action=get_target_penilaian&userId=${currentUser.id}`);
            const targets = await res.json();
            
            const container = document.getElementById('target-container');
            container.innerHTML = targets.map(t => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center group hover:border-blue-500 transition-all duration-300">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition">
                            <i class="fas fa-user-check"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-800 uppercase text-sm">${t.nama}</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${t.divisi} • ${t.jabatan}</p>
                        </div>
                    </div>
                    <button onclick='openPenilaian(${JSON.stringify(t)})' class="bg-slate-50 text-slate-700 px-5 py-2 rounded-xl text-xs font-black hover:bg-blue-600 hover:text-white transition">
                        NILAI <i class="fas fa-arrow-right ml-1"></i>
                    </button>
                </div>
            `).join('');
            
            if(targets.length === 0) container.innerHTML = `<div class="text-center p-10 text-slate-400 italic">Tidak ada karyawan yang perlu dinilai.</div>`;
            Swal.close();
        }

        function openPenilaian(t) {
            document.getElementById('target-id').value = t.id;
            document.getElementById('target-nama').innerText = t.nama;
            document.getElementById('target-meta').innerText = `${t.divisi} - ${t.jabatan}`;
            
            const container = document.getElementById('aspek-container');
            container.innerHTML = ASPEK.map((asp, idx) => `
                <div class="space-y-4">
                    <h5 class="font-black text-slate-700 text-sm uppercase flex items-center gap-3">
                        <span class="bg-slate-800 text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px]">${idx+1}</span>
                        ${asp}
                    </h5>
                    <div class="grid grid-cols-5 gap-2">
                        ${SKALA.map(s => `
                            <label class="cursor-pointer group">
                                <input type="radio" name="asp_${idx}" value="${s.v}" required class="peer hidden">
                                <div class="text-center p-3 rounded-xl border bg-slate-50 border-slate-100 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 transition group-hover:bg-slate-200">
                                    <div class="text-lg font-bold">${s.v}</div>
                                    <div class="text-[8px] font-bold uppercase leading-tight hidden md:block">${s.t}</div>
                                </div>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('modalPenilaian').classList.remove('hidden');
        }

        document.getElementById('formNilai').onsubmit = async (e) => {
            e.preventDefault();
            const skor = {};
            ASPEK.forEach((asp, idx) => {
                skor[asp] = document.querySelector(`input[name="asp_${idx}"]:checked`).value;
            });

            const payload = {
                action: "submit_penilaian",
                id_karyawan: document.getElementById('target-id').value,
                skor: skor,
                userId: currentUser.id
            };

            Swal.fire({title: 'Mengirim Nilai...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            
            Swal.fire('Terima Kasih!', 'Penilaian Anda telah tersimpan.', 'success');
            closeModal();
            loadTargets();
        };

        function closeModal() { document.getElementById('modalPenilaian').classList.add('hidden'); }
        function logout() { localStorage.clear(); window.location.href = "index.html"; }

        window.onload = init;
    </script>
</body>
</html>
