<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUT Assess - Dashboard Sistem Penilaian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .gradient-bg { background: radial-gradient(circle at top right, #f0f9ff, #f8fafc); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (min-width: 1024px) { .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-area-pb { padding-bottom: env(safe-area-inset-bottom); }
        input[type="radio"]:checked + div { transform: scale(1.05); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col lg:flex-row text-slate-800">

    <aside class="hidden lg:flex w-72 flex-col bg-white border-r border-slate-200 p-6 sticky top-0 h-screen z-40">
        <div class="flex items-center gap-3 px-2 mb-10">
            <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i class="fas fa-bolt text-lg"></i>
            </div>
            <h1 class="font-black text-xl tracking-tighter uppercase italic text-slate-900">MUT <span class="text-blue-600">Assess</span></h1>
        </div>

        <nav class="flex-1 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-100">
                <i class="fas fa-grid-2 w-5 text-center"></i> Dashboard
            </a>
            <button onclick="Swal.fire('Info', 'Fitur riwayat global segera hadir.', 'info')" class="w-full flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-50 hover:text-slate-600 rounded-2xl font-semibold transition">
                <i class="fas fa-history w-5 text-center"></i> Semua Riwayat
            </button>
        </nav>

        <div class="mt-auto p-5 bg-slate-900 rounded-[2rem] relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Login Sebagai</p>
                <p id="pc-user-name" class="text-white font-bold truncate italic">Leader Name</p>
                <button onclick="logout()" class="mt-4 text-xs text-red-400 font-bold flex items-center gap-2 hover:text-red-300 transition">
                    <i class="fas fa-power-off"></i> KELUAR SISTEM
                </button>
            </div>
        </div>
    </aside>

    <header class="lg:hidden glass sticky top-0 z-40 p-4 flex justify-between items-center h-16">
        <h1 class="font-black text-lg text-slate-900 italic tracking-tighter uppercase">MUT <span class="text-blue-600">v2.1</span></h1>
        <div id="mobile-user-badge" class="text-[9px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full uppercase tracking-widest border border-blue-100">User</div>
    </header>

    <main class="flex-1 flex flex-col min-w-0 pb-24 lg:pb-10">
        <div class="p-5 md:p-10 max-w-6xl mx-auto w-full">
            
            <section class="mb-8 lg:mb-12">
                <h2 class="text-2xl md:text-4xl font-black text-slate-900 tracking-tight leading-tight">
                    Tugas Penilaian <br class="md:hidden"> <span class="text-blue-600 italic">Rekan Kerja.</span>
                </h2>
                <div class="flex flex-wrap items-center gap-4 mt-4">
                    <span class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-slate-100 shadow-sm text-xs font-bold text-slate-500">
                        <i class="fas fa-check-circle text-green-500"></i> <span id="stat-done">0</span> Dinilai
                    </span>
                    <span class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-slate-100 shadow-sm text-xs font-bold text-slate-500">
                        <i class="fas fa-clock text-orange-500"></i> <span id="stat-pending">0</span> Menunggu
                    </span>
                </div>
            </section>

            <div class="relative mb-8 group">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                <input type="text" oninput="searchKaryawan(this.value)" placeholder="Cari nama karyawan..." 
                    class="w-full pl-14 pr-6 py-4 rounded-[1.5rem] border-none shadow-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none bg-white text-sm font-semibold text-slate-700">
            </div>

            <div id="target-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                </div>
        </div>
    </main>

    <nav class="lg:hidden fixed bottom-0 left-0 right-0 glass z-40 px-6 py-3 flex justify-around items-center safe-area-pb">
        <button class="flex flex-col items-center gap-1 text-blue-600">
            <i class="fas fa-house-chimney text-xl"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">Beranda</span>
        </button>
        <button onclick="logout()" class="flex flex-col items-center gap-1 text-red-400">
            <i class="fas fa-sign-out-alt text-xl"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">Keluar</span>
        </button>
    </nav>

    <div id="modalPenilaian" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 flex items-end md:items-center justify-center p-0 md:p-4">
        <div class="bg-white w-full max-w-2xl md:rounded-[2.5rem] rounded-t-[2.5rem] shadow-2xl overflow-hidden h-[92vh] md:h-auto md:max-h-[90vh] flex flex-col animate-in slide-in-from-bottom duration-300">
            
            <div class="p-6 md:p-8 bg-blue-600 text-white flex justify-between items-center sticky top-0 z-10">
                <div>
                    <h3 id="target-nama" class="text-xl md:text-2xl font-black truncate max-w-[200px] md:max-w-md uppercase tracking-tight">NAMA</h3>
                    <p id="target-meta" class="text-[10px] md:text-xs text-blue-100 font-bold uppercase tracking-widest opacity-80"></p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center hover:bg-white/20 transition-all">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>

            <div class="p-6 md:p-8 overflow-y-auto flex-1 bg-slate-50/50 no-scrollbar">
                <form id="formNilai" class="space-y-12">
                    <input type="hidden" id="target-id">
                    <div id="aspek-container" class="space-y-12 pb-6">
                        </div>
                    
                    <div class="sticky bottom-0 pt-4 bg-slate-50/10 backdrop-blur-sm">
                        <button type="submit" class="w-full bg-slate-900 text-white py-4 md:py-5 rounded-2xl font-black text-sm md:text-base hover:bg-blue-600 transition-all shadow-xl shadow-slate-200 uppercase tracking-widest">
                            Kirim Penilaian <i class="fas fa-paper-plane ml-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzs_Xdq2Z_N76XOrCyOqKYthiuUfeQHvdVWJaS6C977hGWHAXvwxKRLqcTsKcgmgaJE/exec"; // GANTI DENGAN URL DEPLOY ANDA
        const currentUser = JSON.parse(localStorage.getItem('user_login'));
        let allTargets = [];

        const ASPEK = [
            {n: "Kejujuran", d: "Integritas dan kejujuran dalam bekerja"},
            {n: "Semangat Kerja", d: "Antusiasme dan inisiatif harian"},
            {n: "Ketaatan", d: "Kepatuhan terhadap SOP & aturan"},
            {n: "Ketelitian", d: "Kecermatan dan ketepatan tugas"},
            {n: "Hasil Kerja", d: "Kualitas output pekerjaan"},
            {n: "Tanggung Jawab", d: "Kepedulian terhadap hasil proses"},
            {n: "Kerja Sama", d: "Kolaborasi antar tim di MUT"}
        ];

        if(!currentUser) window.location.href = "index.html";

        window.onload = () => {
            document.getElementById('pc-user-name').innerText = currentUser.username;
            document.getElementById('mobile-user-badge').innerText = currentUser.username;
            loadTargets();
        };

        async function loadTargets() {
            Swal.fire({title: 'Sinkronisasi...', showConfirmButton: false, didOpen: () => Swal.showLoading()});
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_target_penilaian&userId=${currentUser.id}`);
                allTargets = await res.json();
                renderGrid(allTargets);
                Swal.close();
            } catch(e) { 
                Swal.fire('Gagal', 'Gagal memuat data dari server.', 'error'); 
            }
        }

        function renderGrid(data) {
            const grid = document.getElementById('target-grid');
            let done = 0;
            
            grid.innerHTML = data.map((t, idx) => {
                const sudah = t.sudah_dinilai;
                if(sudah) done++;

                return `
                    <div class="bg-white p-5 rounded-[2rem] border ${sudah ? 'border-blue-100 bg-blue-50/20' : 'border-slate-100'} shadow-sm card-hover flex flex-col justify-between group">
                        <div class="flex items-center gap-4 mb-6">
                            <div class="w-12 h-12 ${sudah ? 'bg-blue-600 text-white' : 'bg-slate-50 text-slate-400'} rounded-2xl flex items-center justify-center transition-all duration-500 shadow-inner">
                                <i class="fas ${sudah ? 'fa-check-double' : 'fa-user-clock'} text-lg"></i>
                            </div>
                            <div class="min-w-0">
                                <h4 class="font-black text-slate-800 uppercase text-sm truncate leading-tight">${t.nama}</h4>
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest truncate">${t.jabatan}</p>
                            </div>
                        </div>
                        
                        <button onclick="handleOpenModal(${idx})" 
                            class="w-full ${sudah ? 'bg-white border-2 border-blue-600 text-blue-600' : 'bg-slate-900 text-white'} py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest hover:scale-[1.02] transition-all active:scale-95 shadow-sm">
                            ${sudah ? 'Edit Nilai <i class="fas fa-edit ml-1"></i>' : 'Beri Nilai <i class="fas fa-chevron-right ml-1"></i>'}
                        </button>
                    </div>
                `;
            }).join('');
            
            document.getElementById('stat-done').innerText = done;
            document.getElementById('stat-pending').innerText = data.length - done;

            if(data.length === 0) grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400 font-bold italic">Tidak ada target penilaian untuk Anda saat ini.</div>`;
        }

        function searchKaryawan(q) {
            const filtered = allTargets.filter(t => t.nama.toLowerCase().includes(q.toLowerCase()));
            renderGrid(filtered);
        }

        function handleOpenModal(idx) {
            const t = allTargets[idx];
            document.getElementById('target-id').value = t.id;
            document.getElementById('target-nama').innerText = t.nama;
            
            const metaEl = document.getElementById('target-meta');
            metaEl.innerHTML = t.sudah_dinilai 
                ? `<span class="bg-amber-400 text-slate-900 px-2 py-0.5 rounded-md mr-2">RIWAYAT ADA</span> ${t.divisi} • ${t.jabatan}`
                : `${t.divisi} • ${t.jabatan}`;
            
            const container = document.getElementById('aspek-container');
            container.innerHTML = ASPEK.map((asp, i) => {
                // Pre-check radio jika data_nilai ada (Mode Edit)
                const savedValue = (t.sudah_dinilai && t.data_nilai && t.data_nilai.skor) ? t.data_nilai.skor[asp.n] : null;

                return `
                    <div class="space-y-4">
                        <div class="flex items-start gap-3">
                            <span class="mt-1 w-6 h-6 rounded-lg bg-blue-600 text-white flex items-center justify-center text-[10px] font-bold shrink-0">${i+1}</span>
                            <div>
                                <h5 class="font-black text-slate-800 text-sm uppercase tracking-tight">${asp.n}</h5>
                                <p class="text-[10px] text-slate-400 font-medium">${asp.d}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-5 gap-2 ml-9">
                            ${[1,2,3,4,5].map(v => `
                                <label class="cursor-pointer">
                                    <input type="radio" name="asp_${i}" value="${v}" required 
                                        ${savedValue == v ? 'checked' : ''} class="peer hidden">
                                    <div class="text-center py-3.5 rounded-xl border-2 border-slate-100 bg-white peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 transition-all shadow-sm">
                                        <span class="text-sm font-black">${v}</span>
                                    </div>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('modalPenilaian').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('formNilai').onsubmit = async (e) => {
            e.preventDefault();
            const skor = {};
            ASPEK.forEach((asp, i) => {
                const radio = document.querySelector(`input[name="asp_${i}"]:checked`);
                if(radio) skor[asp.n] = radio.value;
            });

            const payload = {
                action: "submit_penilaian",
                id_karyawan: document.getElementById('target-id').value,
                skor: skor,
                userId: currentUser.id
            };

            Swal.fire({title: 'Mengirim Data...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                
                if(result.status === "success") {
                    Swal.fire({icon: 'success', title: 'Berhasil!', text: result.message, timer: 1500, showConfirmButton: false});
                    closeModal();
                    loadTargets();
                } else {
                    throw new Error(result.message);
                }
            } catch(e) { 
                Swal.fire('Gagal', 'Terjadi kesalahan saat menyimpan penilaian.', 'error'); 
            }
        };

        function closeModal() { 
            document.getElementById('modalPenilaian').classList.add('hidden'); 
            document.body.style.overflow = 'auto';
        }

        function logout() { 
            localStorage.clear(); 
            window.location.href = "index.html"; 
        }
    </script>
</body>
</html>
