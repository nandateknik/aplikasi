<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUT Assess - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .gradient-bg { background: radial-gradient(circle at top right, #f0f9ff, #f8fafc); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (min-width: 1024px) { .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-area-pb { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col lg:flex-row text-slate-800">

    <aside class="hidden lg:flex w-72 flex-col bg-white border-r border-slate-200 p-6 sticky top-0 h-screen z-40">
        <div class="flex items-center gap-3 px-2 mb-10">
            <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i class="fas fa-bolt text-lg"></i>
            </div>
            <h1 class="font-black text-xl tracking-tighter uppercase italic text-slate-900">MUT <span class="text-blue-600">Assess</span></h1>
        </div>

        <nav class="flex-1 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-100 transition">
                <i class="fas fa-grid-2 w-5 text-center"></i> Dashboard
            </a>
            <button onclick="Swal.fire('Coming Soon', 'Fitur Riwayat sedang disiapkan.', 'info')" class="w-full flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-50 hover:text-slate-600 rounded-2xl font-semibold transition">
                <i class="fas fa-clock-rotate-left w-5 text-center"></i> Riwayat
            </button>
        </nav>

        <div class="mt-auto p-5 bg-slate-900 rounded-[2rem] relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Akun Leader</p>
                <p id="pc-user-name" class="text-white font-bold truncate">Loading...</p>
                <button onclick="logout()" class="mt-4 text-xs text-red-400 font-bold flex items-center gap-2 hover:text-red-300 transition">
                    <i class="fas fa-power-off"></i> LOGOUT
                </button>
            </div>
            <div class="absolute -bottom-4 -right-4 w-20 h-20 bg-white/5 rounded-full blur-2xl"></div>
        </div>
    </aside>

    <header class="lg:hidden glass sticky top-0 z-40 p-4 flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                <i class="fas fa-bolt text-sm"></i>
            </div>
            <h1 class="font-black text-lg text-slate-900 italic tracking-tighter uppercase">MUT</h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="mobile-user-name" class="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-slate-100 px-2 py-1 rounded-md">User</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col min-w-0 pb-24 lg:pb-10">
        <div class="p-5 md:p-10 max-w-6xl mx-auto w-full">
            
            <section class="mb-8 lg:mb-12">
                <h2 class="text-2xl md:text-4xl font-black text-slate-900 tracking-tight leading-tight">
                    Mari kita beri <br class="md:hidden"> <span class="text-blue-600 italic">Penilaian Objektif.</span>
                </h2>
                <div class="flex flex-wrap items-center gap-4 mt-4 text-slate-500 font-medium text-sm md:text-base">
                    <span class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-slate-100 shadow-sm">
                        <i class="fas fa-calendar-alt text-blue-500"></i> Periode 2026
                    </span>
                    <span class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-slate-100 shadow-sm">
                        <i class="fas fa-users text-blue-500"></i> <span id="stat-count">0</span> Karyawan
                    </span>
                </div>
            </section>

            <div class="relative mb-8">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" oninput="searchKaryawan(this.value)" placeholder="Cari nama rekan kerja..." 
                    class="w-full pl-12 pr-4 py-4 rounded-[1.5rem] border-none shadow-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none bg-white text-sm font-semibold">
            </div>

            <div id="target-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                </div>
        </div>
    </main>

    <nav class="lg:hidden fixed bottom-0 left-0 right-0 glass z-40 px-6 py-3 flex justify-around items-center safe-area-pb">
        <button class="flex flex-col items-center gap-1 text-blue-600">
            <i class="fas fa-house-chimney text-xl"></i>
            <span class="text-[9px] font-black uppercase">Home</span>
        </button>
        <button onclick="Swal.fire('Info', 'Fitur sedang dikembangkan', 'info')" class="flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-chart-pie text-xl"></i>
            <span class="text-[9px] font-black uppercase">Laporan</span>
        </button>
        <button onclick="logout()" class="flex flex-col items-center gap-1 text-red-400">
            <i class="fas fa-sign-out-alt text-xl"></i>
            <span class="text-[9px] font-black uppercase">Logout</span>
        </button>
    </nav>

    <div id="modalPenilaian" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 flex items-end md:items-center justify-center">
        <div class="bg-white w-full max-w-2xl md:rounded-[2.5rem] rounded-t-[2.5rem] shadow-2xl overflow-hidden h-[90vh] md:h-auto md:max-h-[90vh] flex flex-col animate-in slide-in-from-bottom duration-300">
            <div class="p-6 md:p-8 bg-blue-600 text-white flex justify-between items-center sticky top-0 z-10">
                <div>
                    <h3 id="target-nama" class="text-xl md:text-2xl font-black truncate max-w-[200px] md:max-w-md uppercase tracking-tight">Nama</h3>
                    <p id="target-meta" class="text-[10px] md:text-xs text-blue-100 font-bold uppercase tracking-widest opacity-80"></p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center hover:bg-white/20">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="p-6 md:p-8 overflow-y-auto flex-1 bg-slate-50/30 no-scrollbar">
                <form id="formNilai" class="space-y-10">
                    <input type="hidden" id="target-id">
                    <div id="aspek-container" class="space-y-10"></div>
                    
                    <div class="pt-6">
                        <button type="submit" class="w-full bg-slate-900 text-white py-4 md:py-5 rounded-2xl font-black text-sm md:text-base hover:bg-blue-600 transition-all shadow-xl shadow-blue-100 uppercase tracking-widest">
                            Simpan & Kirim Nilai
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Ganti URL ini dengan URL Apps Script punyamu
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7H8Epn6ulqRZpgGZWcOMFsGGKS0T9kacURWcWpIn-SGRSSmAJ2WypeEdZ5B4-pB64/exec";
        const currentUser = JSON.parse(localStorage.getItem('user_login'));
        let allTargets = [];

        const ASPEK = [
            {n: "Kejujuran", d: "Integritas & kejujuran kerja"},
            {n: "Semangat Kerja", d: "Motivasi & inisiatif harian"},
            {n: "Ketaatan", d: "Kepatuhan terhadap SOP"},
            {n: "Ketelitian", d: "Kecermatan hasil kerja"},
            {n: "Hasil Kerja", d: "Kualitas output pekerjaan"},
            {n: "Tanggung Jawab", d: "Kepedulian terhadap tugas"},
            {n: "Kerja Sama", d: "Kolaborasi di lapangan/kantor"}
        ];

        if(!currentUser) window.location.href = "index.html";

        window.onload = () => {
            document.getElementById('pc-user-name').innerText = currentUser.username;
            document.getElementById('mobile-user-name').innerText = currentUser.username;
            loadTargets();
        };

        async function loadTargets() {
            Swal.fire({title: 'Memuat Data...', showConfirmButton: false, didOpen: () => Swal.showLoading()});
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_target_penilaian&userId=${currentUser.id}`);
                allTargets = await res.json();
                renderGrid(allTargets);
                Swal.close();
            } catch(e) { 
                Swal.fire('Error', 'Gagal memuat data. Periksa SCRIPT_URL.', 'error'); 
            }
        }

        function renderGrid(data) {
            const grid = document.getElementById('target-grid');
            document.getElementById('stat-count').innerText = data.length;
            
            grid.innerHTML = data.map((t, idx) => `
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm card-hover flex flex-col justify-between group">
                    <div class="flex items-center gap-4 mb-5">
                        <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-all duration-500">
                            <i class="fas fa-user-check text-xl"></i>
                        </div>
                        <div class="min-w-0">
                            <h4 class="font-black text-slate-800 uppercase text-sm truncate leading-tight">${t.nama}</h4>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest truncate">${t.jabatan}</p>
                        </div>
                    </div>
                    <button onclick="handleOpenModal(${idx})" 
                        class="w-full bg-slate-50 text-slate-800 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-900 hover:text-white transition-all">
                        Mulai Penilaian <i class="fas fa-arrow-right ml-1"></i>
                    </button>
                </div>
            `).join('');
            
            if(data.length === 0) grid.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400 font-bold italic">Tidak ada karyawan ditemukan.</div>`;
        }

        function searchKaryawan(q) {
            const filtered = allTargets.filter(t => t.nama.toLowerCase().includes(q.toLowerCase()));
            renderGrid(filtered);
        }

        function handleOpenModal(idx) {
            const t = allTargets[idx];
            document.getElementById('target-id').value = t.id;
            document.getElementById('target-nama').innerText = t.nama;
            document.getElementById('target-meta').innerText = `${t.divisi} • ${t.jabatan}`;
            
            const container = document.getElementById('aspek-container');
            container.innerHTML = ASPEK.map((asp, i) => `
                <div class="space-y-4">
                    <div>
                        <h5 class="font-black text-slate-800 text-sm uppercase tracking-tight flex items-center gap-2">
                            <span class="w-6 h-6 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center text-[10px]">${i+1}</span>
                            ${asp.n}
                        </h5>
                        <p class="text-[10px] text-slate-400 font-medium ml-8">${asp.d}</p>
                    </div>
                    <div class="grid grid-cols-5 gap-2 ml-8">
                        ${[1,2,3,4,5].map(v => `
                            <label class="cursor-pointer">
                                <input type="radio" name="asp_${i}" value="${v}" required class="peer hidden">
                                <div class="text-center p-3 rounded-xl border border-slate-100 bg-white peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 transition-all">
                                    <span class="text-sm font-black">${v}</span>
                                </div>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('modalPenilaian').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('formNilai').onsubmit = async (e) => {
            e.preventDefault();
            const skor = {};
            ASPEK.forEach((asp, i) => {
                skor[asp.n] = document.querySelector(`input[name="asp_${i}"]:checked`).value;
            });

            const payload = {
                action: "submit_penilaian",
                id_karyawan: document.getElementById('target-id').value,
                skor: skor,
                userId: currentUser.id
            };

            Swal.fire({title: 'Mengirim...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                Swal.fire({icon: 'success', title: 'Berhasil!', text: 'Penilaian telah tersimpan.', timer: 1500, showConfirmButton: false});
                closeModal();
                loadTargets();
            } catch(e) { Swal.fire('Error', 'Gagal kirim data.', 'error'); }
        };

        function closeModal() { 
            document.getElementById('modalPenilaian').classList.add('hidden'); 
            document.body.style.overflow = 'auto';
        }

        function logout() { localStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
