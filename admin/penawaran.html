<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penawaran Harga | Nanda Teknik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="assets/layout.css">
    
    <style>
        body { background: #f4f7fe; padding-bottom: 110px; }
        .brand-section { text-align: center; margin-bottom: 25px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .brand-section h5 { font-weight: 800; color: #0d6efd; margin-bottom: 2px; }
        .brand-subtitle { font-size: 0.75rem; color: #64748b; font-weight: 600; letter-spacing: 1px; }
        .filter-section { background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .quote-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.04); transition: transform 0.2s; }
        .quote-card:active { transform: scale(0.98); }
        .card-id { font-size: 0.75rem; font-weight: 700; color: #94a3b8; }
        .card-perihal { font-size: 1.1rem; font-weight: 700; color: #1e293b; margin-top: 5px; }
        .card-client { font-size: 0.85rem; color: #64748b; display: flex; align-items: center; gap: 5px; }
        .quote-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e2e8f0; }
        .badge-status { padding: 6px 14px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .status-sent { background: #eff6ff; color: #2563eb; }
        .status-accepted { background: #fff7ed; color: #ea580c; }
        .status-approved--lunas- { background: #f0fdf4; color: #16a34a; }
        .status-rejected { background: #fef2f2; color: #dc2626; }
        .pagination-container { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .btn-page { width: 40px; height: 40px; border-radius: 12px; border: none; background: white; color: #64748b; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .btn-page.active { background: #0d6efd; color: white; }
        #search-results { position: absolute; z-index: 1000; width: 100%; max-height: 200px; overflow-y: auto; display: none; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="brand-section animate__animated animate__fadeIn">
                <h5>NANDA TEKNIK BANYUWANGI</h5>
                <div class="brand-subtitle">SOFTWARE, NETWORK & ELECTRICAL ENGINEERING</div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h6 class="fw-bold m-0"><i class="fas fa-file-invoice-dollar me-2 text-primary"></i>Daftar Penawaran</h6>
                <button class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="showAddModal()">
                    <i class="fas fa-plus me-2"></i>Buat Baru
                </button>
            </div>

            <div id="cards-container"><div class="text-center p-5"><div class="spinner-border text-primary"></div></div></div>
            <div id="pagination" class="pagination-container mb-5"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalForm" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-0 bg-light">
                <h5 class="modal-title fw-bold">Form Penawaran & Nota</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formPenawaran">
                    <input type="hidden" id="edit-id">
                    <div class="row g-3">
                        <div class="col-md-6 position-relative">
                            <label class="form-label small fw-bold">Cari Pelanggan</label>
                            <input type="text" id="search-pelanggan" class="form-control" placeholder="Nama..." oninput="searchPelanggan(this.value)">
                            <div id="search-results" class="list-group shadow"></div>
                            <input type="hidden" id="form-email" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Perihal Pekerjaan</label>
                            <input type="text" id="form-perihal" class="form-control" required>
                        </div>
                    </div>
                    <div class="mt-4">
                        <label class="form-label small fw-bold">Item Pekerjaan</label>
                        <div id="items-container"></div>
                        <button type="button" class="btn btn-outline-primary btn-sm mt-2 w-100" onclick="addItemRow()"><i class="fas fa-plus"></i> Tambah Baris</button>
                    </div>
                    <div class="row mt-4 align-items-center">
                        <div class="col-6">
                            <select id="form-status" class="form-select">
                                <option value="Sent">Sent</option>
                                <option value="Accepted">Accepted (Belum Lunas)</option>
                                <option value="Approved (Lunas)">Approved (Lunas)</option>
                                <option value="Rejected">Rejected</option>
                            </select>
                        </div>
                        <div class="col-6 text-end">
                            <h3 class="fw-bold text-primary mb-0" id="display-total">Rp 0</h3>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-4 py-3 fw-bold rounded-pill">SIMPAN DATA</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="assets/config.js"></script>
<script src="assets/layout.js"></script>

<script>
    let allData = [];
    let listPelanggan = [];
    let currentPage = 1;
    const itemsPerPage = 5;
    const modalForm = new bootstrap.Modal(document.getElementById('modalForm'));

    window.onload = () => { if(typeof initLayout === 'function') initLayout(); loadDataSakti(); };

    async function loadDataSakti() {
        try {
            const resP = await fetch(CONFIG.WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getAllPelanggan' }) });
            const rP = await resP.json();
            if(rP.success) listPelanggan = rP.data;

            const resQ = await fetch(`${CONFIG.WEB_APP_URL}?action=read&sheet=Penawaran`);
            const rQ = await resQ.json();
            if (rQ.success) { 
                const mapP = {}; listPelanggan.forEach(p => { if(p[1]) mapP[p[1].toLowerCase()] = p[0]; });
                allData = rQ.data.reverse().map(row => ({ ...row, nama_asli: mapP[(row.email||"").toLowerCase()] || row.nama }));
                renderDisplay(); 
            }
        } catch(e) { console.error(e); }
    }

    function renderDisplay() {
        const container = document.getElementById('cards-container');
        const start = (currentPage - 1) * itemsPerPage;
        const paginated = allData.slice(start, start + itemsPerPage);
        
        container.innerHTML = paginated.map(row => {
            const st = row.status.toLowerCase();
            const isReadyNota = st.includes('accepted') || st.includes('approved');
            return `
                <div class="quote-card animate__animated animate__fadeInUp">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <span class="card-id">#${row.id} • ${new Date(row.tanggal).toLocaleDateString('id-ID')}</span>
                            <div class="card-perihal">${row.perihal}</div>
                            <div class="card-client mt-1"><b>${row.nama_asli}</b></div>
                        </div>
                        <span class="badge-status status-${st.replace(/\s+/g, '-').replace(/[()]/g, '')}">${row.status}</span>
                    </div>
                    <div class="quote-footer">
                        <span class="fw-bold text-primary fs-5">Rp ${Number(row.total).toLocaleString('id-ID')}</span>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-light" onclick="editPenawaran('${row.id}')"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick='preparePDF("${row.id}")'><i class="fas fa-file-pdf"></i></button>
                            ${isReadyNota ? `<button class="btn btn-sm btn-success" onclick='prepareNota("${row.id}")'><i class="fas fa-receipt"></i> Nota</button>` : ''}
                        </div>
                    </div>
                </div>`;
        }).join('');
        renderPagination();
    }

    function renderPagination() {
        const totalPages = Math.ceil(allData.length / itemsPerPage);
        let html = '';
        for (let i = 1; i <= totalPages; i++) html += `<button class="btn-page ${i===currentPage?'active':''}" onclick="currentPage=${i};renderDisplay()">${i}</button>`;
        document.getElementById('pagination').innerHTML = html;
    }

    // --- PDF PENAWARAN ---
    function preparePDF(id) {
        const data = allData.find(r => r.id === id);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        try { doc.addImage('logo-none-text.png', 'PNG', 15, 12, 23, 23); } catch (e) {}
        doc.setFontSize(18); doc.setFont("helvetica", "bold"); doc.text("NANDA TEKNIK BANYUWANGI", 45, 20);
        doc.setFontSize(9); doc.setFont("helvetica", "normal"); doc.text("Software, Network & Electrical Engineering", 45, 26);
        doc.text("WA: 082331201148 | Email: nandateknik02@gmail.com", 45, 35);
        doc.line(15, 40, 195, 40);

        doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.text("SURAT PENAWARAN HARGA", 105, 50, { align: "center" });
        doc.setFontSize(9); doc.setFont("helvetica", "normal");
        doc.text(`No: #${data.id}`, 15, 60); doc.text("Kepada Yth:", 130, 60);
        doc.setFont("helvetica", "bold"); doc.text(data.nama_asli.toUpperCase(), 130, 65);

        doc.autoTable({
            startY: 85, head: [['NO', 'DESKRIPSI', 'QTY', 'HARGA', 'JUMLAH']],
            body: data.items_json.map((it, i) => [i+1, it.nama, it.qty, `Rp ${it.harga.toLocaleString('id-ID')}`, `Rp ${(it.harga*it.qty).toLocaleString('id-ID')}`]),
            theme: 'grid', headStyles: { fillColor: [80, 80, 80] }
        });

        let fY = doc.lastAutoTable.finalY + 10;
        doc.text(`TOTAL ESTIMASI: Rp ${Number(data.total).toLocaleString('id-ID')}`, 195, fY, { align: "right" });
        
        doc.setLineDashPattern([2, 2], 0); doc.rect(15, fY + 5, 180, 20);
        doc.setLineDashPattern([], 0); doc.setFontSize(8); doc.text("Syarat & Ketentuan:", 20, fY + 11);
        doc.text("1. DP 50% diawal. 2. Pelunasan max 3 hari setelah selesai.", 20, fY + 16);
        doc.save(`Penawaran_${data.id}.pdf`);
    }

    // --- PDF NOTA ---
    function prepareNota(id) {
        const data = allData.find(r => r.id === id);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const isLunas = data.status.toLowerCase().includes('lunas');

        // Fix Watermark Error
        doc.setTextColor(isLunas ? 200 : 255, isLunas ? 255 : 200, isLunas ? 200 : 200);
        doc.setFontSize(60); doc.text(isLunas ? "LUNAS" : "BELUM LUNAS", 105, 150, { align: "center", angle: 45 });

        doc.setTextColor(0);
        try { doc.addImage('logo-none-text.png', 'PNG', 15, 12, 23, 23); } catch (e) {}
        doc.setFontSize(18); doc.setFont("helvetica", "bold"); doc.text("NANDA TEKNIK BANYUWANGI", 45, 20);
        doc.line(15, 40, 195, 40);

        doc.setFontSize(12); doc.text("FAKTUR PEMBAYARAN", 105, 50, { align: "center" });
        doc.setFontSize(9); doc.setFont("helvetica", "normal");
        doc.text(`No: #${data.id}`, 15, 60); doc.text(data.nama_asli.toUpperCase(), 130, 65);

        doc.autoTable({
            startY: 85, head: [['NO', 'DESKRIPSI', 'QTY', 'HARGA', 'JUMLAH']],
            body: data.items_json.map((it, i) => [i+1, it.nama, it.qty, `Rp ${it.harga.toLocaleString('id-ID')}`, `Rp ${(it.harga*it.qty).toLocaleString('id-ID')}`]),
            theme: 'grid', headStyles: { fillColor: [80, 80, 80] }
        });

        let fY = doc.lastAutoTable.finalY + 10;
        doc.setFont("helvetica", "bold"); doc.text(`TOTAL: Rp ${Number(data.total).toLocaleString('id-ID')}`, 195, fY, { align: "right" });

        doc.setLineDashPattern([2, 2], 0); doc.rect(15, fY + 5, 180, 15);
        doc.setLineDashPattern([], 0); doc.setFontSize(9);
        doc.text("Transfer: Bank BCA - 1801826011 | A/N NANDA KRISBIANTO", 20, fY + 14);
        doc.save(`Nota_${data.id}.pdf`);
    }

    function addItemRow(n='', h=0, q=1) {
        const div = document.createElement('div');
        div.className = 'row g-2 mb-2 item-row';
        div.innerHTML = `<div class="col-6"><input type="text" class="form-control form-control-sm it-nama" value="${n}" required></div>
            <div class="col-3"><input type="number" class="form-control form-control-sm it-harga" value="${h}" oninput="calcTotal()"></div>
            <div class="col-2"><input type="number" class="form-control form-control-sm it-qty" value="${q}" oninput="calcTotal()"></div>
            <div class="col-1"><button type="button" class="btn btn-link text-danger p-0" onclick="this.parentElement.parentElement.remove();calcTotal()"><i class="fas fa-times"></i></button></div>`;
        document.getElementById('items-container').appendChild(div);
    }

    function calcTotal() {
        let t = 0; document.querySelectorAll('.item-row').forEach(r => { t += (r.querySelector('.it-harga').value*r.querySelector('.it-qty').value); });
        document.getElementById('display-total').innerText = 'Rp ' + t.toLocaleString('id-ID'); return t;
    }

    function searchPelanggan(q) {
        const b = document.getElementById('search-results');
        if(q.length<2){ b.style.display='none'; return; }
        const f = listPelanggan.filter(p => p[0].toLowerCase().includes(q.toLowerCase()));
        b.innerHTML = f.map(p => `<button type="button" class="list-group-item list-group-item-action" onclick="selectP('${p[0]}','${p[1]}')">${p[0]}</button>`).join('');
        b.style.display = f.length?'block':'none';
    }

    function selectP(n,e) { document.getElementById('search-pelanggan').value=n; document.getElementById('form-email').value=e; document.getElementById('search-results').style.display='none'; }

    function showAddModal() { document.getElementById('formPenawaran').reset(); document.getElementById('edit-id').value=''; document.getElementById('items-container').innerHTML=''; addItemRow(); modalForm.show(); }

    function editPenawaran(id) {
        const d = allData.find(r => r.id === id);
        document.getElementById('edit-id').value = d.id;
        document.getElementById('search-pelanggan').value = d.nama_asli;
        document.getElementById('form-email').value = d.email;
        document.getElementById('form-perihal').value = d.perihal;
        document.getElementById('form-status').value = d.status;
        document.getElementById('items-container').innerHTML = '';
        d.items_json.forEach(it => addItemRow(it.nama, it.harga, it.qty));
        calcTotal(); modalForm.show();
    }

    document.getElementById('formPenawaran').onsubmit = async (e) => {
        e.preventDefault();
        const p = {
            action: document.getElementById('edit-id').value ? 'updatePenawaran' : 'createPenawaran',
            id: document.getElementById('edit-id').value,
            nama: document.getElementById('search-pelanggan').value,
            email: document.getElementById('form-email').value,
            perihal: document.getElementById('form-perihal').value,
            items: Array.from(document.querySelectorAll('.item-row')).map(r => ({ nama: r.querySelector('.it-nama').value, harga: parseInt(r.querySelector('.it-harga').value), qty: parseInt(r.querySelector('.it-qty').value) })),
            total: calcTotal(),
            status: document.getElementById('form-status').value
        };
        Swal.fire({title: 'Loading...', didOpen: () => Swal.showLoading()});
        const res = await fetch(CONFIG.WEB_APP_URL, { method: 'POST', body: JSON.stringify(p) });
        if((await res.json()).success) { modalForm.hide(); loadDataSakti(); Swal.fire('Berhasil','','success'); }
    };
</script>
</body>
</html>
