<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nanda Teknik - Email System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card-mail { background: white; border-radius: 20px; min-height: 85vh; overflow: hidden; border: none; }
        .sidebar-mail { padding: 20px; }
        .btn-compose { 
            background: #4338ca; color: white; border-radius: 16px; padding: 15px; 
            font-weight: 700; width: 100%; margin-bottom: 25px; border: none; 
            box-shadow: 0 4px 15px rgba(67, 56, 202, 0.2); transition: 0.3s;
        }
        .btn-compose:hover { background: #3730a3; transform: translateY(-2px); color: white; }
        .nav-link { 
            border-radius: 12px; padding: 12px 20px; color: #64748b; 
            font-weight: 600; margin-bottom: 5px; border: none; width: 100%; 
            text-align: left; transition: 0.2s;
        }
        .nav-link:hover { background: #f1f5f9; color: #4338ca; }
        .nav-link.active { background: #e0e7ff; color: #4338ca; }
        .nav-link i { margin-right: 12px; width: 20px; font-size: 1.1rem; }
        .email-item { 
            cursor: pointer; transition: all 0.2s; border-bottom: 1px solid #f1f5f9; 
            padding: 15px 20px; display: block; text-decoration: none; color: inherit;
        }
        .email-item:hover { background: #f8fafc; }
        .email-item.unread { background: #fff; border-left: 4px solid #4338ca; }
        .sender-name { font-size: 0.9rem; font-weight: 600; color: #4338ca; }
        .subject { font-size: 0.95rem; margin-bottom: 2px; }
        .snippet { font-size: 0.85rem; color: #64748b; }
        .time-label { font-size: 0.75rem; color: #94a3b8; font-weight: 500; }
        .section-label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; margin: 20px 0 10px 15px; display: block; }
        .form-control { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; font-size: 0.9rem; }
        #emailListContainer { height: 70vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <div class="row g-4">
        <div class="col-lg-3 col-md-4">
            <div class="card-mail shadow-sm sidebar-mail">
                <button class="btn-compose" onclick="openCompose()">
                    <i class="fas fa-plus me-2"></i>Tulis Pesan
                </button>
                <label class="section-label">Menu Utama</label>
                <button id="btn-inbox" class="nav-link active" onclick="switchFolder('listInbox', this)">
                    <i class="fas fa-inbox"></i>Kotak Masuk
                </button>
                <button id="btn-sent" class="nav-link" onclick="switchFolder('listSent', this)">
                    <i class="fas fa-paper-plane"></i>Terkirim
                </button>
                <label class="section-label">Bantuan</label>
                <a href="https://wa.me/6282331201148" target="_blank" class="nav-link">
                    <i class="fab fa-whatsapp"></i>Support WA
                </a>
            </div>
        </div>

        <div class="col-lg-9 col-md-8">
            <div class="card-mail shadow-sm">
                <div class="p-3 border-bottom d-flex justify-content-between align-items-center bg-white">
                    <h5 class="fw-bold mb-0 text-dark" id="folderTitle">Kotak Masuk</h5>
                    <button class="btn btn-light btn-sm rounded-pill px-3" onclick="refreshList()">
                        <i class="fas fa-sync-alt me-1"></i> Refresh
                    </button>
                </div>
                <div id="emailListContainer">
                    <div class="p-5 text-center text-muted">
                        <div class="spinner-border text-primary mb-3"></div>
                        <p class="fw-bold">Menghubungkan ke Server...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="composeModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content shadow-lg" style="border-radius: 24px; border: none;">
            <div class="modal-header border-0 bg-light" style="border-radius: 24px 24px 0 0;">
                <h5 class="modal-title fw-bold">Pesan Baru</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="email" id="mailTo" class="form-control mb-3" placeholder="Kepada">
                <input type="text" id="mailSubject" class="form-control mb-3" placeholder="Subjek">
                <textarea id="mailBody" class="form-control mb-3" rows="8" placeholder="Isi pesan..."></textarea>
                <div class="p-3 bg-light rounded-4">
                    <label class="section-label mt-0 mb-2">Lampiran</label>
                    <input type="file" id="mailAttachment" class="form-control bg-white">
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-primary px-5 rounded-pill fw-bold" onclick="sendEmail()">Kirim</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/config.js"></script>

<script>
    let activeAction = 'listInbox';
    const composeModal = new bootstrap.Modal(document.getElementById('composeModal'));

    window.onload = () => {
        if(typeof CONFIG === 'undefined' || !CONFIG.EMAIL_APP_URL) {
            Swal.fire('Error', 'Variabel CONFIG.EMAIL_APP_URL belum diset!', 'error');
            return;
        }
        loadEmails(activeAction);
    };

    async function loadEmails(action) {
        activeAction = action;
        const container = document.getElementById('emailListContainer');
        container.innerHTML = `<div class="p-5 text-center text-muted"><div class="spinner-border text-primary mb-3"></div><p>Memuat...</p></div>`;

        try {
            const response = await fetch(`${CONFIG.EMAIL_APP_URL}?action=${action}`);
            const data = await response.json();
            
            // Validasi: Cek apakah data adalah Array
            if (!Array.isArray(data)) {
                throw new Error(data.message || "Data dari server bukan format list.");
            }
            
            if (data.length === 0) {
                container.innerHTML = `<div class="p-5 text-center text-muted">Tidak ada pesan.</div>`;
                return;
            }

            container.innerHTML = data.map(m => `
                <div class="email-item ${m.isUnread ? 'unread' : ''}" onclick="viewEmail('${m.id}')">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="sender-name text-truncate">${action === 'listSent' ? 'Ke: ' + m.to : m.from}</span>
                        <span class="time-label">${m.date}</span>
                    </div>
                    <div class="subject text-truncate fw-bold">${m.subject || '(Tanpa Subjek)'}</div>
                    <div class="snippet text-truncate">${m.snippet}</div>
                </div>
            `).join('');
        } catch (err) {
            container.innerHTML = `<div class="p-5 text-center text-danger">Gagal memuat data: ${err.message}</div>`;
        }
    }

    function viewEmail(id) {
        window.location.href = `read.html?id=${id}`;
    }

    function switchFolder(action, el) {
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('folderTitle').innerText = el.innerText.trim();
        loadEmails(action);
    }

    function refreshList() {
        loadEmails(activeAction);
    }

    function openCompose() {
        composeModal.show();
    }

    async function sendEmail() {
        // ... (Logika sendEmail Anda sudah benar, pastikan fetch mengarah ke CONFIG.EMAIL_APP_URL)
        const to = document.getElementById('mailTo').value;
        const subject = document.getElementById('mailSubject').value;
        const body = document.getElementById('mailBody').value;
        
        if (!to || !subject || !body) return Swal.fire('Error', 'Lengkapi data!', 'warning');

        Swal.fire({ title: 'Mengirim...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const payload = {
            action: 'sendEmail',
            to: to,
            subject: subject,
            body: body
        };

        try {
            const res = await fetch(CONFIG.EMAIL_APP_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (result.success) {
                Swal.fire('Berhasil!', '', 'success');
                composeModal.hide();
                loadEmails('listSent');
            }
        } catch (e) {
            Swal.fire('Gagal', e.message, 'error');
        }
    }
</script>
</body>
</html>
