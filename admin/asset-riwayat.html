<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nanda Teknik - Manajemen Pesan</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/layout.css">
    <style>
        body { background: #f4f7fe; padding-bottom: 110px; }
        .card-main { background: white; border-radius: 20px; padding: 20px; margin-top: 10px; min-height: 80vh; }
        
        /* Tab Styling matching the primary theme */
        .nav-pills-custom { background: #f1f5f9; border-radius: 15px; padding: 5px; display: flex; gap: 5px; }
        .nav-pills-custom .nav-link { 
            flex: 1; border-radius: 12px; color: #64748b; font-weight: 700; font-size: 0.85rem; 
            padding: 10px; border: none; transition: 0.2s;
        }
        .nav-pills-custom .nav-link.active { background: var(--p-blue, #0d6efd); color: white; box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2); }

        /* Message Card styling like Booking Items */
        .message-item {
            display: flex; align-items: center; justify-content: space-between;
            background: white; border-radius: 18px; padding: 15px; margin-bottom: 12px;
            border: 1px solid #e2e8f0; transition: 0.2s; cursor: pointer;
        }
        .message-item:active { transform: scale(0.98); }
        .message-item.unread { border-left: 4px solid #0d6efd; background: #f8fafc; }
        
        .msg-icon {
            width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0; margin-right: 15px;
        }
        .icon-inbox { background: #eff6ff; color: #3b82f6; }
        .icon-sent { background: #f0fdf4; color: #22c55e; }

        .msg-body-preview { font-size: 0.75rem; color: #64748b; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        
        .section-label { font-size: 0.65rem; font-weight: 800; color: #64748b; letter-spacing: 1px; margin-bottom: 15px; display: block; text-transform: uppercase; }
        
        .fab-add {
            position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px;
            border-radius: 20px; background: #0d6efd; color: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.3); z-index: 999; border: none;
        }

        .form-control { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; font-size: 0.9rem; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1); border-color: #0d6efd; }
        
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="spinner-border text-primary"></div>
    <span class="ms-2 fw-bold">Memproses...</span>
</div>

<div class="container mt-4">
    <div class="card-main shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold m-0 text-primary"><i class="fas fa-envelope-open-text me-2"></i>Kotak Pesan</h5>
            <button class="btn btn-sm btn-light rounded-pill px-3 fw-bold border" onclick="fetchMessages()">
                <i class="fas fa-sync-alt me-1" id="syncIcon"></i> SYNC
            </button>
        </div>

        <div class="nav-pills-custom mb-4">
            <button class="nav-link active" id="tabInbox" onclick="switchTab('inbox')">Masuk</button>
            <button class="nav-link" id="tabSent" onclick="switchTab('sent')">Terkirim</button>
        </div>

        <label class="section-label" id="listLabel">DAFTAR PESAN MASUK</label>
        
        <div id="listPesan">
            <!-- Loading State -->
            <div class="text-center py-5">
                <div class="spinner-border text-primary opacity-25" role="status"></div>
            </div>
        </div>
    </div>
</div>

<!-- Fab Compose -->
<button class="fab-add" onclick="bukaModalTulis()">
    <i class="fas fa-plus fa-lg"></i>
</button>

<!-- Modal Tulis -->
<div class="modal fade" id="modalCompose" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 25px;">
            <div class="modal-header border-0 px-4 pt-4">
                <h6 class="fw-bold mb-0">Tulis Pesan Baru</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="section-label mb-2">EMAIL TUJUAN</label>
                    <input type="email" id="emailTo" class="form-control" placeholder="nama@email.com">
                </div>
                <div class="mb-3">
                    <label class="section-label mb-2">SUBJEK</label>
                    <input type="text" id="emailSubject" class="form-control" placeholder="Contoh: Penawaran Pekerjaan">
                </div>
                <div class="mb-3">
                    <label class="section-label mb-2">ISI PESAN</label>
                    <textarea id="emailBody" class="form-control" rows="6" placeholder="Tulis rincian pesan..."></textarea>
                </div>
                
                <button class="btn btn-primary w-100 py-3 fw-bold rounded-4 mt-2 shadow-sm" onclick="kirimEmail()">
                    KIRIM PESAN <i class="fas fa-paper-plane ms-2"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/config.js"></script>

<script>
    // --- SEPARATE SCRIPT URL UNTUK EMAIL ---
    const EMAIL_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxf_hwQ_o-EoBaxbonztRFBoe5acUQyy7u9d-n_0c5Mq76mGV4rGv-cLPxZ6nOwudLl7Q/exec";
    
    let currentTab = 'inbox';
    let allMessages = [];
    let modalCompose;

    window.onload = () => {
        modalCompose = new bootstrap.Modal(document.getElementById('modalCompose'));
        fetchMessages();
        // Polling setiap 1 menit
        setInterval(fetchMessages, 60000);
    };

    async function fetchMessages() {
        const icon = document.getElementById('syncIcon');
        if(icon) icon.classList.add('fa-spin');

        try {
            const response = await fetch(`${EMAIL_SCRIPT_URL}?action=getMessages`);
            const data = await response.json();
            allMessages = data;
            renderMessages();
        } catch (error) {
            console.error("Gagal sinkron:", error);
            // Fallback UI jika belum ada data/error
            document.getElementById('listPesan').innerHTML = `
                <div class="text-center py-5 opacity-50">
                    <i class="fas fa-cloud-download-alt fs-1 mb-3"></i>
                    <p class="small fw-bold">Gagal menghubungkan ke server email.</p>
                </div>`;
        } finally {
            if(icon) icon.classList.remove('fa-spin');
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tabInbox').classList.toggle('active', tab === 'inbox');
        document.getElementById('tabSent').classList.toggle('active', tab === 'sent');
        document.getElementById('listLabel').innerText = tab === 'inbox' ? 'DAFTAR PESAN MASUK' : 'DAFTAR PESAN TERKIRIM';
        renderMessages();
    }

    function renderMessages() {
        const container = document.getElementById('listPesan');
        const filtered = allMessages.filter(m => m.type === currentTab);
        
        if(filtered.length === 0) {
            container.innerHTML = `
                <div class="text-center py-5 opacity-50">
                    <i class="fas fa-folder-open fs-1 mb-3"></i>
                    <p class="small fw-bold">Belum ada pesan di sini.</p>
                </div>`;
            return;
        }

        container.innerHTML = filtered.map(m => `
            <div class="message-item ${!m.read && m.type === 'inbox' ? 'unread' : ''} shadow-sm" onclick="detailPesan(${m.id})">
                <div class="d-flex align-items-center overflow-hidden">
                    <div class="msg-icon ${m.type === 'inbox' ? 'icon-inbox' : 'icon-sent'}">
                        <i class="fas ${m.type === 'inbox' ? 'fa-envelope' : 'fa-paper-plane'}"></i>
                    </div>
                    <div class="overflow-hidden">
                        <div class="fw-bold text-dark small text-truncate">
                            ${m.type === 'inbox' ? m.sender : 'Ke: ' + m.email}
                        </div>
                        <div class="fw-bold text-primary" style="font-size: 0.8rem;">${m.subject}</div>
                        <span class="msg-body-preview">${m.body}</span>
                    </div>
                </div>
                <div class="text-end flex-shrink-0 ms-3">
                    <div class="text-muted" style="font-size: 0.65rem; font-weight: 700;">${m.time}</div>
                    ${!m.read && m.type === 'inbox' ? '<span class="badge rounded-pill bg-primary" style="font-size: 0.5rem;">BARU</span>' : ''}
                </div>
            </div>
        `).join('');
    }

    function detailPesan(id) {
        const msg = allMessages.find(x => x.id === id);
        if(!msg) return;

        Swal.fire({
            title: `<div class="text-start fs-6 fw-bold border-bottom pb-2">${msg.subject}</div>`,
            html: `
                <div class="text-start mt-3">
                    <div class="d-flex justify-content-between mb-3 bg-light p-2 rounded-3">
                        <div class="small">
                            <div class="fw-bold">${msg.sender}</div>
                            <div class="text-muted" style="font-size: 0.7rem;">${msg.email}</div>
                        </div>
                        <div class="text-muted fw-bold" style="font-size: 0.7rem;">${msg.time}</div>
                    </div>
                    <div class="p-1" style="font-size: 0.85rem; line-height: 1.6; color: #334155; white-space: pre-wrap;">${msg.body}</div>
                </div>
            `,
            confirmButtonText: 'BALAS PESAN',
            showCancelButton: true,
            cancelButtonText: 'TUTUP',
            customClass: {
                popup: 'rounded-5 px-3',
                confirmButton: 'btn btn-primary rounded-pill w-100 mb-2 py-2 fw-bold',
                cancelButton: 'btn btn-light rounded-pill w-100 py-2 fw-bold text-muted'
            },
            buttonsStyling: false
        }).then((res) => {
            if(res.isConfirmed) {
                document.getElementById('emailTo').value = msg.email;
                document.getElementById('emailSubject').value = 'Re: ' + msg.subject;
                modalCompose.show();
            }
        });
    }

    function bukaModalTulis() {
        modalCompose.show();
    }

    async function kirimEmail() {
        const to = document.getElementById('emailTo').value;
        const subject = document.getElementById('emailSubject').value;
        const body = document.getElementById('emailBody').value;

        if(!to || !subject || !body) {
            return Swal.fire({ icon: 'warning', title: 'Data Kosong', text: 'Lengkapi semua field dulu, Bro.', target: '#modalCompose' });
        }

        document.getElementById('loader').style.display = 'flex';

        const payload = { action: 'sendMessage', to, subject, body };

        try {
            await fetch(EMAIL_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                body: JSON.stringify(payload)
            });

            Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Pesan terkirim ke antrian.', target: '#modalCompose' });
            modalCompose.hide();
            document.getElementById('emailTo').value = '';
            document.getElementById('emailSubject').value = '';
            document.getElementById('emailBody').value = '';
            fetchMessages();

        } catch (error) {
            Swal.fire({ icon: 'error', title: 'Gagal', text: 'Terjadi kesalahan sistem.', target: '#modalCompose' });
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
