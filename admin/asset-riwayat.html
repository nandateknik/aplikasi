<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nanda Teknik - Manajemen Pesan</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p-blue: #0d6efd; --bg-light: #f4f7fe; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-light); padding-bottom: 110px; }
        
        .card-main { background: white; border-radius: 20px; padding: 20px; margin-top: 10px; min-height: 85vh; border: none; }
        
        /* Tab Styling */
        .nav-pills-custom { background: #f1f5f9; border-radius: 15px; padding: 5px; display: flex; gap: 5px; }
        .nav-pills-custom .nav-link { 
            flex: 1; border-radius: 12px; color: #64748b; font-weight: 700; font-size: 0.85rem; 
            padding: 10px; border: none; transition: 0.2s; background: transparent;
        }
        .nav-pills-custom .nav-link.active { background: var(--p-blue); color: white; box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2); }

        /* Message Card */
        .message-item {
            display: flex; align-items: center; justify-content: space-between;
            background: white; border-radius: 18px; padding: 15px; margin-bottom: 12px;
            border: 1px solid #e2e8f0; transition: 0.2s; cursor: pointer;
        }
        .message-item:active { transform: scale(0.98); }
        .message-item.unread { border-left: 4px solid var(--p-blue); background: #f8fafc; }
        
        .msg-icon {
            width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0; margin-right: 15px;
        }
        .icon-inbox { background: #eff6ff; color: #3b82f6; }
        .icon-sent { background: #f0fdf4; color: #22c55e; }

        .msg-body-preview { font-size: 0.75rem; color: #64748b; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        
        .section-label { font-size: 0.65rem; font-weight: 800; color: #64748b; letter-spacing: 1px; margin-bottom: 15px; display: block; text-transform: uppercase; }
        
        .fab-add {
            position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px;
            border-radius: 20px; background: var(--p-blue); color: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.3); z-index: 999; border: none;
        }

        .form-control { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; font-size: 0.9rem; }
        
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
    </style>
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="spinner-border text-primary mb-2"></div>
    <span class="fw-bold small">Menghubungkan ke Server...</span>
</div>

<div class="container mt-3">
    <div class="card-main shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold m-0 text-primary"><i class="fas fa-envelope-open-text me-2"></i>Pesan</h5>
            <button class="btn btn-sm btn-light rounded-pill px-3 fw-bold border" onclick="fetchMessages()">
                <i class="fas fa-sync-alt me-1" id="syncIcon"></i> SYNC
            </button>
        </div>

        <div class="nav-pills-custom mb-4">
            <button class="nav-link active" id="tabInbox" onclick="switchTab('inbox')">Masuk</button>
            <button class="nav-link" id="tabSent" onclick="switchTab('sent')">Terkirim</button>
        </div>

        <label class="section-label" id="listLabel">DAFTAR PESAN MASUK</label>
        
        <div id="listPesan">
            <!-- Loader awal -->
            <div class="text-center py-5">
                <div class="spinner-border text-primary opacity-25"></div>
            </div>
        </div>
    </div>
</div>

<button class="fab-add" onclick="modalCompose.show()">
    <i class="fas fa-paper-plane fa-lg"></i>
</button>

<!-- Modal Compose -->
<div class="modal fade" id="modalCompose" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 25px;">
            <div class="modal-header border-0 px-4 pt-4">
                <h6 class="fw-bold mb-0">Tulis Email</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="section-label mb-2">KEPADA</label>
                    <input type="email" id="emailTo" class="form-control" placeholder="nama@email.com">
                </div>
                <div class="mb-3">
                    <label class="section-label mb-2">SUBJEK</label>
                    <input type="text" id="emailSubject" class="form-control" placeholder="Subjek pesan">
                </div>
                <div class="mb-3">
                    <label class="section-label mb-2">PESAN</label>
                    <textarea id="emailBody" class="form-control" rows="5" placeholder="Isi pesan..."></textarea>
                </div>
                <button class="btn btn-primary w-100 py-3 fw-bold rounded-4 shadow-sm" onclick="kirimEmail()">
                    KIRIM EMAIL <i class="fas fa-paper-plane ms-2"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // URL KHUSUS EMAIL (Ganti dengan URL Deployment Anda yang baru)
    const EMAIL_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmC8UUVDjYeiK6JNYhAcRSR0V9GlVhHWoXEA4OZoGkFNtMqlYac5TccSlSom2rggm5zQ/exec";
    
    let currentTab = 'inbox';
    let allMessages = [];
    let modalCompose;

    window.onload = () => {
        modalCompose = new bootstrap.Modal(document.getElementById('modalCompose'));
        fetchMessages();
    };

    async function fetchMessages() {
        const icon = document.getElementById('syncIcon');
        if(icon) icon.classList.add('fa-spin');

        try {
            // Gunakan fetch dengan penanganan error manual
            const response = await fetch(`${EMAIL_SCRIPT_URL}?action=getMessages`);
            
            if (!response.ok) throw new Error("Network response was not ok");
            
            const data = await response.json();
            allMessages = data;
            renderMessages();
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('listPesan').innerHTML = `
                <div class="text-center py-5">
                    <i class="fas fa-exclamation-triangle text-warning fs-1 mb-3"></i>
                    <p class="small fw-bold px-4">CORS Error / Server Offline.<br><span class="fw-normal text-muted">Pastikan Apps Script dideploy sebagai 'Anyone'.</span></p>
                    <button class="btn btn-sm btn-outline-primary rounded-pill mt-2" onclick="fetchMessages()">Coba Lagi</button>
                </div>`;
        } finally {
            if(icon) icon.classList.remove('fa-spin');
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tabInbox').classList.toggle('active', tab === 'inbox');
        document.getElementById('tabSent').classList.toggle('active', tab === 'sent');
        document.getElementById('listLabel').innerText = tab === 'inbox' ? 'DAFTAR PESAN MASUK' : 'DAFTAR PESAN TERKIRIM';
        renderMessages();
    }

    function renderMessages() {
        const container = document.getElementById('listPesan');
        const filtered = allMessages.filter(m => m.type === currentTab);
        
        if(filtered.length === 0) {
            container.innerHTML = `<div class="text-center py-5 opacity-50"><i class="fas fa-envelope-open fs-1 mb-3"></i><p class="small fw-bold">Kosong</p></div>`;
            return;
        }

        container.innerHTML = filtered.map(m => `
            <div class="message-item ${!m.read && m.type === 'inbox' ? 'unread' : ''} shadow-sm" onclick="detailPesan(${m.id})">
                <div class="d-flex align-items-center overflow-hidden">
                    <div class="msg-icon ${m.type === 'inbox' ? 'icon-inbox' : 'icon-sent'}">
                        <i class="fas ${m.type === 'inbox' ? 'fa-envelope' : 'fa-paper-plane'}"></i>
                    </div>
                    <div class="overflow-hidden">
                        <div class="fw-bold text-dark small text-truncate">${m.type === 'inbox' ? m.sender : 'Ke: ' + m.email}</div>
                        <div class="fw-bold text-primary" style="font-size: 0.8rem;">${m.subject}</div>
                        <span class="msg-body-preview">${m.body}</span>
                    </div>
                </div>
                <div class="text-end flex-shrink-0 ms-2">
                    <div class="text-muted fw-bold" style="font-size: 0.6rem;">${m.time}</div>
                </div>
            </div>
        `).join('');
    }

    function detailPesan(id) {
        const msg = allMessages.find(x => x.id === id);
        if(!msg) return;

        Swal.fire({
            title: `<div class="text-start fs-6 fw-bold border-bottom pb-2">${msg.subject}</div>`,
            html: `<div class="text-start mt-3 small"><div class="bg-light p-2 rounded-3 mb-3"><b>Dari:</b> ${msg.sender} (${msg.email})</div><div style="white-space:pre-wrap;">${msg.body}</div></div>`,
            confirmButtonText: 'BALAS',
            showCancelButton: true,
            cancelButtonText: 'TUTUP',
            customClass: { popup: 'rounded-5', confirmButton: 'btn btn-primary rounded-pill w-100 mb-2', cancelButton: 'btn btn-light rounded-pill w-100 text-muted' },
            buttonsStyling: false
        }).then((res) => {
            if(res.isConfirmed) {
                document.getElementById('emailTo').value = msg.email;
                document.getElementById('emailSubject').value = 'Re: ' + msg.subject;
                modalCompose.show();
            }
        });
    }

    async function kirimEmail() {
        const to = document.getElementById('emailTo').value;
        const subject = document.getElementById('emailSubject').value;
        const body = document.getElementById('emailBody').value;

        if(!to || !subject || !body) return Swal.fire('Error', 'Data tidak lengkap', 'error');

        document.getElementById('loader').style.display = 'flex';

        try {
            // POST ke GAS sering memicu CORS jika tidak pakai mode no-cors
            // Tapi mode no-cors tidak bisa baca response.
            // Solusi terbaik: Pakai query parameter untuk kirim data kecil (GET)
            const url = `${EMAIL_SCRIPT_URL}?action=sendMessage&to=${encodeURIComponent(to)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            
            await fetch(url, { method: 'GET' });

            Swal.fire({ icon: 'success', title: 'Terkirim', text: 'Pesan sedang diproses server.', target: '#modalCompose' });
            modalCompose.hide();
            fetchMessages();
        } catch (error) {
            Swal.fire('Gagal', 'Terjadi kesalahan sistem.', 'error');
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
