<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Aset | Nanda Teknik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/layout.css">
    
    <style>
        body { background: #f4f7fe !important; padding-bottom: 100px !important; }
        .search-card { background: white; border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .history-item { 
            background: white; border-radius: 15px; border: none; 
            margin-bottom: 15px; border-left: 5px solid #4338ca;
            transition: 0.3s;
        }
        .history-item:hover { transform: scale(1.01); }
        .badge-asset { font-size: 0.7rem; text-uppercase: uppercase; letter-spacing: 1px; }
        .checklist-pill { 
            display: inline-block; background: #f1f5f9; padding: 2px 8px; 
            border-radius: 5px; font-size: 0.75rem; margin-right: 4px; margin-bottom: 4px;
        }
        .status-ok { color: #15803d; font-weight: bold; }
        .status-problem { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="card search-card mb-4">
        <div class="card-body p-3">
            <label class="form-label fw-bold"><i class="fas fa-search me-2"></i> Cari Riwayat Pelanggan</label>
            <select class="form-select border-0 bg-light fw-bold" id="selectPelanggan" onchange="filterHistory()">
                <option value="">-- Pilih Pelanggan --</option>
            </select>
        </div>
    </div>

    <div id="historyContainer">
        <div class="text-center text-muted mt-5">
            <i class="fas fa-history fa-3x mb-3 opacity-20"></i>
            <p>Pilih pelanggan kanggo ndelok riwayat servis</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/config.js"></script>
<script src="assets/layout.js"></script>

<script>
    let allHistory = [];

    window.onload = async () => {
        if (typeof renderLayout === "function") renderLayout();
        await loadInitialData();
    };

    async function loadInitialData() {
        Swal.fire({ title: 'Loading Data...', didOpen: () => Swal.showLoading() });
        try {
            // 1. Load Pelanggan kanggo Dropdown (Saka URL Utama)
            const resPel = await fetch(`${CONFIG.WEB_APP_URL}?action=read&sheet=Pelanggan`);
            const jsonPel = await resPel.json();
            const select = document.getElementById('selectPelanggan');
            jsonPel.data.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p.nama; // Filter nganggo nama
                opt.text = p.nama;
                select.appendChild(opt);
            });

            // 2. Load Kabeh Riwayat (Saka URL Asset)
            // Asumsi smean wis nambahne 'action=read' neng script Asset
            const resHis = await fetch(`${CONFIG.ASSET_APP_URL}?action=read&sheet=Aset_History`);
            const jsonHis = await resHis.json();
            allHistory = jsonHis.data || [];

            Swal.close();
        } catch (e) {
            console.error(e);
            Swal.fire('Error', 'Gagal narik data. Pastike Script Asset wis dipasang fungsi Read.', 'error');
        }
    }

    function filterHistory() {
        const name = document.getElementById('selectPelanggan').value;
        const container = document.getElementById('historyContainer');
        container.innerHTML = "";

        if (!name) {
            container.innerHTML = '<div class="text-center text-muted mt-5"><p>Pilih pelanggan dhisik Sam.</p></div>';
            return;
        }

        const filtered = allHistory.filter(h => h.nama_pelanggan === name || h[2] === name)
                         .sort((a, b) => new Date(b[0]) - new Date(a[0])); // Urut tanggal terbaru

        if (filtered.length === 0) {
            container.innerHTML = '<div class="alert alert-warning text-center">Belum ada riwayat servis untuk pelanggan ini.</div>';
            return;
        }

        filtered.forEach(h => {
            // Format Checklist (F) - asline String "Poin: Status | Poin: Status"
            const rawChecklist = h[5] || "";
            const checklistHtml = rawChecklist.split(" | ").map(item => {
                const parts = item.split(": ");
                const statusClass = (parts[1] || "").includes("OK") ? "status-ok" : "status-problem";
                return `<span class="checklist-pill">${parts[0]}: <span class="${statusClass}">${parts[1]}</span></span>`;
            }).join("");

            const card = `
                <div class="card history-item animate__animated animate__fadeInUp">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <span class="badge bg-primary badge-asset mb-1">${h[3]}</span>
                                <h6 class="fw-bold mb-0">${h[4]}</h6>
                                <small class="text-muted"><i class="far fa-calendar-alt me-1"></i> ${new Date(h[0]).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}</small>
                            </div>
                            <div class="text-end">
                                <small class="d-block text-muted" style="font-size:0.7rem">Teknisi:</small>
                                <span class="badge bg-light text-dark">${h[7] || 'Admin'}</span>
                            </div>
                        </div>
                        <div class="my-2 py-2 border-top border-bottom">
                            ${checklistHtml}
                        </div>
                        <div class="small">
                            <strong class="text-primary">Catatan:</strong><br>
                            <span class="text-secondary">${h[6] || '-'}</span>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', card);
        });
    }
</script>
</body>
</html>
