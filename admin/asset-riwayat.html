<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanda Teknik | Messaging System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0061ff; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        .messenger-wrapper { height: 100vh; display: flex; flex-direction: column; }
        .top-bar { background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
        
        .main-layout { flex: 1; display: flex; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 350px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; }
        .nav-pills .nav-link { border-radius: 8px; color: #64748b; font-weight: 500; margin-bottom: 4px; }
        .nav-pills .nav-link.active { background: #eff6ff; color: var(--primary); }
        .message-list { flex: 1; overflow-y: auto; }
        .msg-item { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: all 0.2s; position: relative; }
        .msg-item:hover { background-color: #f8fafc; }
        .msg-item.unread { background-color: #f0f7ff; border-left: 4px solid var(--primary); }
        .msg-item .time { font-size: 0.75rem; color: #94a3b8; }
        
        /* Content Area */
        .content-area { flex: 1; background: white; display: flex; flex-direction: column; position: relative; }
        .view-header { padding: 20px 30px; border-bottom: 1px solid #e2e8f0; }
        .view-body { flex: 1; padding: 30px; overflow-y: auto; background: #fff; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #94a3b8; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #475569; }
        
        /* Loading Overlay */
        #loader { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: none; z-index: 10; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="messenger-wrapper">
    <div class="top-bar">
        <div class="d-flex align-items-center">
            <i class="fas fa-tools text-primary me-2 fa-lg"></i>
            <span class="fw-bold fs-5">Nanda Teknik <span class="text-muted fw-normal">| Backend</span></span>
        </div>
        <button class="btn btn-primary btn-sm rounded-pill px-3" onclick="refreshData()">
            <i class="fas fa-sync-alt me-1"></i> Refresh
        </button>
    </div>

    <div class="main-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="btn btn-primary w-100 py-2 fw-bold mb-3" data-bs-toggle="modal" data-bs-target="#composeModal">
                    <i class="fas fa-plus me-2"></i> Tulis Pesan
                </button>
                <ul class="nav nav-pills nav-fill" id="filterTab">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="switchTab('inbox')"><i class="fas fa-inbox me-2"></i>Masuk</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="switchTab('sent')"><i class="fas fa-paper-plane me-2"></i>Terkirim</a>
                    </li>
                </ul>
            </div>
            <div class="message-list" id="msgContainer">
                <!-- Data akan dimuat di sini -->
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            <div id="loader"><div class="spinner-border text-primary"></div></div>
            
            <div id="emptyView" class="empty-state">
                <i class="fas fa-envelope-open-text fa-4x mb-3 text-light"></i>
                <p>Pilih pesan untuk melihat detail</p>
            </div>

            <div id="detailView" style="display: none;" class="h-100 d-flex flex-column">
                <div class="view-header">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <h4 id="viewSubject" class="fw-bold mb-0">Subjek Pesan</h4>
                        <button class="btn-close" onclick="closeDetail()"></button>
                    </div>
                    <div class="d-flex align-items-center">
                        <div class="avatar me-3" id="viewAvatar">N</div>
                        <div>
                            <div class="fw-bold" id="viewFrom">Sender Name</div>
                            <div class="small text-muted" id="viewDate">Senin, 12 Feb 2024</div>
                        </div>
                    </div>
                </div>
                <div class="view-body" id="viewBody">
                    <!-- Konten HTML Email -->
                </div>
                <div class="p-3 border-top bg-light">
                    <button class="btn btn-outline-primary btn-sm rounded-pill px-3" id="replyBtn">
                        <i class="fas fa-reply me-1"></i> Balas
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Compose -->
<div class="modal fade" id="composeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Pesan Baru</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="sendForm">
                <div class="modal-body">
                    <div class="mb-3">
                        <input type="email" id="to" class="form-control" placeholder="Kepada" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" id="subject" class="form-control" placeholder="Subjek" required>
                    </div>
                    <div class="mb-3">
                        <textarea id="messageBody" class="form-control" rows="8" placeholder="Tulis pesan Anda..." required></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="submit" class="btn btn-primary px-4 py-2 fw-bold rounded-pill" id="btnKirim">
                        Kirim Sekarang <i class="fas fa-paper-plane ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLHFzNlilbprewUqph7G9ZPkHb2FZsKGolhr0RcCHTiZtF80f53TRizRUgz_5e8Dn3TA/exec";
    let allMessages = [];
    let activeTab = 'inbox';

    window.onload = refreshData;

    async function refreshData() {
        showLoader(true);
        const container = document.getElementById('msgContainer');
        container.innerHTML = '<div class="text-center p-5"><div class="spinner-border spinner-border-sm text-primary"></div></div>';
        
        try {
            // FIX CORS: Menggunakan fetch dengan redirect: follow
            const response = await fetch(`${SCRIPT_URL}?action=getMessages`, {
                method: 'GET',
                redirect: 'follow'
            });
            
            allMessages = await response.json();
            renderMessages();
        } catch (err) {
            container.innerHTML = `<div class="p-3 text-center text-danger small">Gagal sinkronisasi.<br>${err.message}</div>`;
        } finally {
            showLoader(false);
        }
    }

    function renderMessages() {
        const container = document.getElementById('msgContainer');
        const filtered = allMessages.filter(m => m.type === activeTab);
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="p-5 text-center text-muted small">Tidak ada pesan</div>';
            return;
        }

        container.innerHTML = filtered.map(msg => `
            <div class="msg-item ${!msg.read ? 'unread' : ''}" onclick="loadDetail('${msg.id}')">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="fw-bold text-truncate" style="max-width: 180px;">${msg.sender}</span>
                    <span class="time">${msg.time}</span>
                </div>
                <div class="small fw-semibold text-dark text-truncate">${msg.subject}</div>
                <div class="small text-muted text-truncate">${msg.body}</div>
            </div>
        `).join('');
    }

    async function loadDetail(id) {
        showLoader(true);
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getMessageDetails&id=${id}`, {
                method: 'GET',
                redirect: 'follow'
            });
            const data = await response.json();

            if (data.status === "success") {
                document.getElementById('emptyView').style.display = 'none';
                document.getElementById('detailView').style.display = 'flex';
                
                document.getElementById('viewSubject').innerText = data.subject;
                document.getElementById('viewFrom').innerText = data.from;
                document.getElementById('viewDate').innerText = new Date(data.date).toLocaleString('id-ID');
                document.getElementById('viewAvatar').innerText = data.from.charAt(0).toUpperCase();
                document.getElementById('viewBody').innerHTML = data.body;
                
                // Set Reply Button
                const cleanEmail = data.from.match(/<(.+)>/) ? data.from.match(/<(.+)>/)[1] : data.from;
                document.getElementById('replyBtn').onclick = () => openReply(cleanEmail, data.subject);
            }
        } catch (err) {
            Swal.fire('Error', 'Gagal memuat detail pesan', 'error');
        } finally {
            showLoader(false);
        }
    }

    function openReply(email, subject) {
        document.getElementById('to').value = email;
        document.getElementById('subject').value = "Re: " + subject;
        new bootstrap.Modal(document.getElementById('composeModal')).show();
    }

    document.getElementById('sendForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnKirim');
        btn.disabled = true;
        btn.innerHTML = 'Mengirim...';

        const payload = {
            action: 'sendMessage',
            to: document.getElementById('to').value,
            subject: document.getElementById('subject').value,
            body: document.getElementById('messageBody').value
        };

        try {
            // FIX CORS: POST ke Google Script harus dikirim sebagai text/plain 
            // agar tidak memicu Pre-flight OPTIONS request
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Penting untuk bypass CORS Google Script
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });

            Swal.fire('Berhasil', 'Pesan telah dikirim ke antrian Gmail.', 'success');
            bootstrap.Modal.getInstance(document.getElementById('composeModal')).hide();
            document.getElementById('sendForm').reset();
            setTimeout(refreshData, 2000);
        } catch (err) {
            Swal.fire('Gagal', 'Terjadi kesalahan pengiriman', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Kirim Sekarang <i class="fas fa-paper-plane ms-2"></i>';
        }
    };

    function switchTab(tab) {
        activeTab = tab;
        document.querySelectorAll('#filterTab .nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderMessages();
        closeDetail();
    }

    function closeDetail() {
        document.getElementById('detailView').style.display = 'none';
        document.getElementById('emptyView').style.display = 'flex';
    }

    function showLoader(show) {
        document.getElementById('loader').style.display = show ? 'flex' : 'none';
    }
</script>

</body>
</html>
