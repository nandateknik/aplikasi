<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Aset Pro | Nanda Teknik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="assets/layout.css">
    
    <style>
        body { background: #f4f7fe !important; padding-bottom: 100px !important; }
        .card-form { background: white; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .checklist-group { background: #f8f9fa; border-radius: 12px; padding: 15px; border-left: 5px solid #4338ca; }
        .btn-save { background: #4338ca; color: white; border-radius: 12px; padding: 12px; font-weight: bold; border: none; transition: 0.3s; }
        .btn-save:hover { background: #3730a3; transform: translateY(-2px); }
        .form-label { font-weight: 600; color: #374151; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="card card-form animate__animated animate__fadeIn">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-4 text-primary"><i class="fas fa-file-invoice me-2"></i> Maintenance & Checklist Report</h5>
            
            <form id="formAset">
                <div class="row g-3 mb-4">
                    <div class="col-12 col-md-6">
                        <label class="form-label">Pelanggan (Data Utama)</label>
                        <select class="form-select border-0 bg-light" id="idPelanggan" required>
                            <option value="">-- Pilih Pelanggan --</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Tipe Aset</label>
                        <select class="form-select border-0 bg-light fw-bold text-primary" id="tipeAset" onchange="renderChecklist()" required>
                            <option value="">-- Pilih Jenis Aset --</option>
                            <option value="CCTV">CCTV</option>
                            <option value="AC">AC (Air Conditioner)</option>
                            <option value="Mesin Cuci">Mesin Cuci</option>
                            <option value="Listrik">Listrik / Panel</option>
                            <option value="Laptop">Laptop / PC</option>
                            <option value="Genset">Genset</option>
                            <option value="UPS">UPS</option>
                            <option value="PABX">PABX</option>
                            <option value="Elektronik Lain">Elektronik Liyane</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Nama / Brand / Seri Aset</label>
                        <input type="text" class="form-control border-0 bg-light" id="brandAset" placeholder="Contoh: Daikin Inverter 1PK" required>
                    </div>
                </div>

                <div id="checklistSection" style="display:none;">
                    <label class="form-label mb-3 text-muted small fw-bold text-uppercase">Point-Point Pemeriksaan</label>
                    <div id="checklistContainer" class="checklist-group mb-4"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Catatan & Rekomendasi Teknik</label>
                    <textarea class="form-control border-0 bg-light" id="catatan" rows="3" placeholder="Tulis diagnosa atau saran perbaikan..."></textarea>
                </div>

                <button type="submit" class="btn btn-save w-100">
                    <i class="fas fa-save me-2"></i> SIMPAN & DOWNLOAD PDF
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script src="assets/config.js"></script>
<script src="assets/layout.js"></script>

<script>
    const masterChecklist = {
        "CCTV": ["Kesehatan HDD/Record", "Kualitas Gambar/Fokus", "Koneksi Online HP", "Power Supply/Adaptor", "Posisi & Bracket"],
        "AC": ["Tekanan Freon", "Amper Kompresor", "Kebersihan Evap/Kondensor", "Suhu Output", "Drainase/Pembuangan"],
        "Mesin Cuci": ["Getaran & Suara Drum", "Solenoid Inlet Banyu", "Pulsator/Putaran", "Modul/Panel Kontrol", "Pompa Buang"],
        "Listrik": ["Kekencangan Baut MCB", "Grounding System", "Isolasi Kabel", "Keseimbangan Beban", "Kondisi Panel"],
        "Laptop": ["Suhu & Pasta Thermal", "Health Storage (SSD/HDD)", "Kondisi Baterai", "Engsel & Keyboard"],
        "Genset": ["Level Oli Mesin", "Air Radiator", "Voltase Aki", "Filter Solar/Udara", "Output Voltase"],
        "UPS": ["Backup Time Test", "Kondisi Baterai", "Kipas Pendingin"],
        "PABX": ["Jalur Extension", "Koneksi MDF", "Power Supply Unit"],
        "Elektronik Lain": ["Kondisi Fisik", "Fungsi Utama", "Power Cord/Kabel", "Kebersihan Internal"]
    };

    window.onload = async () => {
        if (typeof renderLayout === "function") renderLayout();
        await loadPelanggan();
    };

    async function loadPelanggan() {
        try {
            // Ambil data seko URL UTAMA
            const res = await fetch(`${CONFIG.WEB_APP_URL}?action=read&sheet=Pelanggan`);
            const json = await res.json();
            const select = document.getElementById('idPelanggan');
            json.data.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p.id || p.nama;
                opt.text = p.nama;
                opt.setAttribute('data-nama', p.nama);
                select.appendChild(opt);
            });
        } catch (e) { console.error("Gagal load pelanggan", e); }
    }

    function renderChecklist() {
        const tipe = document.getElementById('tipeAset').value;
        const container = document.getElementById('checklistContainer');
        const section = document.getElementById('checklistSection');
        container.innerHTML = "";
        if (!tipe) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        const items = masterChecklist[tipe] || masterChecklist["Elektronik Lain"];
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'form-check mb-3';
            div.innerHTML = `
                <input class="form-check-input" type="checkbox" value="${item}" id="chk_${item.replace(/\s/g,'')}" checked>
                <label class="form-check-label fw-bold" for="chk_${item.replace(/\s/g,'')}">${item}</label>
            `;
            container.appendChild(div);
        });
    }

    document.getElementById('formAset').onsubmit = async (e) => {
        e.preventDefault();
        Swal.fire({ title: 'Proses...', text: 'Menyimpan data & Membuat PDF', didOpen: () => Swal.showLoading() });

        const tipe = document.getElementById('tipeAset').value;
        const selPel = document.getElementById('idPelanggan');
        const namaPel = selPel.options[selPel.selectedIndex].getAttribute('data-nama');
        const brand = document.getElementById('brandAset').value;
        const catatan = document.getElementById('catatan').value;
        
        let checklistData = [];
        masterChecklist[tipe].forEach(item => {
            const isOk = document.getElementById(`chk_${item.replace(/\s/g,'')}`).checked;
            checklistData.push({ point: item, status: isOk ? "NORMAL / OK" : "PROBLEM" });
        });

        const payload = {
            idPelanggan: selPel.value,
            namaPelanggan: namaPel,
            tipeAset: tipe,
            brandAset: brand,
            checklist: checklistData.map(c => `${c.point}: ${c.status}`).join(" | "),
            catatan: catatan,
            teknisi: "Admin Nanda Teknik"
        };

        try {
            // KIRIM NANG ASSET_APP_URL
            const res = await fetch(CONFIG.ASSET_APP_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const r = await res.json();

            if (r.success) {
                generatePDF(namaPel, tipe, brand, checklistData, catatan);
                Swal.fire('Berhasil!', 'Riwayat Aset Tersimpan & PDF Berhasil Dibuat', 'success');
                document.getElementById('formAset').reset();
                document.getElementById('checklistSection').style.display = 'none';
            }
        } catch (err) {
            Swal.fire('Error', 'Gagal koneksi ke server Asset', 'error');
        }
    };

    function generatePDF(pelanggan, tipe, brand, checklist, catatan) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const date = new Date().toLocaleString('id-ID');

    // --- 1. HEADER (KOP SURAT) ---
    try { 
        // Gunakan Path lengkap utawa Base64 nek logo ra metu
        doc.addImage('assets/logo-none-text.png', 'PNG', 15, 12, 22, 22); 
    } catch (e) { 
        console.error("Logo ora ketemu, lanjut teks wae.");
    }

    // Nama Perusahaan
    doc.setFontSize(16); doc.setFont("helvetica", "bold");
    doc.setTextColor(45, 55, 72); // Dark Slate Grey
    doc.text("NANDA TEKNIK BANYUWANGI", 42, 18);
    
    // Slogan & Alamat
    doc.setFontSize(8); doc.setFont("helvetica", "normal");
    doc.setTextColor(100); 
    doc.text("Software, Network & Electrical Engineering", 42, 23);
    doc.text("Sukowidi Indah Residence D-5, Klatak, Banyuwangi - Jawa Timur", 42, 27);
    doc.text("WA: 082331201148 | Email: nandateknik02@gmail.com | Website: www.nandateknik.com", 42, 31);
    
    // Garis Kop
    doc.setDrawColor(200);
    doc.setLineWidth(0.5);
    doc.line(15, 38, 195, 38);

    // --- 2. JUDUL LAPORAN ---
    doc.setFontSize(12); doc.setFont("helvetica", "bold");
    doc.setTextColor(30, 41, 59);
    doc.text("ASSET MAINTENANCE REPORT", 105, 48, { align: "center" });

    // --- 3. INFO PELANGGAN (BOX STYLE) ---
    doc.setFillColor(248, 250, 252); // Light Grey Background
    doc.rect(15, 53, 180, 25, 'F');
    
    doc.setFontSize(9); doc.setFont("helvetica", "bold");
    doc.text("PELANGGAN:", 20, 60);
    doc.text("TANGGAL:", 110, 60);
    doc.text("UNIT ASET:", 20, 70);
    doc.text("BRAND/TYPE:", 110, 70);

    doc.setFont("helvetica", "normal");
    doc.text(pelanggan.toUpperCase(), 45, 60);
    doc.text(date, 135, 60);
    doc.text(tipe, 45, 70);
    doc.text(brand, 135, 70);

    // --- 4. TABLE CHECKLIST (PROFESSIONAL GREY THEME) ---
    const body = checklist.map((c, index) => [
        { content: index + 1, styles: { halign: 'center' } }, 
        c.point, 
        { content: c.status, styles: { halign: 'center', fontStyle: 'bold', textColor: c.status === 'OK' ? [21, 128, 61] : [220, 38, 38] } }
    ]);

    doc.autoTable({
        startY: 85,
        head: [['NO', 'PARAMETER PEMERIKSAAN', 'KONDISI / STATUS']],
        body: body,
        theme: 'grid',
        headStyles: { 
            fillColor: [71, 85, 105], // Slate Blue Grey
            fontSize: 9, 
            halign: 'center' 
        },
        styles: { fontSize: 9, cellPadding: 3 },
        columnStyles: {
            0: { cellWidth: 12 },
            2: { cellWidth: 40 }
        }
    });

    // --- 5. CATATAN / REKOMENDASI ---
    let finalY = doc.lastAutoTable.finalY + 10;
    
    // Cek yen wis meh ganti halaman
    if (finalY > 230) { doc.addPage(); finalY = 20; }

    doc.setFontSize(10); doc.setFont("helvetica", "bold");
    doc.text("CATATAN & REKOMENDASI TEKNIK:", 15, finalY);
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9);
    const splitCatatan = doc.splitTextToSize(catatan || "Unit dalam kondisi baik, tidak ada temuan kritikal.", 175);
    doc.text(splitCatatan, 15, finalY + 6);

    // --- 6. SIGNATURE AREA ---
    const sigY = finalY + 30;
    doc.setFontSize(9);
    doc.text("Hormat Kami,", 25, sigY);
    doc.text("Teknisi Lapangan,", 25, sigY + 5);
    doc.line(20, sigY + 30, 60, sigY + 30); // Garis Tanda Tangan 1
    doc.text("Nanda Teknik", 32, sigY + 34);

    doc.text("Penerima / Pelanggan,", 150, sigY);
    doc.line(145, sigY + 30, 185, sigY + 30); // Garis Tanda Tangan 2
    doc.text(pelanggan, 155, sigY + 34, { align: "left" });

    // --- 7. FOOTER ---
    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text(`Generated by NandaTeknik-System | ${date} | Page 1`, 105, 288, { align: "center" });

    // Download
    doc.save(`Report_${pelanggan.replace(/\s+/g, '_')}_${tipe}.pdf`);
}
</script>
</body>
</html>
