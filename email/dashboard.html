<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-DASH | Email Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="login-screen" class="h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">G-DASH Login</h1>
            <input type="password" id="pass" placeholder="Password Admin" class="w-full p-2 border rounded mb-4">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Masuk</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen">
        <div class="w-64 bg-slate-900 text-white p-5 space-y-4">
            <h2 class="text-xl font-bold border-b border-slate-700 pb-2">Navigation</h2>
            <button onclick="fetchEmails('getInbox')" class="block w-full text-left hover:text-blue-400">📥 Kotak Masuk</button>
            <button onclick="fetchEmails('getSent')" class="block w-full text-left hover:text-blue-400">📤 Terkirim</button>
            <button onclick="showCompose()" class="block w-full bg-blue-600 py-2 rounded text-center mt-10 hover:bg-blue-500">Tulis Email</button>
            <button onclick="logout()" class="block w-full text-sm text-gray-400 pt-10">Logout</button>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm p-4 flex justify-between items-center">
                <span id="view-title" class="font-bold text-lg text-gray-700">Inbox</span>
                <div id="loading" class="hidden flex items-center">
                    <div class="loader ease-linear rounded-full border-2 border-t-2 border-gray-200 h-5 w-5 mr-2"></div>
                    <span class="text-sm text-gray-500">Memproses...</span>
                </div>
            </header>
            <main id="content" class="flex-1 overflow-y-auto p-4 space-y-2">
                </main>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVoGPnaSTwybTmqauFVMSWg40llHA4580zNJZ-WQqWCCBmSPM5TL7KsIOnqpiGvKKr1A/exec"; // Masukkan URL Deploy Apps Script
        let CURRENT_PASSWORD = localStorage.getItem('g_dash_pass');

        if (CURRENT_PASSWORD) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            fetchEmails('getInbox');
        }

        async function api(payload) {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ ...payload, password: CURRENT_PASSWORD })
                });
                return await response.json();
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        async function handleLogin() {
            const p = document.getElementById('pass').value;
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', password: p })
            }).then(r => r.json());

            if (res.success) {
                CURRENT_PASSWORD = p;
                localStorage.setItem('g_dash_pass', p);
                location.reload();
            } else {
                alert("Password Salah!");
            }
        }

        async function fetchEmails(action) {
            document.getElementById('view-title').innerText = action === 'getInbox' ? 'Kotak Masuk' : 'Terkirim';
            const res = await api({ action: action });
            const list = res.data.map(item => `
                <div class="bg-white p-4 rounded border hover:border-blue-500 cursor-pointer shadow-sm transition" onclick="viewDetail('${item.id}')">
                    <div class="flex justify-between">
                        <span class="font-bold text-blue-800">${item.from.split('<')[0]}</span>
                        <span class="text-xs text-gray-400">${new Date(item.date).toLocaleDateString()}</span>
                    </div>
                    <div class="text-sm font-medium">${item.subject}</div>
                    <div class="text-xs text-gray-500 truncate">${item.snippet}</div>
                </div>
            `).join('');
            document.getElementById('content').innerHTML = list || '<p class="text-center text-gray-500 mt-10">Tidak ada pesan.</p>';
        }

        async function viewDetail(id) {
            const res = await api({ action: 'getDetail', id: id });
            const msg = res.data[0];
            document.getElementById('content').innerHTML = `
                <div class="bg-white p-6 rounded shadow-sm border">
                    <button onclick="fetchEmails('getInbox')" class="mb-4 text-blue-600 text-sm">← Kembali</button>
                    <h1 class="text-xl font-bold mb-2">${msg.subject}</h1>
                    <p class="text-sm text-gray-600 mb-4">Dari: ${msg.from}</p>
                    <div class="border-t pt-4 text-gray-800 leading-relaxed">${msg.body}</div>
                    <button onclick="deleteEmail('${id}')" class="mt-10 text-red-500 text-sm">Hapus Percakapan</button>
                </div>
            `;
        }

        function showCompose() {
            document.getElementById('content').innerHTML = `
                <div class="bg-white p-6 rounded shadow-sm border max-w-2xl mx-auto">
                    <h2 class="text-lg font-bold mb-4">Email Baru</h2>
                    <input id="to" type="text" placeholder="Ke" class="w-full p-2 border rounded mb-2">
                    <input id="sub" type="text" placeholder="Subjek" class="w-full p-2 border rounded mb-2">
                    <textarea id="body" rows="8" class="w-full p-2 border rounded mb-4" placeholder="Isi pesan..."></textarea>
                    <button onclick="send()" class="bg-blue-600 text-white px-6 py-2 rounded">Kirim</button>
                </div>
            `;
        }

        async function send() {
            const data = {
                action: 'sendEmail',
                to: document.getElementById('to').value,
                subject: document.getElementById('sub').value,
                body: document.getElementById('body').value
            };
            const res = await api(data);
            if (res.success) { alert("Terkirim!"); fetchEmails('getSent'); }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
