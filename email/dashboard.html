<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - G-DASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-overlay { background: rgba(255,255,255,0.7); backdrop-filter: blur(2px); }
        .email-item:hover { background-color: #f1f5f9; cursor: pointer; transition: 0.2s; }
        .active-nav { background-color: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
        .email-body-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 10px 0; }
        .email-body-content table { width: 100% !important; border-collapse: collapse; }
        .email-body-content { line-height: 1.6; word-break: break-word; }
        .view-section { transition: opacity 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>

    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shadow-sm">
            <div class="p-6">
                <div class="flex items-center gap-3 text-blue-600 font-black text-2xl mb-8">
                    <i class="fas fa-envelope-open-text"></i> <span>G-DASH</span>
                </div>
                <button onclick="showCompose()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-2 font-bold">
                    <i class="fas fa-edit"></i> Tulis Email
                </button>
            </div>
            
            <nav class="flex-1 px-4 space-y-2">
                <button id="btn-getInbox" onclick="loadFolder('getInbox')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 font-semibold transition-all">
                    <i class="fas fa-inbox w-5 text-lg"></i> Kotak Masuk
                </button>
                <button id="btn-getSent" onclick="loadFolder('getSent')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 font-semibold transition-all">
                    <i class="fas fa-paper-plane w-5 text-lg"></i> Terkirim
                </button>
            </nav>

            <div class="p-6 border-t border-slate-50">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2 text-red-500 hover:bg-red-50 rounded-xl transition-all text-sm font-bold">
                    <i class="fas fa-power-off"></i> Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden relative">
            <div id="loader" class="hidden absolute inset-0 z-50 flex items-center justify-center loading-overlay">
                <div class="text-center">
                    <div class="animate-spin rounded-full h-14 w-14 border-4 border-blue-600 border-t-transparent mx-auto"></div>
                    <p class="mt-4 text-slate-500 font-medium italic">Sinkronisasi Gmail...</p>
                </div>
            </div>

            <header class="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center shadow-sm z-10">
                <h2 id="view-title" class="text-xl font-extrabold text-slate-800">Kotak Masuk</h2>
                <button onclick="refreshCurrent()" class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </header>

            <div id="view-list" class="flex-1 overflow-y-auto view-section">
                <div id="email-items-wrapper" class="divide-y divide-slate-100 bg-white"></div>
            </div>

            <div id="view-detail" class="hidden flex-1 overflow-y-auto bg-slate-50 view-section">
                <div class="max-w-4xl mx-auto p-8">
                    <button onclick="switchView('list')" class="mb-6 bg-white border border-slate-200 px-4 py-2 rounded-xl text-slate-600 hover:text-blue-600 flex items-center gap-2 shadow-sm transition-all font-bold">
                        <i class="fas fa-chevron-left"></i> Kembali
                    </button>
                    <div id="detail-subject-header" class="mb-8"></div>
                    <div id="detail-messages-wrapper" class="space-y-6"></div>

                    <div class="mt-12 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <h4 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <i class="fas fa-reply"></i> Balas Percakapan
                        </h4>
                        <textarea id="reply-body" class="w-full p-4 border border-slate-200 rounded-xl h-40 mb-3 focus:ring-4 focus:ring-blue-50 outline-none transition-all" placeholder="Tulis balasan..."></textarea>
                        <div class="flex justify-end">
                            <button id="replyBtn" onclick="sendReply()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-black transition-all">Kirim Balasan</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-compose" class="hidden flex-1 overflow-y-auto bg-white p-8 view-section">
                <div class="max-w-3xl mx-auto">
                    <h2 class="text-3xl font-black mb-8 text-slate-800">Email Baru</h2>
                    <div class="bg-slate-50 p-8 rounded-3xl border border-slate-100 space-y-4">
                        <input type="email" id="to-field" placeholder="Penerima" class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-50 font-medium">
                        <input type="text" id="subject-field" placeholder="Subjek" class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-50 font-medium">
                        <textarea id="body-field" placeholder="Pesan..." class="w-full p-4 bg-white border border-slate-200 rounded-2xl h-72 outline-none focus:ring-4 focus:ring-blue-50 font-medium"></textarea>
                        <div class="flex justify-end">
                            <button onclick="sendEmailNew()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-xl shadow-blue-200 flex items-center gap-3">
                                <i class="fas fa-paper-plane"></i> Kirim
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- KONFIGURASI ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw3lnaFLu-iQG3vwb9vzyWugZ3VIcP7hwk3HDIfdV5kCmiDvWWpMG_eWQ4ePDS_rRzr8A/exec"; 
        const appPassword = localStorage.getItem('appPassword');
        let currentThreadId = null;
        let currentAction = 'getInbox';

        // --- CORE API ---
        async function callAPI(payload) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (e) {
                console.error("API Error:", e);
                return { success: false, message: "Koneksi Gagal" };
            }
        }

        // --- FOLDER LOADER ---
        async function loadFolder(action) {
            currentAction = action;
            const cacheKey = `cache_${action}`;
            const wrapper = document.getElementById('email-items-wrapper');
            
            switchView('list');
            updateSidebarUI(action);

            // 1. Cek Cache
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                const result = JSON.parse(cached);
                renderEmailList(result.data);
            } else {
                wrapper.innerHTML = `<div class="p-20 text-center text-slate-400">Memuat...</div>`;
            }

            showLoader(true);
            try {
                const result = await callAPI({ action: action, password: appPassword });
                if (result.success) {
                    localStorage.setItem(cacheKey, JSON.stringify(result));
                    renderEmailList(result.data);
                }
            } catch (e) {
                console.error(e);
            } finally {
                showLoader(false);
            }
        }

        // --- RENDERER (VERSI STABIL) ---
        function renderEmailList(data) {
            const wrapper = document.getElementById('email-items-wrapper');
            if (!data || data.length === 0) {
                wrapper.innerHTML = `<div class="p-20 text-center text-slate-400">Folder kosong.</div>`;
                return;
            }

            let html = "";
            data.forEach(item => {
                const dateStr = item.date ? new Date(item.date).toLocaleDateString('id-ID', {day:'2-digit', month:'short'}) : '';
                const fromClean = (item.from || "Unknown").split('<')[0].replace(/"/g, "").trim();
                
                html += `
                    <div class="email-item p-5 border-b border-slate-50 flex items-center gap-6" onclick="loadDetail('${item.id}')">
                        <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold flex-shrink-0">
                            ${fromClean.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-slate-800 truncate">${fromClean}</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase bg-slate-50 px-2 py-1 rounded">${dateStr}</span>
                            </div>
                            <div class="text-sm font-bold text-slate-700 truncate">${item.subject || '(No Subject)'}</div>
                            <div class="text-xs text-slate-400 truncate">${item.snippet || ''}</div>
                        </div>
                        <button onclick="event.stopPropagation(); deleteEmail('${item.id}')" class="text-slate-300 hover:text-red-500 p-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>`;
            });
            wrapper.innerHTML = html;
        }

        // --- DETAIL & ACTIONS ---
        async function loadDetail(id) {
            showLoader(true);
            currentThreadId = id;
            try {
                const result = await callAPI({ action: 'getDetail', id: id, password: appPassword });
                if (result.success) {
                    switchView('detail');
                    document.getElementById('detail-subject-header').innerHTML = `<h1 class="text-2xl font-black text-slate-800">${result.data[0].subject}</h1>`;
                    
                    let msgHtml = "";
                    result.data.forEach(msg => {
                        msgHtml += `
                            <div class="bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm">
                                <div class="bg-slate-50/50 px-6 py-4 flex justify-between border-b border-slate-100">
                                    <div class="text-sm font-bold text-slate-800">${msg.from}</div>
                                    <div class="text-[10px] text-slate-400 font-bold">${new Date(msg.date).toLocaleString('id-ID')}</div>
                                </div>
                                <div class="p-8 text-slate-700 email-body-content text-sm">${msg.body}</div>
                            </div>`;
                    });
                    document.getElementById('detail-messages-wrapper').innerHTML = msgHtml;
                }
            } catch (e) { alert("Gagal memuat detail"); }
            finally { showLoader(false); }
        }

        async function sendReply() {
            const body = document.getElementById('reply-body').value;
            if(!body) return;
            const btn = document.getElementById('replyBtn');
            btn.disabled = true; btn.innerText = "Mengirim...";
            try {
                await callAPI({ action: 'replyEmail', threadId: currentThreadId, body: body, password: appPassword });
                document.getElementById('reply-body').value = "";
                loadDetail(currentThreadId);
            } finally { btn.disabled = false; btn.innerText = "Kirim Balasan"; }
        }

        async function sendEmailNew() {
            const payload = {
                action: 'sendEmail',
                to: document.getElementById('to-field').value,
                subject: document.getElementById('subject-field').value,
                body: document.getElementById('body-field').value,
                password: appPassword
            };
            showLoader(true);
            const res = await callAPI(payload);
            if(res.success) {
                alert("Terkirim!");
                showCompose(); // Reset fields
                loadFolder('getInbox');
            }
            showLoader(false);
        }

        async function deleteEmail(id) {
            if(!confirm("Hapus?")) return;
            showLoader(true);
            await callAPI({ action: 'deleteThread', id: id, password: appPassword });
            refreshCurrent();
            showLoader(false);
        }

        // --- UI HELPERS ---
        function showLoader(v) { document.getElementById('loader').classList.toggle('hidden', !v); }
        function switchView(v) {
            ['view-list', 'view-detail', 'view-compose'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('view-' + v).classList.remove('hidden');
        }
        function updateSidebarUI(action) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            const active = document.getElementById('btn-' + action);
            if(active) active.classList.add('active-nav');
            document.getElementById('view-title').innerText = action === 'getInbox' ? 'Kotak Masuk' : 'Terkirim';
        }
        function showCompose() {
            switchView('compose');
            document.getElementById('view-title').innerText = "Tulis Email";
            ['to-field', 'subject-field', 'body-field'].forEach(id => document.getElementById(id).value = "");
        }
        function refreshCurrent() { 
            localStorage.removeItem(`cache_${currentAction}`);
            loadFolder(currentAction); 
        }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        window.onload = () => loadFolder('getInbox');
    </script>
</body>
</html>
