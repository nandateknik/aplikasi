<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MyEmail Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-overlay { background: rgba(255,255,255,0.7); backdrop-filter: blur(2px); }
        .email-item:hover { background-color: #f1f5f9; cursor: pointer; transition: 0.2s; }
        .active-nav { background-color: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
        /* Reset untuk konten email agar tidak merusak layout */
        .email-body-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 10px 0; }
        .email-body-content table { width: 100% !important; border-collapse: collapse; }
        .email-body-content { line-height: 1.6; word-break: break-word; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <script>
        // Proteksi Halaman
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shadow-sm">
            <div class="p-6">
                <div class="flex items-center gap-3 text-blue-600 font-black text-2xl mb-8">
                    <i class="fas fa-envelope-open-text"></i> <span>G-DASH</span>
                </div>
                <button onclick="showCompose()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-2 font-bold">
                    <i class="fas fa-edit"></i> Tulis Email
                </button>
            </div>
            
            <nav class="flex-1 px-4 space-y-2">
                <button id="btn-inbox" onclick="loadFolder('getInbox', this)" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 font-semibold transition-all active-nav">
                    <i class="fas fa-inbox w-5 text-lg"></i> Kotak Masuk
                </button>
                <button id="btn-sent" onclick="loadFolder('getSent', this)" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 font-semibold transition-all">
                    <i class="fas fa-paper-plane w-5 text-lg"></i> Terkirim
                </button>
            </nav>

            <div class="p-6 border-t border-slate-50">
                <div class="bg-slate-50 p-4 rounded-xl mb-4">
                    <p class="text-xs text-slate-400 uppercase font-bold mb-1">Status</p>
                    <p class="text-sm font-medium text-slate-700 truncate">Connected as Admin</p>
                </div>
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2 text-red-500 hover:bg-red-50 rounded-xl transition-all text-sm font-bold">
                    <i class="fas fa-power-off"></i> Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden relative">
            
            <div id="loader" class="hidden absolute inset-0 z-50 flex items-center justify-center loading-overlay">
                <div class="text-center">
                    <div class="animate-spin rounded-full h-14 w-14 border-4 border-blue-600 border-t-transparent mx-auto"></div>
                    <p class="mt-4 text-slate-500 font-medium italic">Sinkronisasi Gmail...</p>
                </div>
            </div>

            <header class="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center shadow-sm z-10">
                <h2 id="view-title" class="text-xl font-extrabold text-slate-800">Kotak Masuk</h2>
                <div class="flex items-center gap-4">
                    <button onclick="refreshCurrent()" class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>

            <div id="view-list" class="flex-1 overflow-y-auto">
                <div id="email-items-wrapper" class="divide-y divide-slate-100 bg-white">
                    </div>
            </div>

            <div id="view-detail" class="hidden flex-1 overflow-y-auto bg-slate-50">
                <div class="max-w-4xl mx-auto p-8">
                    <button onclick="switchView('list')" class="mb-6 bg-white border border-slate-200 px-4 py-2 rounded-xl text-slate-600 hover:text-blue-600 flex items-center gap-2 shadow-sm transition-all font-bold">
                        <i class="fas fa-chevron-left"></i> Kembali
                    </button>
                    
                    <div id="detail-subject-header" class="mb-8"></div>
                    <div id="detail-messages-wrapper" class="space-y-6"></div>

                    <div class="mt-12 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <h4 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <i class="fas fa-reply"></i> Balas Percakapan
                        </h4>
                        <textarea id="reply-body" class="w-full p-4 border border-slate-200 rounded-xl h-40 mb-3 focus:ring-4 focus:ring-blue-50 outline-none border-focus:blue-500 transition-all" placeholder="Tulis balasan Anda di sini..."></textarea>
                        <div class="flex justify-end">
                            <button id="replyBtn" onclick="sendReply()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-black transition-all">
                                Kirim Balasan
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-compose" class="hidden flex-1 overflow-y-auto bg-white p-8">
                <div class="max-w-3xl mx-auto">
                    <h2 class="text-3xl font-black mb-8 text-slate-800">Email Baru</h2>
                    <div class="bg-slate-50 p-8 rounded-3xl border border-slate-100 space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase ml-1 mb-1">Penerima</label>
                            <input type="email" id="to-field" placeholder="email@tujuan.com" class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-50 transition-all font-medium">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase ml-1 mb-1">Subjek</label>
                            <input type="text" id="subject-field" placeholder="Tulis subjek email..." class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-50 transition-all font-medium">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase ml-1 mb-1">Pesan</label>
                            <textarea id="body-field" placeholder="Mulai mengetik..." class="w-full p-4 bg-white border border-slate-200 rounded-2xl h-72 outline-none focus:ring-4 focus:ring-blue-50 transition-all font-medium"></textarea>
                        </div>
                        <div class="flex justify-end pt-4">
                            <button onclick="sendEmailNew()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-xl shadow-blue-200 flex items-center gap-3">
                                <i class="fas fa-paper-plane"></i> Kirim Sekarang
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
    // GANTI URL INI JIKA ANDA MELAKUKAN DEPLOY ULANG (NEW VERSION)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOEpqZnRFod95bBNwN40YmMeQ7bR9sDDgrhSN-9CiLH9QIIcQl67CJy7j3uwk2SO2M6w/exec"; 
    const appPassword = localStorage.getItem('appPassword');
    let currentThreadId = null;
    let currentAction = 'getInbox';

    /**
     * Fungsi utama komunikasi ke API Apps Script (Fixed CORS)
     */
    async function callAPI(payload) {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        });
        
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch (e) {
            console.error("Format Response Error:", text);
            throw new Error("Gagal membaca data dari server.");
        }
    }

    /**
     * Memuat List Email (Inbox/Sent)
     */
    async function loadFolder(action, element) {
        currentAction = action;
        showLoader(true);
        switchView('list');
        
        // Update UI Navigasi
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav'));
        if(element) element.classList.add('active-nav');
        document.getElementById('view-title').innerText = action === 'getInbox' ? 'Kotak Masuk' : 'Kotak Keluar';
        
        try {
            const result = await callAPI({ action: action, password: appPassword });
            if (!result.success) throw new Error(result.message);

            const wrapper = document.getElementById('email-items-wrapper');
            wrapper.innerHTML = result.data.length === 0 ? 
                `<div class="p-20 text-center"><i class="fas fa-folder-open text-5xl text-slate-200 mb-4 block"></i><p class="text-slate-400 font-medium">Folder ini kosong</p></div>` : "";

            result.data.forEach(item => {
                const dateFormatted = new Date(item.date).toLocaleDateString('id-ID', { day:'2-digit', month:'short' });
                const cleanFrom = item.from.split('<')[0].replace(/"/g, "").trim();
                
                const div = document.createElement('div');
                div.className = "email-item p-5 border-b border-slate-50 flex items-center gap-6";
                div.onclick = () => loadDetail(item.id);
                div.innerHTML = `
                    <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-lg flex-shrink-0">
                        ${cleanFrom.charAt(0).toUpperCase()}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-slate-800 truncate pr-4">${cleanFrom}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase bg-slate-50 px-2 py-1 rounded">${dateFormatted}</span>
                        </div>
                        <div class="text-sm font-bold text-slate-700 truncate mb-1">${item.subject}</div>
                        <div class="text-xs text-slate-400 truncate">${item.snippet}</div>
                    </div>
                    <div class="flex gap-2">
                         <button onclick="event.stopPropagation(); deleteEmail('${item.id}')" class="text-slate-300 hover:text-red-500 p-2 transition-all">
                            <i class="fas fa-trash-alt"></i>
                         </button>
                    </div>
                `;
                wrapper.appendChild(div);
            });
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            showLoader(false);
        }
    }

    /**
     * Memuat Detail Pesan dalam Thread
     */
    async function loadDetail(id) {
        showLoader(true);
        currentThreadId = id;
        try {
            const result = await callAPI({ action: 'getDetail', id: id, password: appPassword });
            if (!result.success) throw new Error(result.message);

            switchView('detail');
            document.getElementById('detail-subject-header').innerHTML = `
                <h1 class="text-3xl font-black text-slate-800 leading-tight">${result.data[0].subject}</h1>
                <div class="mt-2 flex items-center gap-2">
                     <span class="bg-blue-100 text-blue-700 text-[10px] font-black px-2 py-1 rounded-full uppercase tracking-wider">${result.data.length} Pesan</span>
                </div>
            `;

            const msgWrapper = document.getElementById('detail-messages-wrapper');
            msgWrapper.innerHTML = "";

            result.data.forEach((msg) => {
                const msgDiv = document.createElement('div');
                msgDiv.className = "bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm";
                msgDiv.innerHTML = `
                    <div class="bg-slate-50/50 px-6 py-4 flex justify-between items-center border-b border-slate-100">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold text-slate-600">
                                ${msg.from.charAt(0)}
                            </div>
                            <div>
                                <div class="text-sm font-bold text-slate-800">${msg.from}</div>
                                <div class="text-[10px] text-slate-400 font-medium">Ke: ${msg.to}</div>
                            </div>
                        </div>
                        <div class="text-[10px] font-bold text-slate-400 text-right">
                            ${new Date(msg.date).toLocaleString('id-ID')}
                        </div>
                    </div>
                    <div class="p-8 text-slate-700 email-body-content text-sm overflow-x-auto">
                        ${msg.body}
                    </div>
                `;
                msgWrapper.appendChild(msgDiv);
            });

            // Scroll ke pesan terbaru
            setTimeout(() => {
                const view = document.getElementById('view-detail');
                view.scrollTo({ top: view.scrollHeight, behavior: 'smooth' });
            }, 300);

        } catch (e) {
            alert("Gagal memuat detail: " + e.message);
        } finally {
            showLoader(false);
        }
    }

    /**
     * Aksi Balas Email
     */
    async function sendReply() {
        const body = document.getElementById('reply-body').value;
        if(!body) return alert("Tulis sesuatu untuk membalas!");
        const btn = document.getElementById('replyBtn');
        btn.disabled = true;
        btn.innerText = "Mengirim...";
        try {
            await callAPI({ action: 'replyEmail', threadId: currentThreadId, body: body, password: appPassword });
            alert("Balasan Terkirim!");
            document.getElementById('reply-body').value = "";
            loadDetail(currentThreadId);
        } catch (e) { alert("Gagal membalas."); }
        finally { btn.disabled = false; btn.innerText = "Kirim Balasan"; }
    }

    /**
     * Aksi Kirim Email Baru
     */
    async function sendEmailNew() {
        const to = document.getElementById('to-field').value;
        const sub = document.getElementById('subject-field').value;
        const body = document.getElementById('body-field').value;
        if(!to || !sub || !body) return alert("Mohon lengkapi semua kolom.");
        showLoader(true);
        try {
            await callAPI({ action: 'sendEmail', to: to, subject: sub, body: body, password: appPassword });
            alert("Email Berhasil Dikirim!");
            // Reset fields
            ['to-field', 'subject-field', 'body-field'].forEach(id => document.getElementById(id).value = "");
            loadFolder('getInbox', document.getElementById('btn-inbox'));
        } catch (e) { alert("Gagal mengirim email."); }
        finally { showLoader(false); }
    }

    /**
     * Hapus Email
     */
    async function deleteEmail(id) {
        if(!confirm("Hapus percakapan ini?")) return;
        showLoader(true);
        try {
            await callAPI({ action: 'deleteThread', id: id, password: appPassword });
            refreshCurrent();
        } catch (e) { alert("Gagal menghapus."); }
        finally { showLoader(false); }
    }

    /**
     * Navigasi UI
     */
    function showLoader(val) { document.getElementById('loader').classList.toggle('hidden', !val); }
    
    function switchView(view) {
        const views = ['view-list', 'view-detail', 'view-compose'];
        views.forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
    }

    function showCompose() {
        switchView('compose');
        document.getElementById('view-title').innerText = "Tulis Email";
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav'));
    }

    function refreshCurrent() { loadFolder(currentAction); }

    function logout() { 
        localStorage.clear(); 
        window.location.href = 'index.html'; 
    }

    // Load Inbox otomatis saat buka dashboard
    window.onload = () => loadFolder('getInbox');
</script>
</body>
</html>
